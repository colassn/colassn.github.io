<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="application-name" content="家庭通知控制中心｜發送端" />
  <meta name="apple-mobile-web-app-title" content="家庭通知控制中心" />
  <meta property="og:title" content="家庭通知控制中心｜發送端" />
  <meta property="og:description" content="手機家庭通知發送者控制台。" />
  <title>家庭通知控制中心｜發送端</title>
  <style>
    :root {
      --bg-0:#020713; --bg-1:#071324; --glass:rgba(255,255,255,.105); --border:rgba(255,255,255,.18); --border-strong:rgba(255,255,255,.30);
      --text:rgba(247,251,255,.96); --sub:rgba(219,232,255,.74); --muted:rgba(219,232,255,.50); --cyan:#68e8ff; --blue:#78a6ff; --purple:#a98cff; --green:#72f0ad; --amber:#ffd166; --red:#ff6b8b;
      --shadow:0 28px 78px rgba(0,0,0,.44); --radius-xl:32px; --radius-lg:24px; --radius-md:18px; --smooth:420ms cubic-bezier(.2,.8,.2,1);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang HK","PingFang TC","Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
    }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg-0);color:var(--text)} body{min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;touch-action:manipulation}
    body::before{content:"";position:fixed;inset:-24%;z-index:-2;pointer-events:none;background:radial-gradient(circle at 20% 15%,rgba(104,232,255,.22),transparent 30%),radial-gradient(circle at 82% 8%,rgba(169,140,255,.20),transparent 34%),radial-gradient(circle at 62% 86%,rgba(80,110,255,.18),transparent 38%),linear-gradient(145deg,#020713 0%,#071324 48%,#101a34 100%);animation:drift 38s ease-in-out infinite alternate}
    body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.26;background-image:radial-gradient(circle,rgba(255,255,255,.40) 0 1px,transparent 1.6px);background-size:92px 92px;animation:stars 120s linear infinite}
    @keyframes drift{from{transform:translate3d(-1.5%,-1%,0) scale(1)}to{transform:translate3d(1.5%,1%,0) scale(1.04)}} @keyframes stars{from{background-position:0 0}to{background-position:900px 720px}}
    .shell{width:min(1180px,calc(100vw - 28px));margin:18px auto 32px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px}.orb{width:54px;height:54px;border-radius:19px;background:radial-gradient(circle at 34% 28%,#fff,var(--cyan) 28%,var(--blue) 64%,var(--purple));box-shadow:0 0 34px rgba(104,232,255,.34)} h1,h2,p{margin:0}.brand h1{font-size:clamp(26px,5.6vw,44px);letter-spacing:-.06em}.brand p{color:var(--sub);font-size:14px;margin-top:4px}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}.stack{display:grid;gap:16px}.panel{position:relative;overflow:hidden;border-radius:var(--radius-xl);border:1px solid var(--border);background:linear-gradient(145deg,rgba(255,255,255,.15),rgba(255,255,255,.055));box-shadow:var(--shadow);backdrop-filter:blur(28px) saturate(150%);-webkit-backdrop-filter:blur(28px) saturate(150%)}.panel::before{content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.24),transparent 30%,transparent 76%,rgba(104,232,255,.10));opacity:.78}.inner{position:relative;z-index:1;padding:24px}.card-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}.card-title h2{font-size:20px;letter-spacing:-.04em}.card-title small,.muted{color:var(--muted);font-size:13px}.section-note{color:var(--sub);line-height:1.52;margin:8px 0 18px}.button-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.btn{appearance:none;width:100%;text-align:left;border:1px solid rgba(255,255,255,.16);border-radius:20px;background:rgba(255,255,255,.08);color:var(--text);padding:15px 15px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.10);transition:transform var(--smooth),background var(--smooth),border-color var(--smooth)}.btn:active{transform:scale(.985)}.btn:hover{background:rgba(255,255,255,.12)}.btn strong{display:block;font-size:15px}.btn span{display:block;color:var(--muted);font-size:12px;line-height:1.38;margin-top:5px}.btn.primary{background:linear-gradient(135deg,rgba(104,232,255,.26),rgba(120,166,255,.16));border-color:rgba(104,232,255,.34)}.btn.danger{background:linear-gradient(135deg,rgba(255,107,139,.26),rgba(255,209,102,.10));border-color:rgba(255,107,139,.34)}.btn.compact{text-align:center;padding:12px 14px}.form-grid{display:grid;gap:12px}.field label{display:block;color:var(--muted);font-size:12px;margin:0 0 7px 2px}.input,.textarea,.select{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:18px;background:rgba(0,0,0,.20);color:var(--text);padding:13px 14px;outline:none;font:inherit}.textarea{min-height:104px;resize:vertical}.select option{background:#111b2e}.inline{display:flex;gap:10px;flex-wrap:wrap}.inline .btn{width:auto;min-width:150px}.status{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.075);padding:8px 12px;color:var(--sub);font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 18px rgba(255,209,102,.5)}.dot.online{background:var(--green);box-shadow:0 0 18px rgba(114,240,173,.55)}.dot.danger{background:var(--red);box-shadow:0 0 18px rgba(255,107,139,.55)}.divider{height:1px;background:rgba(255,255,255,.11);margin:16px 0}.toast{position:fixed;right:16px;bottom:16px;z-index:40;display:grid;gap:10px;width:min(380px,calc(100vw - 32px))}.toast-item{border-radius:20px;border:1px solid rgba(255,255,255,.16);background:rgba(8,16,31,.78);padding:14px 16px;color:var(--sub);box-shadow:0 16px 40px rgba(0,0,0,.30);backdrop-filter:blur(20px)}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.preview{display:grid;gap:9px;max-height:230px;overflow:auto}.event-item{display:grid;grid-template-columns:60px 1fr;gap:10px;border:1px solid rgba(255,255,255,.10);border-radius:18px;background:rgba(255,255,255,.055);padding:12px}.event-time{color:var(--cyan);font-weight:800;font-size:12px}.event-text{color:var(--sub);font-size:14px;line-height:1.38}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.topbar{align-items:flex-start}.button-grid{grid-template-columns:1fr}} @media(max-width:520px){.shell{width:calc(100vw - 18px);margin:10px auto 24px}.inner{padding:19px}.brand h1{font-size:28px}.button-grid{gap:9px}.inline .btn{width:100%}}
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <main class="shell">
    <header class="topbar">
      <div class="brand"><div class="orb"></div><div><h1>家庭通知控制中心</h1><p>發送者控制台｜手機端</p></div></div>
      <div class="status"><span class="pill"><span id="connectionDot" class="dot"></span><span id="connectionText">連線檢查中</span></span><span class="pill" id="authState">未登入 Google</span></div>
    </header>

    <section class="grid">
      <article class="panel">
        <div class="inner">
          <h2>一鍵家庭狀態</h2>
          <p class="section-note">撳一下就會即時推送去接收端 iPad：更新主畫面、進度條、事件流，並觸發提示音 / 語音。</p>
          <div class="button-grid" id="statusButtons"></div>
          <div class="divider"></div>
          <div class="card-title"><h2>快速音響</h2><small>One-tap sound</small></div>
          <div class="button-grid">
            <button class="btn primary" data-sound="arrival"><strong>到樓下提示音</strong><span>播放到達 chime + 動態通知</span></button>
            <button class="btn" data-sound="soft"><strong>溫柔提示</strong><span>適合普通家庭提醒</span></button>
            <button class="btn" data-sound="ping"><strong>短提示音</strong><span>輕量 ping，不打擾</span></button>
            <button class="btn danger" data-sound="alert"><strong>重要警報</strong><span>高優先級提示，慎用</span></button>
          </div>
        </div>
      </article>

      <aside class="stack">
        <section class="panel">
          <div class="inner">
            <div class="card-title"><h2>自訂廣播</h2><small>TTS / Capsule</small></div>
            <div class="form-grid">
              <div class="field"><label>通知標題</label><input id="customTitle" class="input" value="家庭通知" /></div>
              <div class="field"><label>廣播內容</label><textarea id="customMessage" class="textarea" placeholder="例如：我差唔多返到屋企啦，可以準備開飯。"></textarea></div>
              <div class="field"><label>提示音</label><select id="customSound" class="select"><option value="soft">溫柔提示</option><option value="arrival">到達提示</option><option value="ping">短提示</option><option value="alert">重要警報</option><option value="none">不播放聲音</option></select></div>
              <button id="sendCustomBtn" class="btn primary"><strong>發送自訂通知</strong><span>接收端顯示玻璃膠囊，並播放 TTS 或提示音</span></button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="inner">
            <div class="card-title"><h2>日程推送</h2><small>Manual / Google Calendar Beta</small></div>
            <div class="form-grid">
              <div class="field"><label>時間</label><input id="manualScheduleTime" class="input" type="time" /></div>
              <div class="field"><label>日程標題</label><input id="manualScheduleTitle" class="input" placeholder="例如：20:30 健身 / 22:00 溫習" /></div>
              <button id="sendScheduleBtn" class="btn"><strong>手動推送下一件事</strong><span>第一版最穩，唔需要 Google API</span></button>
              <div class="inline"><button id="googleSignInBtn" class="btn primary compact"><strong>Google 登入</strong></button><button id="syncCalendarBtn" class="btn compact"><strong>同步下一件日曆</strong></button><button id="googleSignOutBtn" class="btn compact"><strong>登出</strong></button></div>
            </div>
          </div>
        </section>
      </aside>
    </section>

    <section class="grid" style="margin-top:16px;">
      <section class="panel">
        <div class="inner">
          <div class="card-title"><h2>系統工具</h2><small>Sender only</small></div>
          <div class="form-grid">
            <div class="field"><label>Realtime Database URL</label><input id="databaseUrlInput" class="input mono" placeholder="https://homecontrol-ee898-default-rtdb.firebaseio.com" /></div>
            <div class="field"><label>操作者名稱</label><input id="operatorNameInput" class="input" placeholder="James" /></div>
            <div class="inline"><button id="saveSettingsBtn" class="btn primary compact"><strong>儲存設定</strong></button><button id="refreshWeatherBtn" class="btn compact"><strong>同步香港天氣</strong></button><button id="clearEventsBtn" class="btn compact"><strong>清空事件流</strong></button><button id="testReceiverBtn" class="btn compact"><strong>測試通知</strong></button></div>
          </div>
        </div>
      </section>
      <section class="panel">
        <div class="inner">
          <div class="card-title"><h2>最近事件預覽</h2><small>Firebase</small></div>
          <div id="eventPreview" class="preview"><div class="event-item"><div class="event-time">--:--</div><div class="event-text">等待資料。</div></div></div>
        </div>
      </section>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAnalytics, isSupported as analyticsIsSupported, logEvent } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
    import { getDatabase, ref, set, update, push, onValue, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDl6x9gIn0TTyKWHVf_tPbhm3OjpOxJgzQ",
      authDomain: "homecontrol-ee898.firebaseapp.com",
      projectId: "homecontrol-ee898",
      storageBucket: "homecontrol-ee898.firebasestorage.app",
      messagingSenderId: "634615992463",
      appId: "1:634615992463:web:7a6b761a597a99d0f8e0fa",
      measurementId: "G-PMKY0NSJ6P"
    };

    const app = initializeApp(firebaseConfig);
    let analytics = null;
    analyticsIsSupported().then(ok => { if (ok) analytics = getAnalytics(app); }).catch(() => {});
    const DEFAULT_DB_URL = "https://homecontrol-ee898-default-rtdb.firebaseio.com";
    const urlDb = new URLSearchParams(location.search).get("db");
    if (urlDb) localStorage.setItem("hcc_database_url", urlDb);
    const databaseURL = localStorage.getItem("hcc_database_url") || DEFAULT_DB_URL;
    const db = getDatabase(app, databaseURL);
    const auth = getAuth(app);
    const calendarProvider = new GoogleAuthProvider();
    calendarProvider.addScope("https://www.googleapis.com/auth/calendar.readonly");
    calendarProvider.addScope("email"); calendarProvider.addScope("profile");
    const BASE = "homeNotificationCenter/global";
    const $ = id => document.getElementById(id);
    const fmtTime = (date = new Date()) => date.toLocaleTimeString("zh-HK", { hour: "2-digit", minute: "2-digit" });
    const safeText = (v, f = "") => (v === undefined || v === null || v === "") ? f : String(v);
    const state = { user:null, lastGoogleAccessToken:"", connected:false };
    const statusPresets = {
      preparing:{title:"準備收工",subtitle:"James 準備離開，回家任務即將開始。",eyebrow:"MISSION START",progress:18,eta:"準備中",priority:"NORMAL",sound:"ping",speak:"James 準備收工，回家任務即將開始。"},
      leaving:{title:"已經出發",subtitle:"正在離開目前位置，請留意下一步交通狀態。",eyebrow:"DEPARTURE",progress:34,eta:"約 45 分鐘",priority:"NORMAL",sound:"soft",speak:"James 已經出發。"},
      transit:{title:"搭緊車",subtitle:"正在回家途中，抵達時間會持續更新。",eyebrow:"IN TRANSIT",progress:58,eta:"約 25 分鐘",priority:"NORMAL",sound:"soft",speak:"James 正在回家途中。"},
      nearby:{title:"到樓下啦",subtitle:"James 已經到樓下，可以準備開門或留意門口。",eyebrow:"ARRIVAL NEARBY",progress:88,eta:"2 分鐘",priority:"HIGH",sound:"arrival",speak:"James 到樓下啦。"},
      arrived:{title:"已到屋企",subtitle:"Welcome home. 今日辛苦晒。",eyebrow:"MISSION COMPLETE",progress:100,eta:"完成",priority:"DONE",sound:"arrival",speak:"James 已經到屋企。"},
      delayed:{title:"會遲少少",subtitle:"行程有延誤，請唔使擔心，會稍後再更新。",eyebrow:"DELAY NOTICE",progress:44,eta:"延誤",priority:"NOTICE",sound:"soft",speak:"James 會遲少少返到。"},
      quiet:{title:"靜音模式",subtitle:"接收端保持低亮度與低干擾，只顯示重要通知。",eyebrow:"QUIET MODE",progress:0,eta:"靜音",priority:"QUIET",sound:"none",speak:""},
      emergency:{title:"重要通知",subtitle:"請即時留意家庭通知控制中心。",eyebrow:"URGENT ALERT",progress:100,eta:"即時",priority:"URGENT",sound:"alert",speak:"重要通知，請即時留意。"}
    };
    function logSafe(name, params = {}) { try { if (analytics) logEvent(analytics, name, params); } catch (_) {} }
    function toast(message, type = "info") { const wrap = $("toast"); const item = document.createElement("div"); item.className = "toast-item"; item.textContent = message; if (type === "error") item.style.borderColor = "rgba(255,107,139,.36)"; if (type === "success") item.style.borderColor = "rgba(114,240,173,.36)"; wrap.appendChild(item); setTimeout(() => item.remove(), 4300); }
    async function writeEvent(text, type = "info") { await push(ref(db, `${BASE}/events`), { text, type, at: serverTimestamp(), localTime: new Date().toISOString(), operator: localStorage.getItem("hcc_operator_name") || "James" }); }
    async function sendBroadcast({ title="家庭通知", message="", soundId="soft", ttsText="", priority="normal", writeLog=true } = {}) { const payload = { id:`broadcast_${Date.now()}_${Math.random().toString(16).slice(2)}`, title, message, soundId, ttsText, priority, updatedAt:serverTimestamp(), localTime:new Date().toISOString(), operator:localStorage.getItem("hcc_operator_name") || "James" }; await set(ref(db, `${BASE}/broadcast/current`), payload); if (writeLog) await writeEvent(`廣播：${title}｜${message || ttsText}`, priority === "urgent" ? "urgent" : "broadcast"); }
    async function sendStatus(key) { const preset = statusPresets[key]; if (!preset) return; const payload = { ...preset, key, modeLabel:key, updatedAt:serverTimestamp(), localTime:new Date().toISOString(), operator:localStorage.getItem("hcc_operator_name") || "James" }; try { await set(ref(db, `${BASE}/status/current`), payload); await sendBroadcast({ title:preset.title, message:preset.subtitle, soundId:preset.sound, ttsText:preset.speak, priority:preset.priority, writeLog:false }); await writeEvent(`狀態更新：${preset.title}`, key === "emergency" ? "urgent" : "status"); toast(`已發送：${preset.title}`, "success"); logSafe("send_status", { key }); } catch (err) { toast(`發送失敗：${err.message}`, "error"); } }
    async function sendSound(soundId) { const map = { arrival:["到樓下提示", "收到到達提示，請留意門口。"], soft:["溫柔提示", "有一則家庭提醒。"], ping:["短提示", "Ping。"], alert:["重要警報", "重要通知，請即時留意。"] }; const [title, message] = map[soundId] || map.soft; try { await sendBroadcast({ title, message, soundId, ttsText: message, priority: soundId === "alert" ? "urgent" : "normal" }); toast(`已發送音響：${title}`, "success"); } catch (err) { toast(`音響發送失敗：${err.message}`, "error"); } }
    async function sendManualSchedule() { const time = $("manualScheduleTime").value || "--:--"; const title = $("manualScheduleTitle").value.trim(); if (!title) return toast("請先輸入日程標題。", "error"); const payload = { source:"manual", title, time, subtitle:`${time}｜${title}`, updatedAt:serverTimestamp(), localTime:new Date().toISOString() }; try { await set(ref(db, `${BASE}/schedule/current`), payload); await sendBroadcast({ title:"日程提醒", message:`${time} ${title}`, soundId:"soft", ttsText:`下一個日程，${time}，${title}` }); toast("日程已推送到接收端。", "success"); } catch (err) { toast(`日程推送失敗：${err.message}`, "error"); } }
    async function fetchHongKongWeather() { try { const res = await fetch("https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc", { cache:"no-store" }); if (!res.ok) throw new Error(`HTTP ${res.status}`); const data = await res.json(); const temps = data.temperature?.data || []; const hk = temps.find(x => /香港天文台|京士柏|九龍|沙田|荃灣/.test(x.place)) || temps[0]; const desc = data.icon?.length ? `天氣圖示 ${data.icon.join(", ")}` : (data.warningMessage?.[0] || "香港天文台即時天氣"); const payload = { source:"hko", temp:hk?.value || "--", place:hk?.place || "香港", desc, warning:data.warningMessage?.[0] || "", updatedAt:serverTimestamp(), localTime:new Date().toISOString() }; await set(ref(db, `${BASE}/weather/current`), payload); await writeEvent(`天氣同步：${payload.place} ${payload.temp}°C`, "weather"); toast("已同步香港天氣到接收端。", "success"); } catch (err) { toast(`天氣同步失敗：${err.message}`, "error"); } }
    async function signInGoogleCalendar() { try { let result; try { result = await signInWithPopup(auth, calendarProvider); } catch (popupErr) { if (["auth/popup-blocked", "auth/cancelled-popup-request", "auth/operation-not-supported-in-this-environment"].includes(popupErr.code)) { await signInWithRedirect(auth, calendarProvider); return; } throw popupErr; } const credential = GoogleAuthProvider.credentialFromResult(result); state.lastGoogleAccessToken = credential?.accessToken || ""; toast("Google 已登入，已嘗試取得日曆讀取權限。", "success"); } catch (err) { toast(`Google 登入失敗：${err.message}`, "error"); } }
    async function syncGoogleCalendarNextEvent() { if (!state.lastGoogleAccessToken) return toast("未有 Google Calendar access token，請先登入授權。", "error"); try { const now = new Date().toISOString(); const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(now)}&singleEvents=true&orderBy=startTime&maxResults=1`; const res = await fetch(url, { headers:{ Authorization:`Bearer ${state.lastGoogleAccessToken}` } }); if (!res.ok) throw new Error(`Google Calendar HTTP ${res.status}`); const data = await res.json(); const event = data.items?.[0]; if (!event) return toast("Google 日曆暫時沒有下一個事件。", "info"); const startRaw = event.start?.dateTime || event.start?.date; const start = startRaw ? new Date(startRaw) : null; const time = start ? start.toLocaleTimeString("zh-HK", { hour:"2-digit", minute:"2-digit" }) : "全天"; const title = event.summary || "未命名日程"; const payload = { source:"google_calendar", title, time, subtitle:event.location ? `${time}｜${event.location}` : `${time}｜Google Calendar`, updatedAt:serverTimestamp(), localTime:new Date().toISOString() }; await set(ref(db, `${BASE}/schedule/current`), payload); await sendBroadcast({ title:"Google 日曆提醒", message:`${time} ${title}`, soundId:"soft", ttsText:`下一個日程，${time}，${title}` }); toast("已同步下一個 Google 日曆事件到接收端。", "success"); } catch (err) { toast(`Google 日曆同步失敗：${err.message}`, "error"); } }
    function buildStatusButtons() { const labels = { preparing:["準備收工","啟動回家任務"], leaving:["已經出發","通知家中我已離開"], transit:["搭緊車","更新為回家途中"], nearby:["到樓下","高亮提示，適合開門"], arrived:["已到屋企","完成回家任務"], delayed:["會遲少少","延誤通知"], quiet:["靜音模式","降低干擾，只顯示提醒"], emergency:["重要通知","高優先級，慎用"] }; const wrap = $("statusButtons"); wrap.innerHTML = ""; Object.entries(labels).forEach(([key,[title,desc]]) => { const btn = document.createElement("button"); btn.className = `btn ${key === "nearby" ? "primary" : ""} ${key === "emergency" ? "danger" : ""}`; btn.innerHTML = `<strong>${title}</strong><span>${desc}</span>`; btn.addEventListener("click", () => sendStatus(key)); wrap.appendChild(btn); }); }
    function renderPreview(items) { const list = $("eventPreview"); list.innerHTML = ""; if (!items.length) { list.innerHTML = `<div class="event-item"><div class="event-time">--:--</div><div class="event-text">暫時未有事件。</div></div>`; return; } items.forEach(item => { const date = item.localTime ? new Date(item.localTime) : new Date(); const div = document.createElement("div"); div.className = "event-item"; div.innerHTML = `<div class="event-time">${fmtTime(date)}</div><div class="event-text">${safeText(item.text, "家庭事件")}</div>`; list.appendChild(div); }); }
    function bindUI() { document.querySelectorAll("[data-sound]").forEach(btn => btn.addEventListener("click", () => sendSound(btn.dataset.sound))); $("sendCustomBtn").addEventListener("click", async () => { const title = $("customTitle").value.trim() || "家庭通知"; const message = $("customMessage").value.trim(); if (!message) return toast("請先輸入廣播內容。", "error"); try { await sendBroadcast({ title, message, soundId:$("customSound").value, ttsText:message }); toast("自訂通知已發送。", "success"); } catch (err) { toast(`自訂通知失敗：${err.message}`, "error"); } }); $("sendScheduleBtn").addEventListener("click", sendManualSchedule); $("googleSignInBtn").addEventListener("click", signInGoogleCalendar); $("syncCalendarBtn").addEventListener("click", syncGoogleCalendarNextEvent); $("googleSignOutBtn").addEventListener("click", async () => { await signOut(auth); state.lastGoogleAccessToken = ""; toast("已登出 Google。", "success"); }); $("refreshWeatherBtn").addEventListener("click", fetchHongKongWeather); $("clearEventsBtn").addEventListener("click", async () => { try { await remove(ref(db, `${BASE}/events`)); toast("事件流已清空。", "success"); } catch (err) { toast(`清空失敗：${err.message}`, "error"); } }); $("testReceiverBtn").addEventListener("click", () => sendBroadcast({ title:"測試通知", message:"家庭通知控制中心測試成功。", soundId:"soft", ttsText:"家庭通知控制中心測試成功。" })); $("saveSettingsBtn").addEventListener("click", () => { const dbUrl = $("databaseUrlInput").value.trim(); const operator = $("operatorNameInput").value.trim(); if (dbUrl) localStorage.setItem("hcc_database_url", dbUrl); if (operator) localStorage.setItem("hcc_operator_name", operator); toast("設定已儲存，即將重新載入。", "success"); setTimeout(() => location.reload(), 650); }); }
    function setupAuth() { getRedirectResult(auth).then(result => { if (result) { const credential = GoogleAuthProvider.credentialFromResult(result); state.lastGoogleAccessToken = credential?.accessToken || ""; toast("Google redirect 登入完成。", "success"); } }).catch(err => toast(`Redirect 登入失敗：${err.message}`, "error")); onAuthStateChanged(auth, user => { state.user = user; $("authState").textContent = user ? `已登入：${user.displayName || user.email || user.uid}` : "未登入 Google"; }); }
    function setupConnection() { onValue(ref(db, ".info/connected"), snap => { state.connected = !!snap.val(); const dot = $("connectionDot"), text = $("connectionText"); dot.className = "dot"; if (state.connected) { dot.classList.add("online"); text.textContent = "Firebase 已連線"; } else { dot.classList.add("danger"); text.textContent = "Firebase 離線"; } }); onValue(ref(db, `${BASE}/events`), snap => { const val = snap.val() || {}; const items = Object.values(val).sort((a,b) => new Date(b.localTime || 0) - new Date(a.localTime || 0)).slice(0,6); renderPreview(items); }); }
    function initFields() { $("databaseUrlInput").value = databaseURL; $("operatorNameInput").value = localStorage.getItem("hcc_operator_name") || "James"; }
    function boot() { initFields(); buildStatusButtons(); bindUI(); setupAuth(); setupConnection(); logSafe("sender_boot"); }
    boot();
  </script>
</body>
