<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06111f" />
  <meta name="application-name" content="家庭通知控制中心｜接收端" />
  <meta name="apple-mobile-web-app-title" content="家庭通知控制中心" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta property="og:title" content="家庭通知控制中心｜接收端" />
  <meta property="og:description" content="iPad 全螢幕家庭通知接收端。" />
  <title>家庭通知控制中心｜接收端</title>
  <style>
    :root {
      --bg-0: #020713;
      --bg-1: #071324;
      --bg-2: #0d1a36;
      --glass: rgba(255,255,255,.105);
      --glass-strong: rgba(255,255,255,.16);
      --glass-soft: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.18);
      --border-strong: rgba(255,255,255,.30);
      --text: rgba(247,251,255,.96);
      --sub: rgba(219,232,255,.74);
      --muted: rgba(219,232,255,.50);
      --cyan: #68e8ff;
      --blue: #78a6ff;
      --purple: #a98cff;
      --green: #72f0ad;
      --amber: #ffd166;
      --red: #ff6b8b;
      --shadow: 0 32px 90px rgba(0,0,0,.46);
      --radius-xl: 36px;
      --radius-lg: 26px;
      --radius-md: 20px;
      --smooth: 520ms cubic-bezier(.2,.8,.2,1);
      --slow: 1200ms cubic-bezier(.2,.8,.2,1);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang HK", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg-0); color: var(--text); }
    body {
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      touch-action: manipulation;
    }
    body::before, body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: -3;
    }
    body::before {
      inset: -24%;
      background:
        radial-gradient(circle at 18% 20%, rgba(104,232,255,.22), transparent 30%),
        radial-gradient(circle at 82% 8%, rgba(169,140,255,.20), transparent 32%),
        radial-gradient(circle at 62% 84%, rgba(80,110,255,.18), transparent 38%),
        linear-gradient(145deg, #020713 0%, #071324 48%, #101a34 100%);
      animation: drift 42s ease-in-out infinite alternate;
    }
    body::after {
      inset: 0;
      z-index: -2;
      opacity: .31;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.42) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(104,232,255,.32) 0 1px, transparent 1.6px);
      background-size: 90px 90px, 146px 146px;
      background-position: 0 0, 38px 46px;
      animation: stars 120s linear infinite;
    }
    body.legacy::before, body.legacy::after { animation: none !important; opacity: .25; }
    @keyframes drift { from { transform: translate3d(-1.5%, -1%, 0) scale(1); } to { transform: translate3d(1.5%, 1%, 0) scale(1.04); } }
    @keyframes stars { from { background-position: 0 0, 38px 46px; } to { background-position: 900px 700px, 1100px 900px; } }
    .shell { width: min(1320px, calc(100vw - 38px)); height: calc(100vh - 38px); margin: 19px auto; display: grid; grid-template-columns: 1.38fr .82fr; gap: 18px; }
    .panel {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      background: linear-gradient(145deg, rgba(255,255,255,.15), rgba(255,255,255,.055));
      box-shadow: var(--shadow);
      backdrop-filter: blur(34px) saturate(150%);
      -webkit-backdrop-filter: blur(34px) saturate(150%);
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.26), transparent 28%, transparent 76%, rgba(104,232,255,.10));
      opacity: .8;
    }
    .inner { position: relative; z-index: 1; height: 100%; padding: 30px; }
    .mission .inner { display: flex; flex-direction: column; justify-content: space-between; }
    .eyebrow { letter-spacing: .22em; text-transform: uppercase; font-size: 12px; color: var(--cyan); font-weight: 800; margin-bottom: 18px; }
    h1, h2, p { margin: 0; }
    .title { font-size: clamp(54px, 7vw, 96px); line-height: .98; letter-spacing: -.06em; font-weight: 850; text-shadow: 0 0 38px rgba(104,232,255,.14); transition: transform var(--smooth), opacity var(--smooth); }
    .subtitle { max-width: 820px; margin-top: 24px; color: var(--sub); font-size: clamp(20px, 2.35vw, 32px); line-height: 1.45; }
    .status-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 26px; }
    .pill { display:inline-flex; align-items:center; gap:8px; min-height:34px; border:1px solid var(--border); background: rgba(255,255,255,.075); border-radius:999px; padding: 8px 13px; color: var(--sub); font-size:13px; backdrop-filter: blur(16px); }
    .dot { width:9px; height:9px; border-radius:999px; background: var(--amber); box-shadow:0 0 18px rgba(255,209,102,.5); }
    .dot.online { background: var(--green); box-shadow:0 0 18px rgba(114,240,173,.55); }
    .dot.danger { background: var(--red); box-shadow:0 0 18px rgba(255,107,139,.55); }
    .progress-area { margin-top: 42px; }
    .progress-meta { display:flex; justify-content:space-between; align-items:flex-end; gap:16px; margin-bottom: 18px; }
    .muted { color: var(--muted); font-size: 14px; }
    .eta { margin-top: 8px; font-size: clamp(36px, 5vw, 70px); font-weight: 820; letter-spacing: -.06em; }
    .eta span { margin-left: 12px; font-size: 14px; letter-spacing:.18em; color: var(--muted); vertical-align: middle; }
    .progress-track { height: 17px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.11); }
    .progress-fill { width:0%; height:100%; border-radius:inherit; background: linear-gradient(90deg, var(--cyan), var(--blue), var(--purple)); box-shadow: 0 0 38px rgba(104,232,255,.42); transition: width 800ms cubic-bezier(.2,.8,.2,1); }
    .steps { display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; margin-top:12px; }
    .step { color: var(--muted); font-size:13px; border-top:1px solid rgba(255,255,255,.12); padding-top:9px; }
    .step.active { color: var(--text); border-color: var(--cyan); }
    .side { display:grid; grid-template-rows: auto auto 1fr; gap:18px; min-height:0; }
    .card-title { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:18px; }
    .card-title h2 { font-size: 20px; letter-spacing:-.03em; }
    .card-title small { color: var(--muted); }
    .metric-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .metric { min-height: 116px; padding: 16px; border-radius: var(--radius-md); border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .label { color: var(--muted); font-size: 12px; letter-spacing:.08em; text-transform: uppercase; margin-bottom: 10px; }
    .value { font-size: 30px; font-weight: 800; letter-spacing: -.05em; }
    .desc { margin-top:8px; color: var(--sub); font-size: 14px; line-height: 1.42; }
    .event-list { display:grid; gap:10px; max-height: 100%; overflow:auto; padding-right: 4px; }
    .event-item { display:grid; grid-template-columns: 58px 1fr; gap:10px; align-items:start; border-radius:18px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.055); padding:12px; }
    .event-time { color: var(--cyan); font-weight:750; font-size: 12px; }
    .event-text { color: var(--sub); line-height:1.35; font-size:14px; }
    .capsule {
      position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-130%);
      z-index: 40; width: min(720px, calc(100vw - 34px)); display:flex; align-items:center; gap:14px;
      border-radius:999px; border:1px solid var(--border-strong); padding: 14px 18px;
      background: rgba(5,12,25,.64); box-shadow: 0 24px 70px rgba(0,0,0,.44), 0 0 44px rgba(104,232,255,.18);
      backdrop-filter: blur(30px) saturate(160%); -webkit-backdrop-filter: blur(30px) saturate(160%);
      transition: transform var(--smooth), opacity var(--smooth); opacity:0;
    }
    .capsule.show { transform: translateX(-50%) translateY(0); opacity:1; }
    .wave { width:38px; height:38px; border-radius:50%; display:grid; place-items:center; color:var(--cyan); background:rgba(104,232,255,.11); box-shadow:0 0 28px rgba(104,232,255,.22); animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{ transform:scale(1); opacity:.75;} 50%{ transform:scale(1.08); opacity:1;} }
    .capsule-title { font-weight: 850; letter-spacing:-.02em; }
    .capsule-message { color: var(--sub); font-size: 13px; margin-top:2px; }
    .audio-gate { position: fixed; inset:0; z-index:50; display:none; place-items:center; padding:20px; background:rgba(0,0,0,.38); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
    .audio-gate.show { display:grid; }
    .audio-card { width:min(560px, calc(100vw - 30px)); }
    .audio-card .inner { text-align:center; padding:34px; }
    .audio-card h2 { font-size:32px; letter-spacing:-.05em; margin-top: 14px; }
    .audio-card p { margin-top:12px; color:var(--sub); line-height:1.5; }
    .orb { width:64px; height:64px; margin:auto; border-radius:22px; background: radial-gradient(circle at 34% 28%, #fff, var(--cyan) 28%, var(--blue) 64%, var(--purple)); box-shadow: 0 0 38px rgba(104,232,255,.36); }
    .actions { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:20px; }
    .btn { appearance:none; border:1px solid rgba(255,255,255,.18); border-radius:18px; background:rgba(255,255,255,.09); color:var(--text); padding:13px 16px; font-weight:800; cursor:pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,.12); }
    .btn.primary { background: linear-gradient(135deg, rgba(104,232,255,.26), rgba(120,166,255,.18)); border-color: rgba(104,232,255,.34); }
    .toast { position: fixed; right: 18px; bottom: 18px; z-index: 60; display:grid; gap:10px; width:min(360px, calc(100vw - 36px)); }
    .toast-item { border-radius:20px; border:1px solid rgba(255,255,255,.16); background:rgba(8,16,31,.74); padding:14px 16px; color:var(--sub); backdrop-filter: blur(20px); box-shadow: 0 16px 40px rgba(0,0,0,.30); }
    .corner-settings { position:fixed; right:14px; top:14px; z-index:30; display:flex; gap:8px; opacity:.28; transition: opacity var(--smooth); }
    .corner-settings:hover { opacity:1; }
    .mini { font-size:12px; padding:8px 10px; border-radius:999px; }
    .hidden { display:none !important; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    @media (max-width: 920px) { body { overflow:auto; } .shell { height:auto; min-height:calc(100vh - 30px); grid-template-columns:1fr; margin:15px auto; } .side { grid-template-rows:auto; } }
    @media (max-width: 640px) { .shell { width:100%; margin:0; height:auto; } .panel { border-radius:0; } .metric-grid { grid-template-columns:1fr; } .title { font-size:46px; } }
    @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration: 1ms !important; transition-duration: 80ms !important; } }
  </style>
</head>
<body>
  <div id="capsule" class="capsule" role="status" aria-live="polite">
    <div class="wave">◌</div>
    <div>
      <div id="capsuleTitle" class="capsule-title">家庭通知控制中心</div>
      <div id="capsuleMessage" class="capsule-message">接收端待命中</div>
    </div>
  </div>

  <div id="audioGate" class="audio-gate">
    <div class="panel audio-card">
      <div class="inner">
        <div class="orb"></div>
        <h2>啟動家庭音響</h2>
        <p>舊版 iPad / Safari 通常要先點擊一次，之後手機端先可以觸發提示音同語音廣播。</p>
        <div class="actions">
          <button id="enableAudioBtn" class="btn primary">啟動音響系統</button>
          <button id="skipAudioBtn" class="btn">先靜音顯示</button>
        </div>
      </div>
    </div>
  </div>

  <div class="corner-settings">
    <button id="fullscreenBtn" class="btn mini">全螢幕</button>
    <button id="legacyBtn" class="btn mini">穩定模式</button>
  </div>

  <div class="toast" id="toast"></div>

  <main class="shell">
    <section class="panel mission">
      <div class="inner">
        <div>
          <div class="eyebrow" id="missionEyebrow">HOME STANDBY</div>
          <h1 class="title" id="missionTitle">家庭待命中</h1>
          <p class="subtitle" id="missionSubtitle">接收端已準備好，等待手機端發送通知、狀態、語音或日程提醒。</p>
          <div class="status-row">
            <span class="pill"><span id="connectionDot" class="dot"></span><span id="connectionText">連線檢查中</span></span>
            <span class="pill"><span id="audioDot" class="dot"></span><span id="audioText">音響未啟動</span></span>
            <span class="pill">最後更新：<span id="lastUpdate">--:--</span></span>
          </div>
        </div>
        <div class="progress-area">
          <div class="progress-meta">
            <div>
              <div class="muted">回家任務進度</div>
              <div class="eta" id="etaText">待命<span>ETA</span></div>
            </div>
            <div class="pill" id="priorityPill">NORMAL</div>
          </div>
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
          <div class="steps" id="steps"></div>
        </div>
      </div>
    </section>

    <aside class="side">
      <section class="panel">
        <div class="inner">
          <div class="card-title"><h2>環境與日程</h2><small id="weatherUpdated">未同步</small></div>
          <div class="metric-grid">
            <div class="metric"><div class="label">香港天氣</div><div class="value" id="weatherTemp">--°C</div><div class="desc" id="weatherDesc">等待天氣資料</div></div>
            <div class="metric"><div class="label">下一件事</div><div class="value" id="scheduleTime">--:--</div><div class="desc" id="scheduleTitle">未有日程</div></div>
            <div class="metric"><div class="label">接收端</div><div class="value" id="deviceName">iPad</div><div class="desc" id="deviceStatus">正在建立心跳</div></div>
            <div class="metric"><div class="label">模式</div><div class="value" id="displayMode">Awaiting</div><div class="desc">可由手機端即時切換</div></div>
          </div>
        </div>
      </section>
      <section class="panel" style="min-height:0;">
        <div class="inner" style="min-height:0; display:flex; flex-direction:column;">
          <div class="card-title"><h2>今日事件流</h2><small>最近 8 條</small></div>
          <div id="eventList" class="event-list">
            <div class="event-item"><div class="event-time">--:--</div><div class="event-text">等待家庭通知控制中心啟動。</div></div>
          </div>
        </div>
      </section>
    </aside>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAnalytics, isSupported as analyticsIsSupported, logEvent } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
    import { getDatabase, ref, update, onValue, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDl6x9gIn0TTyKWHVf_tPbhm3OjpOxJgzQ",
      authDomain: "homecontrol-ee898.firebaseapp.com",
      projectId: "homecontrol-ee898",
      storageBucket: "homecontrol-ee898.firebasestorage.app",
      messagingSenderId: "634615992463",
      appId: "1:634615992463:web:7a6b761a597a99d0f8e0fa",
      measurementId: "G-PMKY0NSJ6P"
    };

    const app = initializeApp(firebaseConfig);
    let analytics = null;
    analyticsIsSupported().then(ok => { if (ok) analytics = getAnalytics(app); }).catch(() => {});

    const DEFAULT_DB_URL = "https://homecontrol-ee898-default-rtdb.firebaseio.com";
    const urlDb = new URLSearchParams(location.search).get("db");
    if (urlDb) localStorage.setItem("hcc_database_url", urlDb);
    const databaseURL = localStorage.getItem("hcc_database_url") || DEFAULT_DB_URL;
    const db = getDatabase(app, databaseURL);
    const BASE = "homeNotificationCenter/global";
    const DEVICE_ID = localStorage.getItem("hcc_receiver_id") || `receiver_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    localStorage.setItem("hcc_receiver_id", DEVICE_ID);

    const $ = id => document.getElementById(id);
    const fmtTime = (date = new Date()) => date.toLocaleTimeString("zh-HK", { hour: "2-digit", minute: "2-digit" });
    const safeText = (v, f = "") => (v === undefined || v === null || v === "") ? f : String(v);
    const state = { audioReady: false, audioCtx: null, lastBroadcastId: localStorage.getItem("hcc_last_broadcast_id") || "", connected: false };
    const stepLabels = ["準備", "出發", "途中", "附近", "到家"];
    const idle = { title:"家庭待命中", subtitle:"接收端已準備好，等待手機端發送通知。", eyebrow:"HOME STANDBY", progress:0, eta:"待命", priority:"NORMAL", key:"idle" };

    function logEventSafe(name, params = {}) { try { if (analytics) logEvent(analytics, name, params); } catch (_) {} }
    function toast(message, type = "info") { const wrap = $("toast"); const item = document.createElement("div"); item.className = "toast-item"; item.textContent = message; if (type === "error") item.style.borderColor = "rgba(255,107,139,.36)"; if (type === "success") item.style.borderColor = "rgba(114,240,173,.36)"; wrap.appendChild(item); setTimeout(() => item.remove(), 4200); }

    function setupSteps(progress = 0) {
      const steps = $("steps"); steps.innerHTML = "";
      const activeIndex = progress >= 100 ? 4 : Math.max(0, Math.floor(progress / 25));
      stepLabels.forEach((label, idx) => { const div = document.createElement("div"); div.className = `step ${idx <= activeIndex && progress > 0 ? "active" : ""}`; div.textContent = label; steps.appendChild(div); });
    }
    function updateReceiverStatus(data = {}) {
      const merged = { ...idle, ...data };
      $("missionEyebrow").textContent = safeText(merged.eyebrow, "HOME STATUS");
      $("missionTitle").textContent = safeText(merged.title, "家庭待命中");
      $("missionSubtitle").textContent = safeText(merged.subtitle, "等待手機端發送通知。");
      $("etaText").innerHTML = `${safeText(merged.eta, "待命")}<span>ETA</span>`;
      $("priorityPill").textContent = safeText(merged.priority, "NORMAL");
      $("progressFill").style.width = `${Number(merged.progress || 0)}%`;
      $("lastUpdate").textContent = fmtTime();
      $("displayMode").textContent = safeText(merged.modeLabel || merged.key || "Awaiting");
      setupSteps(Number(merged.progress || 0));
      document.title = `${safeText(merged.title, "家庭通知控制中心")}｜接收端`;
    }
    function showCapsule(title, message) { $("capsuleTitle").textContent = safeText(title, "家庭通知"); $("capsuleMessage").textContent = safeText(message, ""); const cap = $("capsule"); cap.classList.add("show"); clearTimeout(showCapsule.timer); showCapsule.timer = setTimeout(() => cap.classList.remove("show"), 8200); }
    function updateAudioUI() { const dot = $("audioDot"), text = $("audioText"); dot.className = "dot"; if (state.audioReady) { dot.classList.add("online"); text.textContent = "音響已啟動"; } else if (localStorage.getItem("hcc_audio_skip")) { text.textContent = "靜音顯示中"; } else { text.textContent = "音響未啟動"; } }
    async function unlockAudio() { try { const AudioContext = window.AudioContext || window.webkitAudioContext; if (!AudioContext) throw new Error("此瀏覽器不支援 AudioContext"); state.audioCtx = state.audioCtx || new AudioContext(); if (state.audioCtx.state === "suspended") await state.audioCtx.resume(); const osc = state.audioCtx.createOscillator(); const gain = state.audioCtx.createGain(); gain.gain.value = .0001; osc.frequency.value = 440; osc.connect(gain).connect(state.audioCtx.destination); osc.start(); osc.stop(state.audioCtx.currentTime + .04); state.audioReady = true; localStorage.setItem("hcc_audio_ready", "1"); localStorage.removeItem("hcc_audio_skip"); $("audioGate").classList.remove("show"); updateAudioUI(); toast("音響系統已啟動，可以接收手機端提示音。", "success"); await playTone("soft"); } catch (err) { toast(`音響啟動失敗：${err.message}`, "error"); updateAudioUI(); } }
    async function playTone(soundId = "soft") { if (soundId === "none") return; if (!state.audioReady || !state.audioCtx) throw new Error("Audio not unlocked"); const ctx = state.audioCtx; if (ctx.state === "suspended") await ctx.resume(); const now = ctx.currentTime; const patterns = { soft:[{f:523,t:0,d:.13},{f:659,t:.13,d:.16}], ping:[{f:880,t:0,d:.08}], arrival:[{f:523,t:0,d:.11},{f:784,t:.12,d:.14},{f:1046,t:.29,d:.22}], alert:[{f:740,t:0,d:.12},{f:580,t:.16,d:.12},{f:740,t:.32,d:.16}] }; (patterns[soundId] || patterns.soft).forEach(({f,t,d}) => { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = soundId === "alert" ? "square" : "sine"; osc.frequency.setValueAtTime(f, now + t); gain.gain.setValueAtTime(.0001, now + t); gain.gain.exponentialRampToValueAtTime(soundId === "alert" ? .09 : .055, now + t + .015); gain.gain.exponentialRampToValueAtTime(.0001, now + t + d); osc.connect(gain).connect(ctx.destination); osc.start(now + t); osc.stop(now + t + d + .03); }); }
    function speakText(text) { if (!text || !("speechSynthesis" in window)) return; try { speechSynthesis.cancel(); const utter = new SpeechSynthesisUtterance(text); utter.lang = "zh-HK"; utter.rate = .92; utter.pitch = 1.03; utter.volume = 1; speechSynthesis.speak(utter); } catch (_) {} }
    async function handleBroadcast(data = {}) { if (!data.id || data.id === state.lastBroadcastId) return; state.lastBroadcastId = data.id; localStorage.setItem("hcc_last_broadcast_id", data.id); showCapsule(data.title || "家庭通知", data.message || data.ttsText || ""); try { if (data.soundId && data.soundId !== "none") await playTone(data.soundId); if (data.ttsText) speakText(data.ttsText); } catch (err) { toast("接收端未啟動音響，已改用視覺提示。", "error"); } }
    function updateScheduleUI(data = {}) { $("scheduleTime").textContent = safeText(data.time, "--:--"); $("scheduleTitle").textContent = safeText(data.title || data.subtitle, "未有日程"); }
    function updateWeatherUI(data = {}) { $("weatherTemp").textContent = data.temp ? `${data.temp}°C` : "--°C"; $("weatherDesc").textContent = safeText(data.desc || data.warning, "等待天氣資料"); $("weatherUpdated").textContent = data.localTime ? `更新 ${fmtTime(new Date(data.localTime))}` : "未同步"; }
    function renderEvents(items) { const list = $("eventList"); list.innerHTML = ""; if (!items.length) { list.innerHTML = `<div class="event-item"><div class="event-time">--:--</div><div class="event-text">暫時未有事件。</div></div>`; return; } items.forEach(item => { const date = item.localTime ? new Date(item.localTime) : new Date(); const div = document.createElement("div"); div.className = "event-item"; div.innerHTML = `<div class="event-time">${fmtTime(date)}</div><div class="event-text">${safeText(item.text, "家庭事件")}</div>`; list.appendChild(div); }); }
    async function setupHeartbeat() { try { const name = localStorage.getItem("hcc_receiver_name") || "客廳 iPad"; $("deviceName").textContent = name; const deviceRef = ref(db, `${BASE}/devices/${DEVICE_ID}`); await update(deviceRef, { online:true, mode:"receiver", name, userAgent:navigator.userAgent, localTime:new Date().toISOString(), lastSeen:serverTimestamp() }); await onDisconnect(deviceRef).update({ online:false, localTime:new Date().toISOString(), lastSeen:serverTimestamp() }); setInterval(() => update(deviceRef, { online:true, mode:"receiver", name, localTime:new Date().toISOString(), lastSeen:serverTimestamp() }).catch(() => {}), 30000); $("deviceStatus").textContent = "心跳在線"; } catch (err) { $("deviceStatus").textContent = "心跳建立失敗"; } }
    function setupFirebaseListeners() { onValue(ref(db, ".info/connected"), snap => { state.connected = !!snap.val(); const dot = $("connectionDot"), text = $("connectionText"); dot.className = "dot"; if (state.connected) { dot.classList.add("online"); text.textContent = "Firebase 已連線"; } else { dot.classList.add("danger"); text.textContent = "Firebase 離線"; } }); onValue(ref(db, `${BASE}/status/current`), snap => updateReceiverStatus(snap.val() || idle), err => toast(`讀取狀態失敗：${err.message}`, "error")); onValue(ref(db, `${BASE}/broadcast/current`), snap => handleBroadcast(snap.val() || {}), err => toast(`讀取廣播失敗：${err.message}`, "error")); onValue(ref(db, `${BASE}/events`), snap => { const val = snap.val() || {}; const items = Object.values(val).sort((a,b) => new Date(b.localTime || 0) - new Date(a.localTime || 0)).slice(0,8); renderEvents(items); }); onValue(ref(db, `${BASE}/schedule/current`), snap => updateScheduleUI(snap.val() || {})); onValue(ref(db, `${BASE}/weather/current`), snap => updateWeatherUI(snap.val() || {})); }
    function bindUI() { $("enableAudioBtn").addEventListener("click", unlockAudio); $("skipAudioBtn").addEventListener("click", () => { localStorage.setItem("hcc_audio_skip", "1"); $("audioGate").classList.remove("show"); updateAudioUI(); toast("已切換成靜音顯示。", "info"); }); $("fullscreenBtn").addEventListener("click", async () => { try { await document.documentElement.requestFullscreen?.(); } catch (_) {} }); $("legacyBtn").addEventListener("click", () => { const enabled = !document.body.classList.contains("legacy"); document.body.classList.toggle("legacy", enabled); localStorage.setItem("hcc_legacy", enabled ? "1" : "0"); toast(enabled ? "已開啟穩定模式。" : "已關閉穩定模式。", "success"); }); document.addEventListener("visibilitychange", () => { if (!document.hidden) updateReceiverStatus(idle); }); }
    function boot() { if (localStorage.getItem("hcc_legacy") === "1") document.body.classList.add("legacy"); setupSteps(0); updateAudioUI(); bindUI(); setupFirebaseListeners(); setupHeartbeat(); updateReceiverStatus(idle); if (!localStorage.getItem("hcc_audio_skip")) setTimeout(() => $("audioGate").classList.add("show"), 800); logEventSafe("receiver_boot"); }
    boot();
  </script>
