<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Home Control</title>

  <style>
    :root {
      --bg: #0b0c0d;
      --panel: #141516;
      --panel-soft: #1b1c1e;
      --text: #f4f1ea;
      --muted: rgba(244, 241, 234, 0.58);
      --line: rgba(244, 241, 234, 0.12);
      --line-strong: rgba(244, 241, 234, 0.22);
      --accent: #f2c46d;
      --accent-strong: #ffbe45;
      --danger: #d8d2c6;
      --ok: #d7ff9f;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      --radius-xl: 36px;
      --radius-lg: 26px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        ui-sans-serif,
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "Segoe UI",
        "PingFang HK",
        "Microsoft JhengHei",
        sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    .page {
      min-height: 100vh;
      padding: max(22px, env(safe-area-inset-top)) max(22px, env(safe-area-inset-right)) max(22px, env(safe-area-inset-bottom)) max(22px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.035), transparent 36%),
        var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 44px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      background: #111213;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .mark::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(242, 196, 109, 0.08);
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 14px;
      font-weight: 720;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .brand-subtitle {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.035);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #777;
    }

    .dot.online {
      background: var(--ok);
    }

    .dot.on {
      background: var(--accent);
    }

    .screen {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 18px;
      min-height: 0;
    }

    .clock-panel {
      position: relative;
      min-height: 0;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(28px, 5vw, 72px);
    }

    .clock-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent 75%);
      pointer-events: none;
    }

    .clock-content {
      position: relative;
      z-index: 1;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .time {
      display: flex;
      align-items: baseline;
      gap: clamp(8px, 1vw, 14px);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.07em;
      line-height: 0.86;
      user-select: none;
    }

    .time-main {
      font-size: clamp(68px, 14vw, 210px);
      font-weight: 760;
    }

    .time-ms {
      font-size: clamp(25px, 4.2vw, 68px);
      font-weight: 650;
      color: var(--accent);
      letter-spacing: -0.04em;
      min-width: 1.4em;
    }

    .date-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
      color: var(--muted);
      font-size: clamp(14px, 1.6vw, 20px);
      letter-spacing: 0.02em;
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--line-strong);
    }

    .side {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 18px;
      min-height: 0;
    }

    .device-panel {
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
    }

    .device-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 28px;
    }

    .device-label {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .device-name {
      margin: 0;
      font-size: 24px;
      font-weight: 760;
      letter-spacing: -0.03em;
    }

    .state-badge {
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .state-badge.active {
      color: #1d1608;
      background: var(--accent);
      border-color: transparent;
    }

    .power-visual {
      width: 172px;
      height: 172px;
      margin: 8px auto 30px;
      border-radius: 50%;
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08), transparent 48%),
        #101112;
      transition: 260ms ease;
    }

    .power-visual::before {
      content: "";
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      border: 1px solid rgba(244, 241, 234, 0.1);
    }

    .power-visual::after {
      content: "";
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid rgba(244, 241, 234, 0.42);
      border-top-color: transparent;
      transform: rotate(45deg);
      transition: 260ms ease;
    }

    .power-visual.on {
      background:
        radial-gradient(circle at 50% 42%, rgba(242,196,109,0.42), transparent 43%),
        #15130e;
      border-color: rgba(242, 196, 109, 0.42);
      box-shadow: 0 0 44px rgba(242, 196, 109, 0.16);
    }

    .power-visual.on::after {
      border-color: var(--accent);
      border-top-color: transparent;
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 17px 15px;
      min-height: 56px;
      font-size: 15px;
      font-weight: 720;
      cursor: pointer;
      transition:
        transform 140ms ease,
        opacity 140ms ease,
        background 180ms ease,
        border-color 180ms ease;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.975);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-primary {
      color: #17120a;
      background: var(--accent);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
    }

    .btn-wide {
      width: 100%;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
    }

    .info-panel {
      border-radius: var(--radius-lg);
      background: var(--panel-soft);
      border: 1px solid var(--line);
      padding: 18px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .info-item {
      min-width: 0;
    }

    .info-label {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-value {
      margin: 0;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bottom-log {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .log-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .worker-link {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--line-strong);
    }

    @media (max-width: 920px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100svh;
      }

      .screen {
        grid-template-columns: 1fr;
      }

      .clock-panel {
        min-height: 48svh;
      }

      .side {
        grid-template-rows: auto auto;
      }

      .device-panel {
        min-height: auto;
      }

      .power-visual {
        width: 150px;
        height: 150px;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 16px;
        gap: 14px;
      }

      .topbar {
        align-items: flex-start;
      }

      .brand-subtitle {
        max-width: 180px;
      }

      .top-status {
        padding: 8px 10px;
      }

      .clock-panel,
      .device-panel {
        border-radius: 28px;
      }

      .clock-panel {
        padding: 28px 22px;
      }

      .kicker {
        margin-bottom: 22px;
      }

      .time {
        gap: 8px;
      }

      .date-row {
        margin-top: 24px;
      }

      .button-row {
        grid-template-columns: 1fr;
      }

      .bottom-log {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div class="brand-text">
          <p class="brand-title">Home Control</p>
          <p class="brand-subtitle">Private display · Smart Life</p>
        </div>
      </div>

      <div class="top-status" id="networkStatus">
        <span class="dot" id="networkDot"></span>
        <span id="networkText">準備連線</span>
      </div>
    </header>

    <section class="screen">
      <section class="clock-panel" aria-label="Current time">
        <div class="clock-content">
          <div class="kicker">Local Time</div>

          <div class="time">
            <span class="time-main" id="timeMain">00:00:00</span>
            <span class="time-ms" id="timeMs">00</span>
          </div>

          <div class="date-row">
            <span id="dateText">正在讀取日期</span>
            <span class="divider-dot"></span>
            <span id="weekdayText">星期</span>
          </div>
        </div>
      </section>

      <aside class="side">
        <section class="device-panel">
          <div>
            <div class="device-head">
              <div>
                <p class="device-label">Device</p>
                <h1 class="device-name">枱底氛圍燈</h1>
              </div>
              <div class="state-badge" id="stateBadge">未知</div>
            </div>

            <div class="power-visual" id="powerVisual" aria-hidden="true"></div>
          </div>

          <div class="actions">
            <div class="button-row">
              <button class="btn-primary" id="onBtn">開燈</button>
              <button class="btn-secondary" id="offBtn">關燈</button>
            </div>
            <button class="btn-wide" id="refreshBtn">刷新狀態</button>
          </div>
        </section>

        <section class="info-panel">
          <div class="info-grid">
            <div class="info-item">
              <p class="info-label">Control</p>
              <p class="info-value" id="controlStatus">待命</p>
            </div>
            <div class="info-item">
              <p class="info-label">Worker</p>
              <p class="info-value">Cloudflare</p>
            </div>
            <div class="info-item">
              <p class="info-label">Device ID</p>
              <p class="info-value">...71vnuj</p>
            </div>
            <div class="info-item">
              <p class="info-label">Code</p>
              <p class="info-value">switch_1</p>
            </div>
          </div>
        </section>
      </aside>
    </section>

    <footer class="bottom-log">
      <span class="log-text" id="logText">系統已載入，等待操作。</span>
      <a class="worker-link" href="https://homecontrol.chimhinhin.workers.dev/status" target="_blank" rel="noreferrer">
        查看狀態
      </a>
    </footer>
  </main>

  <script>
    const WORKER_URL = "https://homecontrol.chimhinhin.workers.dev";

    const timeMainEl = document.getElementById("timeMain");
    const timeMsEl = document.getElementById("timeMs");
    const dateTextEl = document.getElementById("dateText");
    const weekdayTextEl = document.getElementById("weekdayText");

    const networkDotEl = document.getElementById("networkDot");
    const networkTextEl = document.getElementById("networkText");
    const powerVisualEl = document.getElementById("powerVisual");
    const stateBadgeEl = document.getElementById("stateBadge");
    const controlStatusEl = document.getElementById("controlStatus");
    const logTextEl = document.getElementById("logText");

    const onBtn = document.getElementById("onBtn");
    const offBtn = document.getElementById("offBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    onBtn.addEventListener("click", () => controlLight("on"));
    offBtn.addEventListener("click", () => controlLight("off"));
    refreshBtn.addEventListener("click", refreshStatus);

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function updateClock() {
      const now = new Date();

      const hh = pad2(now.getHours());
      const mm = pad2(now.getMinutes());
      const ss = pad2(now.getSeconds());
      const cs = pad2(Math.floor(now.getMilliseconds() / 10));

      timeMainEl.textContent = `${hh}:${mm}:${ss}`;
      timeMsEl.textContent = cs;

      requestAnimationFrame(updateClock);
    }

    function updateDate() {
      const now = new Date();

      const dateFormatter = new Intl.DateTimeFormat("zh-HK", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      const weekdayFormatter = new Intl.DateTimeFormat("zh-HK", {
        weekday: "long"
      });

      dateTextEl.textContent = dateFormatter.format(now);
      weekdayTextEl.textContent = weekdayFormatter.format(now);
    }

    function setBusy(isBusy) {
      onBtn.disabled = isBusy;
      offBtn.disabled = isBusy;
      refreshBtn.disabled = isBusy;
    }

    function setLog(message) {
      logTextEl.textContent = message;
    }

    function setConnection(state, text) {
      networkDotEl.className = "dot";

      if (state === "online") {
        networkDotEl.classList.add("online");
      }

      if (state === "on") {
        networkDotEl.classList.add("on");
      }

      networkTextEl.textContent = text;
    }

    function setPowerState(isOn) {
      powerVisualEl.classList.toggle("on", isOn);
      stateBadgeEl.classList.toggle("active", isOn);

      if (isOn) {
        stateBadgeEl.textContent = "已開啟";
        controlStatusEl.textContent = "燈光開啟";
        setConnection("on", "燈光已開");
      } else {
        stateBadgeEl.textContent = "已關閉";
        controlStatusEl.textContent = "燈光關閉";
        setConnection("online", "已連線");
      }
    }

    async function controlLight(action) {
      const isOn = action === "on";

      setBusy(true);
      setLog(isOn ? "正在開啟枱底氛圍燈..." : "正在關閉枱底氛圍燈...");
      controlStatusEl.textContent = "處理中";

      try {
        const response = await fetch(`${WORKER_URL}/control?action=${action}`, {
          method: "GET",
          cache: "no-store"
        });

        const data = await response.json();

        if (!response.ok || data.ok !== true) {
          throw new Error(JSON.stringify(data, null, 2));
        }

        setPowerState(isOn);
        setLog(isOn ? "枱底氛圍燈已開啟。" : "枱底氛圍燈已關閉。");
      } catch (error) {
        setConnection("", "控制失敗");
        controlStatusEl.textContent = "錯誤";
        setLog(`操作失敗：${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    async function refreshStatus() {
      setBusy(true);
      setLog("正在刷新設備狀態...");
      controlStatusEl.textContent = "刷新中";

      try {
        const response = await fetch(`${WORKER_URL}/status`, {
          method: "GET",
          cache: "no-store"
        });

        const data = await response.json();

        if (!response.ok || data.ok !== true) {
          throw new Error(JSON.stringify(data, null, 2));
        }

        const result = data?.tuya?.result;
        const switchItem = Array.isArray(result)
          ? result.find(item => item.code === "switch_1")
          : null;

        if (!switchItem) {
          setConnection("online", "已連線");
          controlStatusEl.textContent = "已連線";
          setLog("已連線，但狀態資料入面未搵到 switch_1。");
          return;
        }

        setPowerState(switchItem.value === true);
        setLog("設備狀態已刷新。");
      } catch (error) {
        setConnection("", "連線失敗");
        controlStatusEl.textContent = "錯誤";
        setLog(`刷新失敗：${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    updateClock();
    updateDate();
    setInterval(updateDate, 60 * 1000);

    window.addEventListener("load", () => {
      refreshStatus();
    });
  </script>
</body>
</html>
