<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050b18" />
  <meta name="application-name" content="家庭通知控制中心｜接收端" />
  <meta name="apple-mobile-web-app-title" content="家庭通知控制中心" />
  <meta property="og:title" content="家庭通知控制中心｜接收端" />
  <meta property="og:description" content="iPad 全螢幕家庭通知接收端。" />
  <title>家庭通知控制中心｜接收端</title>
  <!--
    家庭通知控制中心｜接收端 Golden v2
    本次更新：
    1. 獨立接收端，只負責 iPad 長亮顯示、Firebase 即時接收、提示音與 TTS。
    2. 重新使用 61.8 / 38.2 黃金比例排版：主任務卡 61.8%，資訊側欄 38.2%。
    3. 加入舊 iPad 友善的穩定模式、Audio Ready 解鎖、Firebase 權限錯誤提示。
  -->
  <style>
    :root {
      --bg-0: #030712;
      --bg-1: #071326;
      --bg-2: #0b1730;
      --glass-strong: rgba(255, 255, 255, .145);
      --glass: rgba(255, 255, 255, .095);
      --glass-soft: rgba(255, 255, 255, .055);
      --line: rgba(255, 255, 255, .16);
      --line-strong: rgba(255, 255, 255, .26);
      --text: rgba(248, 252, 255, .96);
      --sub: rgba(222, 235, 255, .76);
      --muted: rgba(222, 235, 255, .52);
      --cyan: #70eaff;
      --blue: #7fa7ff;
      --violet: #ac8dff;
      --green: #71efad;
      --amber: #ffd166;
      --red: #ff6f91;
      --radius-xl: 36px;
      --radius-lg: 28px;
      --radius-md: 20px;
      --shadow: 0 34px 88px rgba(0,0,0,.46);
      --ease: cubic-bezier(.2, .8, .2, 1);
      --gold-major: 61.8%;
      --gold-minor: 38.2%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang HK", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg-0); color: var(--text); }
    body {
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -26%;
      z-index: -3;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 12%, rgba(112,234,255,.24), transparent 29%),
        radial-gradient(circle at 78% 16%, rgba(172,141,255,.22), transparent 34%),
        radial-gradient(circle at 66% 88%, rgba(64,103,255,.17), transparent 42%),
        linear-gradient(145deg, #020713 0%, #071326 46%, #101a36 100%);
      animation: cosmicDrift 42s var(--ease) infinite alternate;
      transform: translateZ(0);
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: .24;
      background-image: radial-gradient(circle, rgba(255,255,255,.44) 0 1px, transparent 1.65px);
      background-size: 96px 96px;
      animation: starMove 140s linear infinite;
    }
    @keyframes cosmicDrift { from { transform: translate3d(-1.6%, -1%, 0) scale(1); } to { transform: translate3d(1.6%, 1%, 0) scale(1.04); } }
    @keyframes starMove { from { background-position: 0 0; } to { background-position: 960px 768px; } }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: .72; } 50% { transform: scale(1.12); opacity: 1; } }
    @keyframes floatIn { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes capsuleIn { from { transform: translate(-50%, -18px) scale(.94); opacity: 0; } to { transform: translate(-50%, 0) scale(1); opacity: 1; } }

    .app {
      width: min(1440px, calc(100vw - 44px));
      height: calc(100vh - 38px);
      margin: 19px auto;
      display: grid;
      grid-template-rows: 86px 1fr;
      gap: 18px;
    }
    .topbar {
      display: grid;
      grid-template-columns: var(--gold-major) var(--gold-minor);
      gap: 18px;
      align-items: stretch;
    }
    .brand, .mini-status {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(255,255,255,.11), rgba(255,255,255,.045));
      box-shadow: 0 20px 54px rgba(0,0,0,.28);
      backdrop-filter: blur(26px) saturate(150%);
      -webkit-backdrop-filter: blur(26px) saturate(150%);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      overflow: hidden;
    }
    .brand-orb {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      border-radius: 19px;
      background: radial-gradient(circle at 32% 24%, #fff 0 10%, var(--cyan) 28%, var(--blue) 60%, var(--violet) 100%);
      box-shadow: 0 0 34px rgba(112,234,255,.38), inset 0 1px 1px rgba(255,255,255,.75);
    }
    h1, h2, h3, p { margin: 0; }
    .brand h1 { font-size: clamp(27px, 3.7vw, 48px); line-height: 1; letter-spacing: -.07em; }
    .brand p { margin-top: 6px; color: var(--sub); font-size: 14px; }
    .mini-status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 13px;
    }
    .mini-cell {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      background: rgba(255,255,255,.055);
      padding: 11px 12px;
      min-width: 0;
    }
    .mini-label { color: var(--muted); font-size: 12px; margin-bottom: 3px; }
    .mini-value { font-weight: 800; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 999px; margin-right: 8px; background: var(--amber); box-shadow: 0 0 18px rgba(255,209,102,.65); }
    .dot.online { background: var(--green); box-shadow: 0 0 18px rgba(113,239,173,.7); }
    .dot.offline { background: var(--red); box-shadow: 0 0 18px rgba(255,111,145,.7); }

    .dashboard {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--gold-major) var(--gold-minor);
      gap: 18px;
    }
    .panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(145deg, var(--glass-strong), rgba(255,255,255,.045));
      box-shadow: var(--shadow);
      backdrop-filter: blur(34px) saturate(150%);
      -webkit-backdrop-filter: blur(34px) saturate(150%);
      transform: translateZ(0);
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,.24), transparent 28%, transparent 76%, rgba(112,234,255,.09));
      opacity: .85;
    }
    .panel::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      right: -110px;
      top: -120px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(112,234,255,.20), transparent 68%);
      pointer-events: none;
      filter: blur(4px);
    }
    .inner { position: relative; z-index: 1; height: 100%; padding: clamp(22px, 3.1vw, 42px); }

    .mission { display: grid; grid-template-rows: auto 1fr auto; min-height: 0; }
    .mission-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; }
    .eyebrow { display: inline-flex; gap: 9px; align-items: center; color: var(--cyan); font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .11em; }
    .status-chip { border: 1px solid rgba(112,234,255,.24); border-radius: 999px; padding: 10px 14px; background: rgba(112,234,255,.085); color: var(--sub); font-size: 13px; white-space: nowrap; }
    .mission-main { align-self: center; padding: 4vh 0; animation: floatIn .5s var(--ease); }
    .mission-title { font-size: clamp(48px, 7.4vw, 112px); line-height: .92; letter-spacing: -.095em; max-width: 12ch; text-wrap: balance; }
    .mission-subtitle { margin-top: 24px; color: var(--sub); font-size: clamp(20px, 2.3vw, 34px); line-height: 1.25; letter-spacing: -.04em; max-width: 760px; }
    .metric-row { display: grid; grid-template-columns: var(--gold-major) var(--gold-minor); gap: 14px; margin-top: 34px; }
    .metric {
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 26px;
      background: rgba(255,255,255,.06);
      padding: 18px 20px;
    }
    .metric-label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .metric-value { font-size: clamp(28px, 4vw, 58px); line-height: 1; letter-spacing: -.06em; font-weight: 850; }
    .progress-shell { margin-top: 24px; }
    .progress-track { position: relative; height: 14px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.13); }
    .progress-fill { height: 100%; width: 0%; border-radius: inherit; background: linear-gradient(90deg, var(--cyan), var(--blue), var(--violet)); box-shadow: 0 0 28px rgba(112,234,255,.38); transition: width 720ms var(--ease); }
    .progress-labels { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; margin-top: 10px; }
    .audio-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 26px;
      background: rgba(255,255,255,.06);
      padding: 14px 16px;
    }
    .audio-panel p { color: var(--sub); font-size: 14px; line-height: 1.38; }
    .btn {
      appearance: none;
      border: 1px solid rgba(112,234,255,.28);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(112,234,255,.22), rgba(127,167,255,.12));
      color: var(--text);
      padding: 12px 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 12px 28px rgba(0,0,0,.22);
    }
    .btn:active { transform: scale(.985); }

    .side { display: grid; grid-template-rows: var(--gold-minor) var(--gold-major); gap: 18px; min-height: 0; }
    .side-top { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; min-height: 0; }
    .side-bottom { min-height: 0; }
    .card-title { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .card-title h2 { font-size: clamp(21px, 2vw, 30px); letter-spacing: -.055em; }
    .card-title small { color: var(--muted); }
    .info-big { font-size: clamp(30px, 4vw, 56px); font-weight: 860; line-height: 1; letter-spacing: -.065em; }
    .info-sub { color: var(--sub); margin-top: 10px; line-height: 1.48; font-size: 15px; }
    .timeline { height: calc(100% - 48px); overflow: hidden; display: grid; gap: 10px; align-content: start; }
    .event {
      display: grid;
      grid-template-columns: 66px 1fr;
      gap: 12px;
      border: 1px solid rgba(255,255,255,.11);
      background: rgba(255,255,255,.055);
      border-radius: 21px;
      padding: 13px 14px;
      animation: floatIn .35s var(--ease);
    }
    .event-time { color: var(--cyan); font-size: 12px; font-weight: 900; padding-top: 1px; }
    .event-text { color: var(--sub); line-height: 1.42; font-size: 14px; }
    .capsule {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      width: min(680px, calc(100vw - 44px));
      display: none;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 999px;
      background: rgba(8, 17, 34, .72);
      box-shadow: 0 18px 58px rgba(0,0,0,.38), 0 0 42px rgba(112,234,255,.15);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      padding: 12px 16px;
      animation: capsuleIn .42s var(--ease);
    }
    .capsule.show { display: flex; align-items: center; gap: 14px; }
    .wave { width: 38px; height: 38px; border-radius: 999px; background: radial-gradient(circle, #fff, var(--cyan) 38%, rgba(112,234,255,.18)); box-shadow: 0 0 24px rgba(112,234,255,.5); animation: pulse 1.5s ease-in-out infinite; flex: 0 0 auto; }
    .capsule strong { display: block; font-size: 15px; }
    .capsule span { display: block; color: var(--sub); font-size: 13px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .legacy body::before, .legacy body::after { animation: none !important; }
    .legacy .panel, .legacy .brand, .legacy .mini-status, .legacy .capsule { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .legacy * { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app { height: auto; min-height: calc(100vh - 28px); width: min(1000px, calc(100vw - 24px)); margin: 14px auto; grid-template-rows: auto 1fr; }
      .topbar, .dashboard { grid-template-columns: 1fr; }
      .mini-status { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .side { grid-template-rows: auto auto; }
      .side-top { grid-template-columns: 1fr; }
      .mission-title { max-width: 100%; }
    }
    @media (max-width: 560px) {
      .app { width: calc(100vw - 18px); margin: 9px auto; gap: 10px; }
      .brand { padding: 14px; }
      .brand-orb { width: 44px; height: 44px; border-radius: 16px; }
      .brand h1 { font-size: 26px; }
      .brand p { font-size: 12px; }
      .mini-status { grid-template-columns: 1fr; }
      .inner { padding: 20px; }
      .mission-title { font-size: 46px; }
      .metric-row { grid-template-columns: 1fr; }
      .audio-panel { align-items: stretch; flex-direction: column; }
      .btn { width: 100%; }
      .event { grid-template-columns: 58px 1fr; }
    }
  </style>
</head>
<body>
  <div class="capsule" id="capsule">
    <div class="wave"></div>
    <div><strong id="capsuleTitle">家庭通知</strong><span id="capsuleText">等待接收新通知</span></div>
  </div>

  <main class="app">
    <header class="topbar">
      <section class="brand">
        <div class="brand-orb"></div>
        <div>
          <h1>家庭通知控制中心</h1>
          <p>接收端｜iPad 全螢幕家庭通知顯示</p>
        </div>
      </section>
      <section class="mini-status">
        <div class="mini-cell"><div class="mini-label">時間</div><div class="mini-value" id="clock">--:--</div></div>
        <div class="mini-cell"><div class="mini-label">連線</div><div class="mini-value"><span class="dot" id="connDot"></span><span id="connText">檢查中</span></div></div>
      </section>
    </header>

    <section class="dashboard">
      <article class="panel mission">
        <div class="inner mission">
          <div class="mission-head">
            <div class="eyebrow"><span class="dot online"></span> Mission Status</div>
            <div class="status-chip" id="statusChip">待機模式</div>
          </div>

          <div class="mission-main" id="missionMain">
            <h2 class="mission-title" id="mainTitle">等待家庭通知</h2>
            <p class="mission-subtitle" id="mainSubtitle">接收端已準備好。手機發送端一撳制，呢度就會即時更新狀態、播放提示音同顯示廣播。</p>
            <div class="metric-row">
              <div class="metric"><div class="metric-label">預計時間</div><div class="metric-value" id="etaValue">--</div></div>
              <div class="metric"><div class="metric-label">完成度</div><div class="metric-value" id="progressValue">0%</div></div>
            </div>
            <div class="progress-shell">
              <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
              <div class="progress-labels"><span>出發</span><span>途中</span><span>樓下</span><span>到家</span></div>
            </div>
          </div>

          <div class="audio-panel">
            <p><strong id="audioState">音響未啟動</strong><br>舊版 iOS Safari 通常需要你先點一下，之後先可以穩定播放提示音 / TTS。</p>
            <button class="btn" id="audioBtn">啟動音響系統</button>
          </div>
        </div>
      </article>

      <aside class="side">
        <div class="side-top">
          <section class="panel">
            <div class="inner">
              <div class="card-title"><h2>天氣</h2><small id="weatherSource">Weather</small></div>
              <div class="info-big" id="weatherTemp">--°</div>
              <p class="info-sub" id="weatherDesc">等待發送端同步香港天氣。</p>
            </div>
          </section>
          <section class="panel">
            <div class="inner">
              <div class="card-title"><h2>下一件事</h2><small id="scheduleSource">Schedule</small></div>
              <div class="info-big" id="scheduleTime">--:--</div>
              <p class="info-sub" id="scheduleTitle">等待發送端推送日程。</p>
            </div>
          </section>
        </div>
        <section class="panel side-bottom">
          <div class="inner">
            <div class="card-title"><h2>今日事件流</h2><small>Live Log</small></div>
            <div class="timeline" id="timeline"></div>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAnalytics, isSupported } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
    import { getDatabase, ref, onValue, set, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const DATABASE_URL = localStorage.getItem("hcc_database_url") || "https://homecontrol-ee898-default-rtdb.firebaseio.com";
    const firebaseConfig = {
      apiKey: "AIzaSyDl6x9gIn0TTyKWHVf_tPbhm3OjpOxJgzQ",
      authDomain: "homecontrol-ee898.firebaseapp.com",
      databaseURL: DATABASE_URL,
      projectId: "homecontrol-ee898",
      storageBucket: "homecontrol-ee898.firebasestorage.app",
      messagingSenderId: "634615992463",
      appId: "1:634615992463:web:7a6b761a597a99d0f8e0fa",
      measurementId: "G-PMKY0NSJ6P"
    };

    const app = initializeApp(firebaseConfig);
    isSupported().then(ok => { if (ok) getAnalytics(app); }).catch(() => {});
    const db = getDatabase(app, DATABASE_URL);
    const BASE = "homeNotificationCenter/global";
    const $ = id => document.getElementById(id);
    const state = { audioReady: false, audioCtx: null, lastBroadcastId: sessionStorage.getItem("hcc_last_broadcast") || "" };

    const safeText = (value, fallback = "--") => String(value ?? fallback).replace(/[<>&]/g, s => ({"<":"&lt;", ">":"&gt;", "&":"&amp;"}[s]));
    const fmtTime = date => new Intl.DateTimeFormat("zh-HK", { hour:"2-digit", minute:"2-digit", hour12:false }).format(date);
    const clampProgress = value => Math.max(0, Math.min(100, Number(value) || 0));

    function tickClock() {
      const now = new Date();
      $("clock").textContent = new Intl.DateTimeFormat("zh-HK", { hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false }).format(now);
    }

    function showCapsule(title, message) {
      $("capsuleTitle").textContent = title || "家庭通知";
      $("capsuleText").textContent = message || "收到新通知";
      const capsule = $("capsule");
      capsule.classList.add("show");
      clearTimeout(showCapsule.timer);
      showCapsule.timer = setTimeout(() => capsule.classList.remove("show"), 7200);
    }

    async function activateAudio() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) throw new Error("此瀏覽器不支援 Web Audio");
        if (!state.audioCtx) state.audioCtx = new AudioContextClass();
        await state.audioCtx.resume();
        state.audioReady = true;
        $("audioState").textContent = "音響已啟動";
        $("audioBtn").textContent = "音響已準備好";
        playTone("soft");
        showCapsule("音響系統已啟動", "之後收到通知會嘗試播放提示音與語音。");
      } catch (err) {
        $("audioState").textContent = "音響啟動失敗";
        showCapsule("音響啟動失敗", err.message || "請重新點擊啟動音響系統。");
      }
    }

    function playTone(soundId = "soft") {
      if (!state.audioReady || !state.audioCtx) return false;
      const ctx = state.audioCtx;
      const configs = {
        arrival: [[659, .10], [880, .16], [1175, .22]],
        soft: [[523, .12], [659, .16]],
        ping: [[880, .10]],
        alert: [[440, .10], [440, .10], [880, .18]],
        none: []
      };
      const notes = configs[soundId] || configs.soft;
      let offset = 0;
      notes.forEach(([freq, dur]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + offset);
        gain.gain.exponentialRampToValueAtTime(.18, ctx.currentTime + offset + .018);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + offset + dur);
        osc.connect(gain).connect(ctx.destination);
        osc.start(ctx.currentTime + offset);
        osc.stop(ctx.currentTime + offset + dur + .02);
        offset += dur + .055;
      });
      return notes.length > 0;
    }

    function speak(text) {
      if (!state.audioReady || !text || !("speechSynthesis" in window)) return false;
      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-HK";
        utterance.rate = .96;
        utterance.pitch = 1;
        utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
        return true;
      } catch (_) {
        return false;
      }
    }

    function renderStatus(data = {}) {
      const title = data.title || "等待家庭通知";
      const subtitle = data.subtitle || "接收端已準備好。手機發送端一撳制，呢度就會即時更新。";
      const eta = data.eta || "--";
      const progress = clampProgress(data.progress);
      $("mainTitle").textContent = title;
      $("mainSubtitle").textContent = subtitle;
      $("etaValue").textContent = eta;
      $("progressValue").textContent = `${progress}%`;
      $("progressFill").style.width = `${progress}%`;
      $("statusChip").textContent = data.chip || data.modeLabel || "即時接收";
      $("missionMain").style.animation = "none";
      requestAnimationFrame(() => { $("missionMain").style.animation = "floatIn .5s var(--ease)"; });
    }

    function renderWeather(data = {}) {
      $("weatherTemp").textContent = data.temp ? `${data.temp}°` : "--°";
      $("weatherDesc").textContent = data.warning ? `${data.place || "香港"}｜${data.desc || "天氣資料"}｜${data.warning}` : `${data.place || "香港"}｜${data.desc || "等待發送端同步香港天氣。"}`;
      $("weatherSource").textContent = data.source === "hko" ? "香港天文台" : "Weather";
    }

    function renderSchedule(data = {}) {
      $("scheduleTime").textContent = data.time || "--:--";
      $("scheduleTitle").textContent = data.title || "等待發送端推送日程。";
      $("scheduleSource").textContent = data.source === "google_calendar" ? "Google Calendar" : data.source === "manual" ? "手動推送" : "Schedule";
    }

    function renderTimeline(value = {}) {
      const list = $("timeline");
      const items = Object.entries(value || {})
        .map(([id, item]) => ({ id, ...item }))
        .sort((a,b) => new Date(b.localTime || 0) - new Date(a.localTime || 0))
        .slice(0, 7);
      if (!items.length) {
        list.innerHTML = `<div class="event"><div class="event-time">--:--</div><div class="event-text">暫時未有家庭事件。</div></div>`;
        return;
      }
      list.innerHTML = items.map(item => {
        const t = item.localTime ? fmtTime(new Date(item.localTime)) : "--:--";
        return `<div class="event"><div class="event-time">${safeText(t)}</div><div class="event-text">${safeText(item.text, "家庭事件")}</div></div>`;
      }).join("");
    }

    function handleBroadcast(data = {}) {
      if (!data.id || data.id === state.lastBroadcastId) return;
      state.lastBroadcastId = data.id;
      sessionStorage.setItem("hcc_last_broadcast", data.id);
      const title = data.title || "家庭通知";
      const message = data.message || data.ttsText || "收到新通知";
      showCapsule(title, message);
      const soundPlayed = playTone(data.soundId || "soft");
      const spoke = speak(data.ttsText || data.message || "");
      if (!state.audioReady || (!soundPlayed && !spoke)) {
        $("audioState").textContent = "收到通知，但音響未啟動";
      }
    }

    function setupFirebase() {
      onValue(ref(db, ".info/connected"), snap => {
        const connected = !!snap.val();
        $("connDot").className = `dot ${connected ? "online" : "offline"}`;
        $("connText").textContent = connected ? "已連線" : "離線";
      });
      onValue(ref(db, `${BASE}/status/current`), snap => renderStatus(snap.val() || {}), err => showCapsule("狀態讀取失敗", err.message));
      onValue(ref(db, `${BASE}/broadcast/current`), snap => handleBroadcast(snap.val() || {}), err => showCapsule("廣播讀取失敗", err.message));
      onValue(ref(db, `${BASE}/weather/current`), snap => renderWeather(snap.val() || {}), err => showCapsule("天氣讀取失敗", err.message));
      onValue(ref(db, `${BASE}/schedule/current`), snap => renderSchedule(snap.val() || {}), err => showCapsule("日程讀取失敗", err.message));
      onValue(ref(db, `${BASE}/events`), snap => renderTimeline(snap.val() || {}), err => showCapsule("事件讀取失敗", err.message));

      const deviceId = localStorage.getItem("hcc_receiver_id") || `receiver_${Math.random().toString(16).slice(2)}`;
      localStorage.setItem("hcc_receiver_id", deviceId);
      const deviceRef = ref(db, `${BASE}/devices/${deviceId}`);
      set(deviceRef, { online:true, mode:"receiver", name:"iPad 接收端", localTime:new Date().toISOString(), updatedAt:serverTimestamp() }).catch(() => {});
      onDisconnect(deviceRef).set({ online:false, mode:"receiver", name:"iPad 接收端", localTime:new Date().toISOString(), updatedAt:serverTimestamp() }).catch(() => {});
      setInterval(() => set(deviceRef, { online:true, mode:"receiver", name:"iPad 接收端", localTime:new Date().toISOString(), updatedAt:serverTimestamp() }).catch(() => {}), 30000);
    }

    function applyLegacyMode() {
      const legacy = localStorage.getItem("hcc_legacy_mode") !== "false";
      document.documentElement.classList.toggle("legacy", legacy);
    }

    $("audioBtn").addEventListener("click", activateAudio);
    applyLegacyMode();
    tickClock();
    setInterval(tickClock, 1000);
    setupFirebase();
  </script>
</body>
</html>
