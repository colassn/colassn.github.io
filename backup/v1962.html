            const seconds = totalSeconds % 60;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            const date = lastSeen.toDate(); const now = new Date(); const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000); const diffMin = Math.floor(diffSec / 60); const diffHour = Math.floor(diffMin / 60); const diffDay = Math.floor(diffHour / 24);
            if (diffSec < 60) return '剛剛';
            if (diffMin < 60) return `${diffMin} 分鐘前`;

        };

        const generateFullSchedule = (config, now, dayOverride = null) => {
            if (!config || !Array.isArray(config.timeSlots)) return [];
            const day = dayOverride !== null ? dayOverride : now.getDay();
            if (day === 0 || day === 6) return [];
            const daySubjects = config.schedule?.[day] || [];
            let lessonIndex = 0; const baseDate = new Date(now); baseDate.setHours(0,0,0,0);

                const schedule = generateFullSchedule(config, now);

                const nowMs = now.getTime();
                const lessonSlots = schedule.filter(slot => slot.type === 'lesson' && slot.subjectName && slot.subjectName !== '---');
                const currentLesson = lessonSlots.find(slot => nowMs >= slot.start.getTime() && nowMs < slot.end.getTime());
                if (currentLesson) return currentLesson.subjectName;

                const justEndedLessons = lessonSlots
                    .filter(slot => nowMs >= slot.end.getTime() && nowMs - slot.end.getTime() <= 30 * 60 * 1000)
                    .sort((a, b) => (nowMs - a.end.getTime()) - (nowMs - b.end.getTime()));

                    .filter(slot => nowMs >= slot.end.getTime())
                    .sort((a, b) => b.end.getTime() - a.end.getTime())[0];

                        </div>

                                const dl = getDaysRemaining(item.dueDate);
                                let statusText = `${dl} 天後`; let statusColor = "text-emerald-600 bg-emerald-100 dark:bg-emerald-900/30";

                                            </div>
                                            <div className="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                                                {!item.forceExpired && <button onClick={() => { onEdit(item); onClose(); }} className="p-1.5 text-slate-400 hover:text-blue-500 bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700"><Icon name="pencil" className="w-3.5 h-3.5" /></button>}
                                                <button onClick={() => onDelete(item.id)} className="p-1.5 text-slate-400 hover:text-red-500 bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700"><Icon name="trash-2" className="w-3.5 h-3.5" /></button>
                                            </div>
                                        </div>
                                        <div className="font-bold text-slate-800 dark:text-slate-200 text-sm break-words mt-1">{item.description}</div>
                                        <div className="text-[11px] text-slate-400 font-mono text-right flex justify-end items-center gap-1"><Icon name="calendar" className="w-3 h-3" /> {formatDueDate(item.dueDate)}</div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function AppearanceModal({ isOpen, onClose, t, themeColor, setThemeColor, isDarkMode, setIsDarkMode, layoutMode, setLayoutMode, customLayout, setCustomLayout }) {
            if (!isOpen) return null;

                <div className="fixed inset-0 z-[160] flex items-center justify-center p-4">

                            <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full"><Icon name="x" className="w-5 h-5 dark:text-slate-300" /></button>
                        </div>
                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm font-bold text-slate-500 dark:text-slate-400 mb-3">版面模式</label>
                                <div className="grid grid-cols-3 gap-2 bg-slate-100/50 dark:bg-slate-900/50 p-1 rounded-xl border border-slate-200 dark:border-slate-700">
                                    {['normal', 'minimal', 'custom'].map(mode => (
                                        <button key={mode} onClick={() => setLayoutMode(mode)} className={`py-2 rounded-lg text-xs font-bold transition-all ${layoutMode === mode ? 'bg-white dark:bg-slate-700 shadow-sm dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>
                                            {mode === 'normal' ? '正常' : mode === 'minimal' ? '極簡' : '自定義'}

                                    ))}
                                </div>
                                {layoutMode === 'custom' && (
                                    <div className="mt-3 space-y-2 p-3 bg-slate-50/50 dark:bg-slate-900/30 rounded-xl border border-slate-100 dark:border-slate-800">
                                        {[{ key: 'cards', label: '狀態卡片' }, { key: 'timetable', label: '流動時間表' }, { key: 'input', label: '新增欄位' }, { key: 'list', label: '任務列表' }].map(item => (
                                            <label key={item.key} className="flex items-center justify-between cursor-pointer group">
                                                <span className="text-sm font-bold text-slate-600 dark:text-slate-400">{item.label}</span>
                                                <div className="relative w-12 h-7 shrink-0">
                                                    <input type="checkbox" className="sr-only peer" checked={customLayout[item.key]} onChange={() => handleCustomToggle(item.key)} />
                                                    <div className="absolute inset-0 bg-slate-200 dark:bg-slate-700 rounded-full peer-checked:bg-indigo-500 transition-colors shadow-inner"></div>
                                                    <div className="absolute top-[2px] left-[2px] bg-white w-6 h-6 rounded-full transition-transform peer-checked:translate-x-[20px] shadow-sm border border-slate-300 dark:border-slate-600"></div>
                                                </div>
                                            </label>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-500 dark:text-slate-400 mb-3">主題顏色</label>
                                <div className="grid grid-cols-4 gap-3">
                                    {Object.entries(THEME_CONFIG).map(([key, config]) => (
                                        <button key={key} onClick={() => setThemeColor(key)} className={`flex flex-col items-center gap-2 p-2 rounded-xl border-2 transition-all ${themeColor === key ? `${config.border} ${config.lightBg}` : 'border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700'}`}>
                                            <div className={`w-6 h-6 rounded-full bg-gradient-to-br ${config.gradient}`}></div>
                                            <span className={`text-[10px] font-bold ${themeColor === key ? config.text : 'dark:text-slate-300'}`}>{config.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-500 dark:text-slate-400 mb-3">介面模式</label>
                                <div className="flex bg-slate-100/50 dark:bg-slate-900/50 p-1 rounded-xl border border-slate-200 dark:border-slate-700">
                                    <button onClick={() => setIsDarkMode(false)} className={`flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-sm font-bold transition-all ${!isDarkMode ? 'bg-white dark:bg-slate-700 shadow-sm dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'}`}><Icon name="sun" className="w-4 h-4 text-orange-500" /> 淺色</button>
                                    <button onClick={() => setIsDarkMode(true)} className={`flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-sm font-bold transition-all ${isDarkMode ? 'bg-white dark:bg-slate-700 shadow-sm dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'}`}><Icon name="moon" className="w-4 h-4 text-indigo-400" /> 深色</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

        function NameSetupModal({ user, onSave, loading, triggerAlert, triggerConfirm, t }) {
            const [name, setName] = useState(user?.displayName || '');
            const handleSubmit = (e) => { 
                e.preventDefault();
                if (!name.trim()) { triggerAlert("請輸入名字", "error"); return; } 
                triggerConfirm(`確定使用這個名字「${name.trim()}」嗎？`, () => { onSave(name.trim()); });
            };
            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm"></div>
                    <div className="modal-animate glass-card bg-white/90 dark:bg-slate-800/90 rounded-2xl shadow-2xl w-full max-w-sm p-8 relative z-10 text-center border border-slate-100 dark:border-slate-700">
                        <div className={`w-16 h-16 ${t.lightBg} rounded-full flex items-center justify-center mx-auto mb-4 ${t.text}`}><Icon name="user" className="w-8 h-8" /></div>
                        <h2 className="text-2xl font-black text-slate-800 dark:text-white mb-2">個人模式設定</h2>
                        <p className="text-slate-500 dark:text-slate-400 mb-6 text-sm">請輸入你的<strong>英文短名</strong>，方便老師辨識</p>
                        <form onSubmit={handleSubmit}>
                            <input type="text" className={`w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 dark:text-white text-center font-bold text-lg focus:ring-2 focus:${t.ring} outline-none mb-4`} placeholder="名字 (例如: Peter)" value={name} onChange={e => setName(e.target.value)} autoFocus required />
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-xl text-white font-bold transition-all shadow-lg active:scale-95 disabled:opacity-50 ${t.bg}`}>{loading ? '設定中...' : '開始使用'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        // v1.9.6：已移除分組加入視窗，公眾版不再使用分組代碼。

        function DatePickerModal({ isOpen, value, onSelect, onClose, title = '選擇日期' }) {
            const parseInitial = () => {
                const d = value ? new Date(value) : new Date();
                return isNaN(d.getTime()) ? new Date() : d;
            };
            const [viewDate, setViewDate] = useState(parseInitial());
            useEffect(() => { if (isOpen) setViewDate(parseInitial()); }, [isOpen, value]);
            if (!isOpen) return null;
            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            const first = new Date(y, m, 1);
            const start = new Date(first);
            start.setDate(first.getDate() - first.getDay());
            const selected = value ? new Date(value) : null;
            const days = Array.from({ length: 42 }, (_, i) => {
                const d = new Date(start);
                d.setDate(start.getDate() + i);
                return d;
            });
            const toKey = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const todayKey = toKey(new Date());
            const selectedKey = selected && !isNaN(selected.getTime()) ? toKey(selected) : '';
            return (
                <div className="fixed inset-0 z-[190] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative z-10 w-full max-w-sm rounded-[2rem] bg-white/95 dark:bg-slate-900/95 border border-white/60 dark:border-slate-700 shadow-2xl p-5 modal-animate">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h3 className="text-lg font-black text-slate-800 dark:text-white">{title}</h3>
                                <p className="text-xs font-bold text-slate-400">網站自製日期面板</p>
                            </div>
                            <button type="button" onClick={onClose} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-slate-900 dark:hover:text-white"><Icon name="x" className="w-4 h-4" /></button>
                        </div>
                        <div className="flex items-center justify-between mb-3 rounded-2xl bg-slate-50 dark:bg-slate-800/70 p-2">
                            <button type="button" onClick={() => setViewDate(new Date(y, m - 1, 1))} className="p-2 rounded-xl hover:bg-white dark:hover:bg-slate-700 text-slate-500"><Icon name="chevron-left" className="w-4 h-4" /></button>
                            <div className="font-black text-slate-700 dark:text-slate-100">{y} 年 {m + 1} 月</div>
                            <button type="button" onClick={() => setViewDate(new Date(y, m + 1, 1))} className="p-2 rounded-xl hover:bg-white dark:hover:bg-slate-700 text-slate-500"><Icon name="chevron-right" className="w-4 h-4" /></button>
                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center text-[11px] font-black text-slate-400 mb-2">
                            {['日','一','二','三','四','五','六'].map(d => <div key={d} className="py-1">{d}</div>)}
                        </div>
                        <div className="grid grid-cols-7 gap-1">
                            {days.map(d => {
                                const key = toKey(d);
                                const inMonth = d.getMonth() === m;
                                const isSel = key === selectedKey;
                                const isToday = key === todayKey;
                                return (
                                    <button key={key} type="button" onClick={() => { onSelect(key); onClose(); }} className={`aspect-square rounded-xl text-sm font-black transition-all ${isSel ? 'bg-indigo-600 text-white shadow-lg scale-105' : isToday ? 'bg-orange-50 text-orange-600 border border-orange-200' : inMonth ? 'bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-indigo-50 hover:text-indigo-600' : 'text-slate-300 dark:text-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>{d.getDate()}</button>
                                );
                            })}
                        </div>
                        <div className="grid grid-cols-3 gap-2 mt-4">
                            {[0,1,7].map(offset => {
                                const d = new Date(); d.setDate(d.getDate() + offset);
                                return <button key={offset} type="button" onClick={() => { onSelect(toKey(d)); onClose(); }} className="py-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-black hover:bg-indigo-50 hover:text-indigo-600">{offset === 0 ? '今日' : offset === 1 ? '聽日' : '一星期後'}</button>;
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function TimePickerModal({ isOpen, value, onSelect, onClose, title = '選擇時間' }) {
            const [hour, setHour] = useState(value ? value.split(':')[0] : '08');
            const [minute, setMinute] = useState(value ? value.split(':')[1] : '00');
            useEffect(() => { if (isOpen && value) { const [h, m] = value.split(':'); setHour(h || '08'); setMinute(m || '00'); } }, [isOpen, value]);
            if (!isOpen) return null;
            const hours = Array.from({ length: 16 }, (_, i) => String(i + 6).padStart(2, '0'));
            const minutes = ['00','05','10','15','20','25','30','35','40','45','50','55'];
            const confirm = () => { onSelect(`${hour}:${minute}`); onClose(); };
            return (
                <div className="fixed inset-0 z-[190] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative z-10 w-full max-w-md rounded-[2rem] bg-white/95 dark:bg-slate-900/95 border border-white/60 dark:border-slate-700 shadow-2xl p-5 modal-animate">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h3 className="text-lg font-black text-slate-800 dark:text-white">{title}</h3>
                                <p className="text-xs font-bold text-slate-400">網站自製時間面板</p>
                            </div>
                            <button type="button" onClick={onClose} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-slate-900 dark:hover:text-white"><Icon name="x" className="w-4 h-4" /></button>
                        </div>
                        <div className="text-center py-3 rounded-2xl bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-black text-3xl tracking-widest shadow-lg mb-4">{hour}:{minute}</div>
                        <div className="grid grid-cols-[1fr_1fr] gap-4">
                            <div>
                                <div className="text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">小時</div>
                                <div className="grid grid-cols-4 gap-1.5 max-h-48 overflow-y-auto scrollbar-hide pr-1">
                                    {hours.map(h => <button key={h} type="button" onClick={() => setHour(h)} className={`py-2 rounded-xl text-sm font-black transition-all ${hour === h ? 'bg-indigo-600 text-white shadow' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-indigo-50 hover:text-indigo-600'}`}>{h}</button>)}
                                </div>
                            </div>
                            <div>
                                <div className="text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">分鐘</div>
                                <div className="grid grid-cols-3 gap-1.5 max-h-48 overflow-y-auto scrollbar-hide pr-1">
                                    {minutes.map(m => <button key={m} type="button" onClick={() => setMinute(m)} className={`py-2 rounded-xl text-sm font-black transition-all ${minute === m ? 'bg-indigo-600 text-white shadow' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-indigo-50 hover:text-indigo-600'}`}>{m}</button>)}
                                </div>
                            </div>
                        </div>
                        <button type="button" onClick={confirm} className="w-full mt-5 py-3 rounded-2xl bg-indigo-600 text-white font-black hover:bg-indigo-700 active:scale-95 transition-all">套用時間</button>
                    </div>
                </div>
            );
        }

        function EditModal({ item, onClose, onSave, triggerAlert, triggerConfirm, subjects }) { 
            const [description, setDescription] = useState(item.description || '');
            const [subject, setSubject] = useState(item.subject || '其他'); 
            const [dueDate, setDueDate] = useState(item.dueDate || ''); 
            const [isDatePickerOpen, setIsDatePickerOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            const handleSubjectSelect = (subjectName) => setSubject(subjectName);
            const handleSave = async (e) => { 
                e.preventDefault();
                triggerConfirm("確定要儲存修改嗎？", async () => {
                    setLoading(true); 
                    try { await onSave(item.id, { description, subject, dueDate }); onClose(); } 
                    catch (error) { triggerAlert("更新失敗", "error"); } 
                    finally { setLoading(false); } 
                });
            }; 
            
            return ( 
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4"> 
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div> 
                    <div className="modal-animate glass-card bg-white/95 dark:bg-slate-800/95 rounded-2xl shadow-2xl w-full max-w-md p-6 relative z-10 overflow-hidden border border-white/50"> 
                        <div className="flex justify-between items-center mb-4"> 
                            <h3 className="text-xl font-bold text-slate-800 dark:text-white">修改紀錄</h3> 
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors"><Icon name="x" className="w-5 h-5 text-slate-500 dark:text-slate-400" /></button> 
                        </div> 
                        <form onSubmit={handleSave} className="space-y-4"> 
                            <div> 
                                <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">科目</label> 
                                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide"> 
                                    {subjects.map(sub => ( <button key={sub.name} type="button" onClick={() => handleSubjectSelect(sub.name)} className={`flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border-2 transition-all ${subject === sub.name ? sub.color + ' ring-2 ring-indigo-100 dark:ring-indigo-900' : 'bg-white dark:bg-slate-800 text-slate-500 border-slate-200 dark:border-slate-700 hover:bg-slate-50'}`}>{sub.name}</button>))} 
                                </div> 
                            </div> 
                            <div> 
                                <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">內容</label> 
                                <textarea value={description} onChange={(e) => setDescription(e.target.value)} rows="3" className="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all p-3 border text-slate-700 dark:text-slate-200 text-sm outline-none" required /> 
                            </div> 
                            <div> 
                                <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">繳交/考試日期</label> 
                                <button type="button" onClick={() => setIsDatePickerOpen(true)} className={`w-full h-11 rounded-xl border text-left px-3 text-sm font-bold transition-all flex items-center justify-between ${dueDate ? 'bg-indigo-50 dark:bg-indigo-900/20 border-indigo-200 dark:border-indigo-800 text-indigo-700 dark:text-indigo-300' : 'bg-slate-50 dark:bg-slate-900/50 border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-300 hover:border-indigo-300'}`}><span>{dueDate ? formatDueDate(dueDate) : '選擇日期'}</span><Icon name="calendar" className="w-4 h-4" /></button>
                            </div> 
                            <button type="submit" disabled={loading} className="w-full py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 shadow-lg transition-all active:scale-95 disabled:opacity-70 flex items-center justify-center gap-2">{loading ? '儲存中...' : <><Icon name="save" className="w-4 h-4" /> 儲存修改</>}</button> 
                        </form> 
                        <DatePickerModal isOpen={isDatePickerOpen} value={dueDate} onSelect={setDueDate} onClose={() => setIsDatePickerOpen(false)} title="選擇繳交 / 考試日期" />
                    </div> 
                </div> 
            );
        }

        function SubjectSelectionModal({ onClose, onSelect, subjects }) {
            return (
                <div className="fixed inset-0 z-[160] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="modal-animate glass-card bg-white/95 dark:bg-slate-800/95 rounded-3xl shadow-2xl w-full max-w-2xl p-6 relative z-10 flex flex-col max-h-[80vh]">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-2xl font-bold text-slate-800 dark:text-white">選擇科目</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors"><Icon name="x" className="w-6 h-6 text-slate-500 dark:text-slate-400" /></button>

        function SubjectManagerModal({ isOpen, onClose, currentSubjects, onSave, triggerConfirm, triggerAlert }) {
            const [newSubjectName, setNewSubjectName] = useState('');
            const [newSubjectColor, setNewSubjectColor] = useState(COLOR_PALETTE[0].value);
            const [tempSubjects, setTempSubjects] = useState([]);

            useEffect(() => { if (isOpen) setTempSubjects(currentSubjects); }, [isOpen, currentSubjects]);
            if (!isOpen) return null;

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newSubjectName.trim()) return;
                if (tempSubjects.some(s => s.name === newSubjectName.trim())) { triggerAlert ? triggerAlert("科目名稱重複", "error") : console.warn("科目名稱重複"); return; }
                setTempSubjects([...tempSubjects, { name: newSubjectName.trim(), color: newSubjectColor }]);
                setNewSubjectName('');
            };
            const handleDelete = (name) => { triggerConfirm(`確定要刪除「${name}」嗎？`, () => setTempSubjects(tempSubjects.filter(s => s.name !== name))); };
            const moveSubject = (index, direction) => {
                const newSubjects = [...tempSubjects];
                if (direction === 'up' && index > 0) { [newSubjects[index], newSubjects[index - 1]] = [newSubjects[index - 1], newSubjects[index]]; } 
                else if (direction === 'down' && index < newSubjects.length - 1) { [newSubjects[index], newSubjects[index + 1]] = [newSubjects[index + 1], newSubjects[index]]; }
                setTempSubjects(newSubjects);
            };
            const handleAISort = () => {
                const priority = ['中文', '英文', '數學', '常識', '通識', '公社', '物理', '化學', '生物'];
                const sorted = [...tempSubjects].sort((a, b) => {
                    const idxA = priority.indexOf(a.name); const idxB = priority.indexOf(b.name);
                    if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                    if (idxA !== -1) return -1;
                    if (idxB !== -1) return 1;
                    return a.name.localeCompare(b.name);
                });
                setTempSubjects(sorted);
            };

            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>

                            </div>
                            <form onSubmit={handleAdd} className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-100 dark:border-slate-700 mb-4">
                                <label className="block text-xs font-bold text-slate-500 mb-2">新增科目</label>
                                <div className="flex gap-2 mb-2"><input type="text" value={newSubjectName} onChange={e => setNewSubjectName(e.target.value)} className="flex-1 px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="科目名稱 (例如: 數學)" required /></div>
                                <div className="grid grid-cols-5 gap-2 max-h-32 overflow-y-auto pr-1 pb-1">
                                    {COLOR_PALETTE.map((c, i) => (<button key={i} type="button" onClick={() => setNewSubjectColor(c.value)} className={`h-8 rounded-lg border-2 ${c.value} ${newSubjectColor === c.value ? 'ring-2 ring-offset-1 ring-slate-400 border-transparent' : 'border-transparent opacity-60 hover:opacity-100'}`} />))}

                                {tempSubjects.map((sub, index) => (
                                    <div key={sub.name + index} className="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm group">

                        <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700 flex gap-3">
                            <button onClick={() => { triggerConfirm("確定重置為預設科目？", () => { onSave(DEFAULT_SUBJECTS); onClose(); }); }} className="px-4 py-2 text-slate-500 hover:text-slate-700 font-bold text-sm">重置預設</button>

        function Timetable({ currentDay, config, onDayChange, subjects, globalNow }) { 
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const now = globalNow || new Date();
            const scheduleData = generateFullSchedule(config, now, currentDay);
            
            return ( 
                <div className="space-y-4"> 
                    <div className="flex glass-card bg-white/70 dark:bg-slate-800/70 rounded-xl p-1 shadow-sm overflow-x-auto">
                        {[1, 2, 3, 4, 5].map(day => (
                            <button key={day} onClick={() => onDayChange(day)} className={`flex-1 py-2 px-3 rounded-lg text-sm font-bold whitespace-nowrap transition-all ${currentDay === day ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'}`}>星期{weekDays[day]}</button>
                        ))}
                    </div> 
                    <div className="glass-card bg-white/80 dark:bg-slate-800/80 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 sm:p-6">
                        {scheduleData.length > 0 ? scheduleData.map((slot, idx) => { 
                            const nowTime = now.getTime(); const startTime = slot.start.getTime(); const endTime = slot.end.getTime();
                            let status = 'future'; let diff = 0;
                            if (nowTime > endTime) { status = 'past'; } else if (nowTime >= startTime && nowTime <= endTime) { status = 'current'; diff = endTime - nowTime; }
                            
                            return (
                                <div key={idx} className={`relative pl-6 pb-6 last:pb-0 border-l-2 ${status === 'current' ? 'border-purple-500' : (status === 'past' ? 'border-slate-200 dark:border-slate-700' : 'border-green-300 dark:border-green-800')}`}>
                                    <div className={`absolute -left-[9px] top-0 w-4 h-4 rounded-full border-2 ${status === 'current' ? 'bg-purple-500 border-purple-100 animate-pulse scale-110' : (status === 'past' ? 'bg-slate-200 dark:bg-slate-700 border-slate-100 dark:border-slate-600' : 'bg-white dark:bg-slate-900 border-green-400')}`}></div>
                                    <div className={`rounded-xl p-3 sm:p-4 transition-all ${status === 'current' ? 'bg-purple-50 dark:bg-purple-900/20 shadow-md border border-purple-100 dark:border-purple-800 transform scale-[1.02]' : (status === 'past' ? 'opacity-60 grayscale' : 'bg-green-50/50 dark:bg-green-900/10 border border-green-100 dark:border-green-900/30')}`}>
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className={`text-xs font-mono mb-1 ${status === 'current' ? 'text-purple-600 dark:text-purple-400 font-bold' : 'text-slate-400'}`}>{formatTimeStr(slot.start)} - {formatTimeStr(slot.end)}</div>
                                                <div className={`text-base sm:text-lg font-bold ${slot.type === 'lesson' ? 'text-slate-800 dark:text-white' : 'text-slate-500 italic'} ${status === 'current' ? 'text-purple-900 dark:text-purple-300' : ''}`}>{slot.subjectName}</div>
                                            </div>
                                            {status === 'current' && (<div className="text-right"><span className="inline-block text-[10px] bg-purple-600 text-white px-2 py-0.5 rounded-full font-bold mb-1 animate-pulse">進行中</span><div className="text-xs font-mono font-bold text-purple-600 dark:text-purple-400">剩 {formatCountdown(diff)}</div></div>)}
                                            {status === 'past' && <Icon name="check-circle" className="w-5 h-5 text-slate-300 dark:text-slate-600" />}
                                        </div>
                                    </div>
                                </div>
                            );

        // v1.9.6：後台已改用「派發與老師管理」中心。

        function AssignmentCenterModal({
            isOpen,
            onClose,

            userProfile,
            isAdmin,

            const [search, setSearch] = useState('');

            useEffect(() => {
                if (subjects?.length && !subjects.some(s => s.name === subject)) setSubject(subjects[0].name);
            }, [subjects]);

            useEffect(() => {
                if (isOpen) setActiveTab(isAdmin ? 'assign' : isTeacher ? 'email' : 'status');
            }, [isOpen, isAdmin, isTeacher]);

            if (!isOpen) return null;

            const resetForm = () => {
                setSelectedUids([]);
                setEmailText('');
                setType('homework');
                setSubject(subjects?.[0]?.name || '中文');
                setDescription('');
                setDueDate('');
                setNotes('');
            };

            const payload = { type, subject, description: description.trim(), dueDate, notes: notes.trim() };

            const handleAdminAssign = async (e) => {
                e.preventDefault();
                if (!selectedUids.length) { triggerAlert('請先勾選至少一位學生。', 'error'); return; }
                if (!payload.description) { triggerAlert('請輸入功課內容。', 'error'); return; }
                if (!payload.dueDate) { triggerAlert('請選擇截止日期。', 'error'); return; }
                setSubmitting(true);
                try { await onAssignToStudents(selectedUids, payload); resetForm(); }
                finally { setSubmitting(false); }
            };

            const handleEmailAssign = async (e) => {

                                                        <div className="text-xs font-bold mt-1 line-clamp-2 break-words">{note.message}</div>
                                                        <div className="mt-2 flex items-center justify-between gap-2 text-[10px] font-black opacity-70">
                                                            <span className="truncate">{note.meta || note.time || '剛剛'}</span>
                                                            {note.action === 'class' && <span className="shrink-0 flex items-center gap-1">查看功課 <Icon name="arrow-right" className="w-3 h-3" /></span>}
                                                            {note.action === 'timetable' && <span className="shrink-0 flex items-center gap-1">查看時間表 <Icon name="arrow-right" className="w-3 h-3" /></span>}
                                                            {note.action === 'cleanup' && <span className="shrink-0 flex items-center gap-1">返回主頁 <Icon name="arrow-right" className="w-3 h-3" /></span>}
                                                            {note.action === 'release' && <span className="shrink-0 flex items-center gap-1">查看更新 <Icon name="arrow-right" className="w-3 h-3" /></span>}
                                                        </div>
                                                    </div>
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {notification.isOpen && (
                        <div className="fixed inset-0 z-[250] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={closeNotification}></div>
                            <div className="dialog-animate glass-card bg-white/95 dark:bg-slate-800/95 rounded-3xl shadow-2xl w-full max-w-sm p-6 relative z-10 text-center border border-white/50">
                                <div className="w-16 h-16 bg-amber-100 dark:bg-amber-900/30 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-circle" className="w-8 h-8" /></div>
                                <h3 className="text-xl font-bold text-slate-800 dark:text-white mb-2">請確認</h3>
                                <p className="text-slate-500 dark:text-slate-400 mb-6 text-sm">{notification.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={closeNotification} className="flex-1 py-3 rounded-xl font-bold bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 transition-colors">取消</button>
                                    <button onClick={handleNotificationConfirm} className="flex-1 py-3 rounded-xl font-bold bg-red-500 hover:bg-red-600 text-white transition-colors shadow-lg active:scale-95">確定</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<AppErrorBoundary><App /></AppErrorBoundary>);
        } catch (e) {
            console.error('Root render failed:', e);
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.innerHTML = "<div style='max-width:420px;padding:22px;text-align:center'><div style='font-size:42px;margin-bottom:10px'>⚠️</div><h2 style='font-size:1.2rem;font-weight:800;margin-bottom:8px;color:#ef4444'>主畫面啟動失敗</h2><p style='font-size:13px;color:#64748b;line-height:1.6'>請先使用上一個穩定版，或截圖 Console 錯誤。</p></div>";
            }
        }
    </script>
