<!DOCTYPE html>
<html lang="zh-HK"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>電子手冊 Pro｜更新紀錄</title><meta name="robots" content="noindex, nofollow"><style>
body{margin:0;background:linear-gradient(135deg,#f8fafc,#eef2ff,#fff);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans HK",Arial,sans-serif;color:#0f172a}.wrap{max-width:960px;margin:0 auto;padding:28px 16px 56px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}h1{margin:0;font-size:26px;letter-spacing:-.05em}p{color:#64748b;font-weight:650}.btn{display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 14px;border-radius:12px;background:#4f46e5;color:white;text-decoration:none;font-weight:900;font-size:13px}.card{background:rgba(255,255,255,.86);border:1px solid #e2e8f0;border-radius:22px;padding:18px;margin:12px 0;box-shadow:0 14px 44px rgba(15,23,42,.08)}.meta{font-size:12px;color:#64748b;font-weight:800;margin-bottom:8px}h2{margin:0 0 6px;font-size:20px;letter-spacing:-.04em}li{margin:5px 0;color:#334155;font-weight:650}.tag{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;padding:4px 9px;font-size:11px;font-weight:900;margin-left:8px}input{width:100%;height:42px;border:1px solid #e2e8f0;border-radius:14px;padding:0 12px;font:inherit;font-weight:700;box-sizing:border-box;margin:12px 0}
</style></head><body><main class="wrap"><div class="top"><div><h1>電子手冊 Pro 更新紀錄</h1><p>靜態版，無 Firebase，直接覆蓋 UD.html。</p></div><a class="btn" href="rchw/index.html">打開主程式</a></div><input id="q" placeholder="搜尋版本 / 功能，例如 v1.9.6、Email、派發"><div id="list"></div></main><script>
const DATA=[
{version:'v1.9.6.2',date:'2026-05-27',type:'介面美化',title:'高級登入頁面',backup:'backup/v1962.html',updates:['移除登入頁底部「功課清單 / 時間表 / 自訂科目」三個硬卡片。','登入頁改成更高級、更乾淨嘅現代 App 風格。','保留 v1.9.6.1 啟動修復、Email 認證、身份選擇、老師申請、派發中心同所有核心功能。','不修改 Firebase Rules 與資料結構。']},
{version:'v1.9.6',date:'2026-05-27',type:'安全加固',title:'公開版安全加固與舊殘留清理',backup:'backup/v1960.html',updates:['清走 joinedClasses / publicTasks / syncPublicTaskToPersonal 等舊底層殘留。','收緊 Firestore Rules：老師不再可以隨意修改學生功課，只能建立符合派發格式的新功課。','保留 Email 認證、身份選擇、老師申請、管理員批准老師、指定派發、pending 功課。','保留個人功課、時間表、科目管理、Google 登入、Email 登入、AdSense。']},
{version:'v1.9.5',date:'2026-05-27',type:'體驗完善',title:'公眾版安全與體驗改善',backup:'backup/v1950.html',updates:['Email 認證重發加入 60 秒冷卻。','老師申請資料更完整。','功課卡片加入來源標籤。','派發中心體驗改善。']},
{version:'v1.9.4',date:'2026-05-27',type:'穩定清理',title:'大更新穩定清理版',backup:'backup/v1940.html',updates:['清理舊班級 / 廣播 / 舊後台入口。','改善派發成功提示。','提供 Firestore Rules 參考。']},
{version:'v1.9.3',date:'2026-05-27',type:'清理',title:'公開版清理版',backup:'backup/v1930.html',updates:['清走舊班級和廣播 UI。','保留新派發中心。']},
{version:'v1.9.2',date:'2026-05-27',type:'功能',title:'派發中心',backup:'backup/v1920.html',updates:['管理員批准老師。','管理員勾選學生派發。','老師用 Email 派發。','pending 功課。']},
{version:'v1.9.1',date:'2026-05-27',type:'功能',title:'Email 認證與身份選擇',backup:'backup/v1910.html',updates:['Email 認證。','首次登入選學生 / 老師。','老師申請。']},
{version:'v1.9.0',date:'2026-05-27',type:'重整',title:'個人 App 重整第一階段',backup:'backup/v1900.html',updates:['底部導航改成主頁 / 功課 / 時間表 / 設定。','移除舊班級入口。','保留個人功課、時間表、科目管理。']}
];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function render(){const q=document.getElementById('q').value.toLowerCase();const list=DATA.filter(x=>JSON.stringify(x).toLowerCase().includes(q));document.getElementById('list').innerHTML=list.map(x=>`<article class="card"><div class="meta">${esc(x.date)} <span class="tag">${esc(x.type)}</span></div><h2>${esc(x.version)}｜${esc(x.title)}</h2><ul>${x.updates.map(u=>`<li>${esc(u)}</li>`).join('')}</ul><a class="btn" href="${esc(x.backup)}">打開備份</a></article>`).join('')||'<p>找不到版本。</p>';}
document.getElementById('q').addEventListener('input',render);render();</script></body></html>
