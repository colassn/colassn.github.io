<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <!-- 電子手冊 Pro UD.html 靜態更新紀錄頁 -->
    <!-- 無 Firebase、無 Google 登入、無資料庫；每次更新直接覆蓋此檔案即可 -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子手冊 Pro｜更新紀錄</title>
    <meta name="description" content="電子手冊 Pro 私人更新紀錄頁。">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#f8fafc">

    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.82);
            --card-solid: #ffffff;
            --text: #0f172a;
            --text-soft: #334155;
            --muted: #64748b;
            --muted-light: #94a3b8;
            --line: #e2e8f0;
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --green: #059669;
            --green-soft: #d1fae5;
            --amber: #d97706;
            --amber-soft: #fef3c7;
            --blue: #0284c7;
            --blue-soft: #e0f2fe;
            --slate-soft: #f1f5f9;
            --shadow: 0 18px 60px rgba(15, 23, 42, 0.10);
            --shadow-small: 0 8px 28px rgba(15, 23, 42, 0.06);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 12%, rgba(79, 70, 229, 0.14), transparent 30%),
                radial-gradient(circle at 88% 10%, rgba(14, 165, 233, 0.12), transparent 28%),
                linear-gradient(135deg, #f8fafc 0%, #eef2ff 46%, #ffffff 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans HK", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            line-height: 1.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .page {
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .mesh {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.035;
            background-image:
                linear-gradient(rgba(15, 23, 42, 0.72) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.72) 1px, transparent 1px);
            background-size: 46px 46px;
            mask-image: linear-gradient(to bottom, black, transparent 82%);
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: min(1040px, calc(100% - 28px));
            margin: 0 auto;
            padding: 26px 0 48px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .brand-mark {
            width: 46px;
            height: 46px;
            border-radius: 17px;
            display: grid;
            place-items: center;
            color: white;
            background:
                radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.36), transparent 30%),
                linear-gradient(145deg, #111827 0%, #312e81 50%, #4f46e5 100%);
            box-shadow: 0 16px 34px rgba(79, 70, 229, 0.24);
            font-size: 13px;
            font-weight: 950;
            letter-spacing: -0.04em;
            flex: 0 0 auto;
        }

        .brand h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.15;
            font-weight: 950;
            letter-spacing: -0.045em;
        }

        .brand p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 12px;
            font-weight: 750;
        }

        .top-actions {
            display: flex;
            gap: 9px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            min-height: 39px;
            padding: 0 13px;
            border: 1px solid var(--line);
            border-radius: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
            font-size: 13px;
            line-height: 1;
            font-weight: 850;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, border-color 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            background: #fff;
            border-color: #cbd5e1;
            box-shadow: 0 9px 24px rgba(15, 23, 42, 0.06);
        }

        .btn:active {
            transform: scale(0.985);
        }

        .btn.primary {
            color: white;
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.20);
        }

        .btn.primary:hover {
            background: var(--primary-dark);
        }

        .btn.small {
            min-height: 32px;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .note {
            margin-bottom: 16px;
            padding: 13px 15px;
            border-radius: 18px;
            color: #3730a3;
            background: rgba(238, 242, 255, 0.74);
            border: 1px solid rgba(199, 210, 254, 0.78);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.06);
            font-size: 13px;
            line-height: 1.65;
            font-weight: 750;
        }

        .tools {
            display: grid;
            grid-template-columns: 1fr 150px;
            gap: 10px;
            margin-bottom: 14px;
        }

        .input,
        .select {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.86);
            color: var(--text);
            padding: 0 13px;
            outline: none;
            font-size: 14px;
            font-weight: 650;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        .input:focus,
        .select:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.10);
        }

        .summary {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .chip {
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--line);
            color: #475569;
            font-size: 12px;
            line-height: 1;
            font-weight: 850;
        }

        .list {
            display: grid;
            gap: 12px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(226, 232, 240, 0.92);
            border-radius: var(--radius);
            box-shadow: var(--shadow-small);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 16px;
            animation: cardIn 0.25s ease both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 9px;
        }

        .title {
            min-width: 0;
        }

        .title h2 {
            margin: 0;
            font-size: 18px;
            line-height: 1.32;
            font-weight: 950;
            letter-spacing: -0.035em;
        }

        .meta {
            margin-top: 5px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
            font-weight: 760;
        }

        .badge {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 6px 10px;
            color: #334155;
            background: var(--slate-soft);
            border: 1px solid #cbd5e1;
            font-size: 11px;
            line-height: 1;
            font-weight: 950;
        }

        .badge.fix {
            color: #92400e;
            background: var(--amber-soft);
            border-color: #fde68a;
        }

        .badge.feature {
            color: #065f46;
            background: var(--green-soft);
            border-color: #a7f3d0;
        }

        .badge.ads {
            color: #075985;
            background: var(--blue-soft);
            border-color: #bae6fd;
        }

        .badge.stable {
            color: #334155;
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .summary-text {
            margin: 0 0 10px;
            color: #475569;
            font-size: 13px;
            line-height: 1.65;
            font-weight: 680;
        }

        .updates {
            margin: 0;
            padding-left: 20px;
            color: #334155;
            font-size: 13px;
            line-height: 1.7;
            font-weight: 680;
        }

        .updates li {
            margin: 2px 0;
        }

        .actions {
            margin-top: 13px;
            padding-top: 12px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty {
            text-align: center;
            padding: 40px 18px;
            border: 1px dashed #cbd5e1;
            border-radius: var(--radius);
            color: var(--muted);
            background: rgba(255, 255, 255, 0.62);
            font-size: 13px;
            line-height: 1.7;
            font-weight: 760;
        }

        .footer {
            margin-top: 22px;
            color: var(--muted-light);
            font-size: 12px;
            font-weight: 650;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }

        @media (max-width: 720px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .top-actions {
                justify-content: flex-start;
            }

            .tools {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .wrap {
                width: min(100% - 20px, 1040px);
                padding-top: 18px;
            }

            .brand h1 {
                font-size: 19px;
            }

            .card-top {
                display: grid;
            }

            .top-actions .btn,
            .actions .btn {
                width: auto;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <div class="mesh"></div>

        <div class="wrap">
            <header class="topbar">
                <a class="brand" href="rchw/index.html">
                    <div class="brand-mark">UD</div>
                    <div>
                        <h1>電子手冊 Pro 更新紀錄</h1>
                        <p>靜態版 · 無 Firebase · 無登入 · 直接覆蓋檔案</p>
                    </div>
                </a>

                <div class="top-actions">
                    <a class="btn primary" href="rchw/index.html">打開主程式</a>
                    <a class="btn" href="index.html">打開首頁</a>
                </div>
            </header>

            <div class="note">
                呢頁係私人用靜態更新紀錄。之後每次更新主程式，我會一併俾你新版 <strong>UD.html</strong>，你直接覆蓋 repo 根目錄就得，唔需要 Firebase、唔需要登入、唔需要後台設定。
            </div>

            <section class="tools">
                <input class="input" id="searchInput" placeholder="搜尋版本、功能、問題，例如：v1.8.26 / Google / 加入班級 / AdSense">
                <select class="select" id="filterInput">
                    <option value="all">全部類型</option>
                    <option value="fix">修復</option>
                    <option value="feature">功能</option>
                    <option value="ads">AdSense</option>
                    <option value="stable">穩定版</option>
                </select>
            </section>

            <section class="summary">
                <span class="chip" id="totalChip">共 0 個版本</span>
                <span class="chip" id="latestChip">最新：--</span>
                <span class="chip">資料來源：UD.html 內置</span>
            </section>

            <section class="list" id="listBox"></section>

            <footer class="footer">
                <div>© 2026 電子手冊 Pro</div>
                <div>最後更新：2026-05-27｜最新版本 v1.8.27</div>
            </footer>
        </div>
    </main>

    <script>
        const VERSION_HISTORY = [
            {
                version: "v1.8.27",
                code: "v1827",
                date: "2026-05-27",
                type: "fix",
                title: "加強跨瀏覽器 Google 登入穩定性",
                backupUrl: "backup/v1827.html",
                summary: "針對部分瀏覽器選完 Google 帳戶後仍停留登入頁的情況，加強登入後狀態切換與 redirect fallback。",
                updates: [
                    "Safari、Firefox、iPad、PWA、內置瀏覽器會優先使用 redirect 登入，減少 popup 狀態丟失問題。",
                    "Chrome 等瀏覽器仍可使用 popup 登入，但成功後會等待登入狀態並多次通知主程式切入主頁。",
                    "加入登入後自動恢復檢查，當瀏覽器稍後才取得 auth.currentUser 時仍會進入主程式。",
                    "保留 v1.8.26 的加入班級和科目管理修復。",
                    "保留原有 Google 登入、Email 登入、Firebase、功課、班級廣播、管理員功能與 AdSense。"
                ]
            },
            {
                version: "v1.8.26",
                code: "v1826",
                date: "2026-05-27",
                type: "fix",
                title: "修復加入班級、科目管理與 Google 登入跳轉",
                backupUrl: "backup/v1826.html",
                summary: "修復主程式三個重點問題，並保留原有功能。",
                updates: [
                    "修復「加入班級」按鈕點擊後沒有彈窗。",
                    "修復「設定 > 科目管理」點擊後沒有打開頁面。",
                    "加強 Google 登入成功後的畫面切換保護，避免停留在登入頁。",
                    "保留原有 Google 登入、Email 登入、Firebase、功課列表、班級廣播、管理員功能。",
                    "保留 AdSense Auto Ads script。",
                    "沒有加入「同步」字眼或同步按鈕。"
                ]
            },
            {
                version: "v1.8.25",
                code: "v1825",
                date: "2026-05-27",
                type: "ads",
                title: "主程式加入 AdSense Auto Ads",
                backupUrl: "backup/v1825.html",
                summary: "主程式加入 Google AdSense Auto Ads，等待 Google 審核完成後顯示。",
                updates: [
                    "在 /rchw/index.html 加入 AdSense Auto Ads script。",
                    "保留 Google 登入、Email 登入、Firebase 與功課功能。",
                    "保留班級廣播、管理員功能與學生登入後自動補領廣播功課。",
                    "不改動 public 頁面與 rchw 路徑。"
                ]
            },
            {
                version: "v1.8.24",
                code: "v1824",
                date: "2026-05-26",
                type: "feature",
                title: "班級頁面清理與更新彈窗",
                backupUrl: "backup/v1824.html",
                summary: "清走班級頁手動加入提示，加入內建更新彈窗。",
                updates: [
                    "移除班級頁面手動加入提示。",
                    "學生登入後自動補領應收廣播功課。",
                    "加入版本更新彈窗。",
                    "管理員發放廣播功課後，目標學生自動收到。"
                ]
            },
            {
                version: "v1.8.23",
                code: "v1823",
                date: "2026-05-26",
                type: "feature",
                title: "廣播功課自動派發流程",
                backupUrl: "backup/v1823.html",
                summary: "班級廣播功課改為管理員發放後自動派發，學生不需要手動加入。",
                updates: [
                    "管理員發放廣播功課後，自動寫入目標學生個人功課。",
                    "使用固定路徑 users/{學生UID}/items/public_{廣播功課ID}，避免重複功課。",
                    "學生登入後會自動補領應收但漏派的廣播功課。",
                    "移除手動同步或手動加入方向。"
                ]
            },
            {
                version: "v1.8.21",
                code: "v1821",
                date: "2026-05-26",
                type: "fix",
                title: "Google 登入穩定版流程",
                backupUrl: "backup/v1821.html",
                summary: "加強 Google 登入流程，改善 popup / redirect 狀態處理。",
                updates: [
                    "加入 Google 登入穩定版啟動保護。",
                    "改善不同瀏覽器的 popup 與 redirect fallback。",
                    "加入登入錯誤友善提示。",
                    "保留 Email 登入和忘記密碼功能。"
                ]
            },
            {
                version: "v1.8.16",
                code: "v1816",
                date: "2026-05-26",
                type: "stable",
                title: "早期穩定備份版本",
                backupUrl: "backup/v1816.html",
                summary: "作為舊版本備份與回滾參考。",
                updates: [
                    "保留早期主程式狀態。",
                    "可用作版本回滾參考。",
                    "建議只在新版出現嚴重問題時使用。"
                ]
            }
        ];

        const TYPE_LABEL = {
            fix: "修復",
            feature: "功能",
            ads: "AdSense",
            stable: "穩定版"
        };

        const searchInput = document.getElementById("searchInput");
        const filterInput = document.getElementById("filterInput");
        const listBox = document.getElementById("listBox");
        const totalChip = document.getElementById("totalChip");
        const latestChip = document.getElementById("latestChip");

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function render() {
            const keyword = searchInput.value.trim().toLowerCase();
            const filter = filterInput.value;

            let list = [...VERSION_HISTORY];

            if (filter !== "all") {
                list = list.filter(item => item.type === filter);
            }

            if (keyword) {
                list = list.filter(item => {
                    const text = [
                        item.version,
                        item.code,
                        item.date,
                        item.type,
                        item.title,
                        item.summary,
                        item.backupUrl,
                        ...(item.updates || [])
                    ].join(" ").toLowerCase();

                    return text.includes(keyword);
                });
            }

            totalChip.textContent = `共 ${VERSION_HISTORY.length} 個版本`;
            latestChip.textContent = VERSION_HISTORY[0] ? `最新：${VERSION_HISTORY[0].version}` : "最新：--";

            if (!list.length) {
                listBox.innerHTML = `<div class="empty">暫時沒有符合搜尋條件的版本。</div>`;
                return;
            }

            listBox.innerHTML = list.map(item => {
                const updates = Array.isArray(item.updates) ? item.updates : [];
                const backupButton = item.backupUrl
                    ? `<a class="btn small" href="${escapeHtml(item.backupUrl)}" target="_blank" rel="noopener">打開備份</a>`
                    : `<span class="btn small">未有備份</span>`;

                return `
                    <article class="card">
                        <div class="card-top">
                            <div class="title">
                                <h2>${escapeHtml(item.version)}｜${escapeHtml(item.title)}</h2>
                                <div class="meta">${escapeHtml(item.date)} · ${escapeHtml(item.code)}</div>
                            </div>
                            <span class="badge ${escapeHtml(item.type)}">${escapeHtml(TYPE_LABEL[item.type] || "版本")}</span>
                        </div>

                        <p class="summary-text">${escapeHtml(item.summary)}</p>

                        <ul class="updates">
                            ${updates.map(line => `<li>${escapeHtml(line)}</li>`).join("")}
                        </ul>

                        <div class="actions">
                            ${backupButton}
                        </div>
                    </article>
                `;
            }).join("");
        }

        searchInput.addEventListener("input", render);
        filterInput.addEventListener("change", render);

        render();
    </script>
</body>
</html>
