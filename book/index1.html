        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;

        const IconCart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
        const IconClipboardList = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>;

        const getSafeCollectorName = () => { try { return localStorage.getItem("collectorName") || ""; } catch (e) { return ""; } };
        const setSafeCollectorName = (name) => { try { localStorage.setItem("collectorName", name); } catch (e) {} };
        const formatBookTitle = (item) => item.form !== 'all' ? `F.${item.form} ${item.subject} ${item.name}` : item.name;

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("React Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-full p-8 text-center bg-slate-50 overflow-y-auto">
                            <div className="text-red-500 mb-4"><IconWarning /></div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2">系統介面發生錯誤</h2>
                            <p className="text-sm font-bold text-slate-500 mb-6">請點擊下方按鈕重新整理網頁。</p>
                            <button onClick={() => window.location.reload()} className="px-8 py-3 bg-slate-900 text-white rounded-2xl font-bold shadow-md hover:bg-slate-800 transition-all active:scale-95">重新整理</button>
                            <pre className="mt-8 text-left text-xs bg-slate-200 p-4 rounded-2xl w-full max-w-lg overflow-auto max-h-48 text-slate-600 font-mono shadow-inner-soft">{this.state.error && this.state.error.toString()}</pre>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function AppConfirmDialog({ dialog, onClose }) {
            if (!dialog?.show) return null;
            const isDanger = dialog.tone === "danger";
            const isWarning = dialog.tone === "warning";
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[90] app-modal-backdrop">
                    <div className="bg-white rounded-[28px] w-[95%] max-w-sm shadow-floating border border-white/60 overflow-hidden animate-modal-pop">
                        <div className={`p-6 ${isDanger ? "bg-red-50" : isWarning ? "bg-amber-50" : "bg-brand-50"}`}>
                            <div className="flex items-start gap-4">
                                <div className={`p-3 rounded-2xl shadow-sm ${isDanger ? "bg-red-100 text-red-600" : isWarning ? "bg-amber-100 text-amber-600" : "bg-brand-100 text-brand-700"}`}><IconWarning /></div>
                                <div className="flex-1">
                                    <h3 className="text-xl font-black text-slate-900 leading-tight">{dialog.title}</h3>
                                    <p className="mt-2 text-sm font-bold text-slate-600 leading-relaxed whitespace-pre-line">{dialog.message}</p>
                                </div>
                            </div>
                        </div>
                        <div className="p-4 bg-white flex flex-col gap-3">
                            <button type="button" onClick={async () => { const action = dialog.onConfirm; onClose(); if (action) await action(); }} className={`w-full py-3.5 rounded-2xl text-sm font-black text-white shadow-md btn-spring ${isDanger ? "bg-red-600 hover:bg-red-700" : isWarning ? "bg-amber-500 hover:bg-amber-600" : "bg-brand-600 hover:bg-brand-700"}`}>{dialog.confirmText || "確認"}</button>
                            <button type="button" onClick={onClose} className="w-full py-3.5 rounded-2xl text-sm font-black bg-slate-100 text-slate-700 hover:bg-slate-200 btn-spring">{dialog.cancelText || "取消"}</button>
                        </div>
                    </div>
                </div>
            );
        }

        function AppPromptDialog({ dialog, onClose }) {
            const [value, setValue] = useState(dialog?.initialValue || "");
            useEffect(() => { if (dialog?.show) setValue(dialog.initialValue || ""); }, [dialog?.show, dialog?.initialValue]);
            if (!dialog?.show) return null;
            const submitValue = () => {
                if (!value.trim()) return;
                const action = dialog.onSubmit;
                onClose();
                if (action) action(value.trim());
            };
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[90] app-modal-backdrop">
                    <div className="bg-white rounded-[28px] w-[95%] max-w-sm shadow-floating border border-white/60 overflow-hidden animate-modal-pop">
                        <div className="p-6 bg-brand-50">
                            <h3 className="text-xl font-black text-slate-900">{dialog.title}</h3>
                            {dialog.message && <p className="mt-2 text-sm font-bold text-slate-600 leading-relaxed">{dialog.message}</p>}
                        </div>
                        <div className="p-5 bg-white space-y-4">
                            <input autoFocus type="text" value={value} onChange={(e) => setValue(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") submitValue(); }} placeholder={dialog.placeholder || ""} className="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-black shadow-inner-soft" />
                            <div className="flex gap-3">
                                <button type="button" onClick={onClose} className="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-700 text-sm font-black hover:bg-slate-200 btn-spring">取消</button>
                                <button type="button" disabled={!value.trim()} onClick={submitValue} className="flex-1 py-3 rounded-2xl bg-brand-600 text-white text-sm font-black shadow-md hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed btn-spring">確認新增</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function AppSwitch({ checked, onChange, label }) {
            return (
                <button type="button" role="switch" aria-checked={checked} onClick={() => onChange(!checked)} className={`flex items-center gap-2 px-3 py-2 rounded-2xl border text-xs font-black transition-all shadow-sm btn-spring ${checked ? "bg-slate-900 text-white border-slate-900" : "bg-white text-slate-600 border-slate-200 hover:bg-slate-50"}`}>
                    <span className={`w-9 h-5 rounded-full p-0.5 flex transition-all ${checked ? "bg-brand-500 justify-end" : "bg-slate-300 justify-start"}`}>
                        <span className="w-4 h-4 bg-white rounded-full shadow-sm"></span>
                    </span>
                    {label}
                </button>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [dbConnected, setDbConnected] = useState(false);
            const [students, setStudents] = useState([]);
            const [catalog, setCatalog] = useState([]); 
            const [loading, setLoading] = useState(true);
            const [collectorName, setCollectorName] = useState(getSafeCollectorName);
            const [filterCollector, setFilterCollector] = useState("all");
            const [search, setSearch] = useState("");
            const [sortBy, setSortBy] = useState("form");
            const [activeId, setActiveId] = useState(null);
            const [displayStudent, setDisplayStudent] = useState(null);
            const [activeMobileTab, setActiveMobileTab] = useState("menu");
            const [activeCatalogForm, setActiveCatalogForm] = useState("3");
            const [activeSubject, setActiveSubject] = useState("All");
            const [customBookName, setCustomBookName] = useState("");
            const [customBookPrice, setCustomBookPrice] = useState("");
            const [editingBookId, setEditingBookId] = useState(null);
            const [tempBasePrice, setTempBasePrice] = useState("");
            const [tempDeduction, setTempDeduction] = useState("");
            const [tempDeductReason, setTempDeductReason] = useState("");
            const [showAddStudentModal, setShowAddStudentModal] = useState(false);
            const [showEditStudentModal, setShowEditStudentModal] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showExportModal, setShowExportModal] = useState(false);
            const [showReceiptModal, setShowReceiptModal] = useState(false);
            const [showCollectorStatsModal, setShowCollectorStatsModal] = useState(false);
            const [pendingAddBook, setPendingAddBook] = useState(null); 
            const [newStudent, setNewStudent] = useState({ form: "3", name: "", phone: "" });
            const [editStudentData, setEditStudentData] = useState({ form: "3", name: "", phone: "" });
            const [settingsFilterForm, setSettingsFilterForm] = useState("3");
            const [editingCatId, setEditingCatId] = useState(null);
            const [editCatData, setEditCatData] = useState({ name: "", price: "", isPackage: false });
            const [addingCatSubject, setAddingCatSubject] = useState(null);
            const [newCatData, setNewCatData] = useState({ name: "", price: "0", isPackage: false });
            const [confirmDialog, setConfirmDialog] = useState({ show: false, title: "", message: "", tone: "danger", confirmText: "確認", cancelText: "取消", onConfirm: null });
            const [promptDialog, setPromptDialog] = useState({ show: false, title: "", message: "", placeholder: "", initialValue: "", onSubmit: null });
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });

            const showToast = useCallback((message, type = "success") => { setToast({ show: true, message, type }); setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3500); }, []);
            const openConfirm = useCallback((options) => { setConfirmDialog({ show: true, tone: "danger", confirmText: "確認", cancelText: "取消", ...options }); }, []);
            const closeConfirm = useCallback(() => { setConfirmDialog(prev => ({ ...prev, show: false, onConfirm: null })); }, []);
            const openPrompt = useCallback((options) => { setPromptDialog({ show: true, title: "", message: "", placeholder: "", initialValue: "", onSubmit: null, ...options }); }, []);
            const closePrompt = useCallback(() => { setPromptDialog(prev => ({ ...prev, show: false, onSubmit: null })); }, []);

            const activeStudent = useMemo(() => students.find(s => s.docId === activeId) || null, [students, activeId]);
            useEffect(() => { if (activeStudent) setDisplayStudent(activeStudent); }, [activeStudent]);
            const renderStudent = activeId ? activeStudent : displayStudent;
            const normalizedCatalog = useMemo(() => catalog.map(c => ({ id: c.id, form: c.form || 'all', subject: c.subject || '自訂', name: c.name || c.title || '未命名', price: Number(c.price) || 0, isPackage: c.isPackage || false })), [catalog]);
            const getActualPrice = useCallback((book) => Math.max(0, Number(book.basePrice !== undefined ? book.basePrice : book.price || 0) - Number(book.deduction || 0)), []);

            const stats = useMemo(() => {
                let totalAccepted = 0, totalAmount = 0, totalRejected = 0;
                students.forEach(s => { (s.books || []).forEach(b => { if (b.status === 'accepted') { totalAccepted++; totalAmount += getActualPrice(b); } else { totalRejected++; } }); });
                return { totalAccepted, totalAmount, totalRejected };
            }, [students, getActualPrice]);

            const activeStats = useMemo(() => {
                if (!renderStudent) return { total: 0, acceptedBooks: 0, acceptedPackages: 0 };
                return (renderStudent.books || []).reduce((acc, b) => {
                    if (b.status === 'accepted') {
                        acc.total += getActualPrice(b);
                        const isPkg = normalizedCatalog.some(c => formatBookTitle(c) === b.title && c.isPackage);
                        if (isPkg) acc.acceptedPackages++; else acc.acceptedBooks++;
                    }
                    return acc;
                }, { total: 0, acceptedBooks: 0, acceptedPackages: 0 });
            }, [renderStudent, normalizedCatalog, getActualPrice]);

            const missingBooks = useMemo(() => {
                if (!renderStudent || !['1','2','3'].includes(renderStudent.form)) return [];
                const expectedSingleBooks = normalizedCatalog.filter(c => c.form === renderStudent.form && !c.isPackage);
                const acceptedTitles = (renderStudent.books || []).filter(b => b.status === 'accepted').map(b => b.title);
                const acceptedPackageSubjects = normalizedCatalog.filter(c => c.isPackage && acceptedTitles.includes(formatBookTitle(c))).map(c => c.subject);
                return expectedSingleBooks.filter(c => !acceptedTitles.includes(formatBookTitle(c)) && !acceptedPackageSubjects.includes(c.subject));
            }, [renderStudent, normalizedCatalog]);

            const collectorStats = useMemo(() => {
                const statsMap = {};
                students.forEach(student => {
                    (student.books || []).forEach(book => {
                        if (book.status === 'accepted') {
                            const cName = book.collectedBy || '未指派';
                            if (!statsMap[cName]) statsMap[cName] = { count: 0, total: 0, items: [] };
                            statsMap[cName].count += 1; statsMap[cName].total += getActualPrice(book);
                            statsMap[cName].items.push({ studentName: student.name, studentForm: student.form, bookTitle: book.title, price: getActualPrice(book), id: book.id });
                        }
                    });
                });
                return statsMap;
            }, [students, getActualPrice]);

            const uniqueCollectors = useMemo(() => Array.from(new Set(students.flatMap(s => (s.books||[]).filter(b => b.status==='accepted' && b.collectedBy).map(b => b.collectedBy)))).sort(), [students]);
            const hasZeroPriceWarning = useMemo(() => normalizedCatalog.some(c => c.price === 0), [normalizedCatalog]);

            const processedStudents = useMemo(() => {
                let filtered = students.filter(s => s.name.includes(search) || (s.phone && s.phone.includes(search)) || `f.${s.form}`.toLowerCase().includes(search.toLowerCase()));
                if (filterCollector !== "all") filtered = filtered.filter(s => (s.books || []).some(b => b.status === 'accepted' && b.collectedBy === filterCollector));
                return filtered.sort((a, b) => {
                    if (sortBy === 'name') return a.name.localeCompare(b.name, 'zh-HK');
                    if (sortBy === 'amount') {
                        const amtA = (a.books || []).reduce((sum, bk) => bk.status === 'accepted' ? sum + getActualPrice(bk) : sum, 0);
                        const amtB = (b.books || []).reduce((sum, bk) => bk.status === 'accepted' ? sum + getActualPrice(bk) : sum, 0);
                        return amtB - amtA;
                    }
                    if (a.form !== b.form) return a.form - b.form;
                    return (a.order || 0) - (b.order || 0);
                });
            }, [students, search, sortBy, filterCollector, getActualPrice]);

            const currentFormCatalogItems = useMemo(() => normalizedCatalog.filter(c => c.form === activeCatalogForm), [normalizedCatalog, activeCatalogForm]);
            const allSubjectsForForm = useMemo(() => ['All', ...Array.from(new Set(currentFormCatalogItems.map(c => c.subject)))], [currentFormCatalogItems]);
            const displayCatalogItems = useMemo(() => activeSubject === 'All' ? currentFormCatalogItems : currentFormCatalogItems.filter(c => c.subject === activeSubject), [currentFormCatalogItems, activeSubject]);
            const filteredSettingsCatalog = useMemo(() => normalizedCatalog.filter(c => settingsFilterForm === 'all' || c.form === settingsFilterForm), [normalizedCatalog, settingsFilterForm]);
            const settingsCatalogBySubject = useMemo(() => {
                const grouped = {};
                filteredSettingsCatalog.forEach(item => { if(!grouped[item.subject]) grouped[item.subject] = []; grouped[item.subject].push(item); });
                return grouped;
            }, [filteredSettingsCatalog]);

            useEffect(() => { setSafeCollectorName(collectorName); }, [collectorName]);
            useEffect(() => {
                auth.signInAnonymously().catch(() => { showToast("驗證失敗", "error"); });
                const unsub = auth.onAuthStateChanged(usr => { setUser(usr); setDbConnected(!!usr); });
                return () => unsub();
            }, [showToast]);

            useEffect(() => {
                if (!user) return;
                const unsubStudents = getStudentsRef().onSnapshot(snapshot => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setStudents(list);
                    if (list.length > 0 && !activeId && window.innerWidth >= 1024) setActiveId(list[0].docId);
                    setLoading(false);
                }, () => { showToast("載入名單失敗", "error"); setLoading(false); });
                const unsubCatalog = getCatalogRef().onSnapshot(docSnap => {
                    if (docSnap.exists && docSnap.data().items && docSnap.data().items.length > 0) {
                        setCatalog(docSnap.data().items);
                    } else {
                        let defaultCat = [];
                        ['1', '2', '3'].forEach(f => {
                            BOOK_TEMPLATES.forEach(subj => {
                                subj.items.forEach((item, idx) => {
                                    defaultCat.push({ id: `def_f${f}_${subj.s}_${idx}`, form: f, subject: subj.s, name: item.name, price: f === '3' ? item.f3Price : 0, isPackage: item.pkg });
                                });
                            });
                        });
                        setCatalog(defaultCat);
                        getCatalogRef().set({ items: defaultCat });
                    }
                });
                return () => { unsubStudents(); unsubCatalog(); };
            }, [user, activeId, showToast]);

            useEffect(() => {
                if (activeStudent && ['1','2','3'].includes(activeStudent.form)) setActiveCatalogForm(activeStudent.form);
                else if (activeStudent) setActiveCatalogForm("all");
                setActiveSubject("All");
                setActiveMobileTab("menu"); 
            }, [activeStudent?.docId]);

            function handleFormTabClick(formId) { setActiveCatalogForm(formId); setActiveSubject("All"); }

            async function handleCreateStudent(e) {
                e.preventDefault();
                if (!newStudent.name.trim()) return;
                const newDocId = `student_${Date.now()}`;
                try {
                    await getStudentsRef().doc(newDocId).set({ name: newStudent.name.trim(), form: newStudent.form, phone: newStudent.phone.trim() || "--", order: Date.now(), books: [] });
                    setActiveId(newDocId); setShowAddStudentModal(false); setNewStudent({ form: "3", name: "", phone: "" }); showToast(`已新增學生: ${newStudent.name}`);
                } catch(err) { showToast("新增失敗", "error"); }
            }

            function openEditStudent() { 
                if(!renderStudent) return;
                setEditStudentData({ name: renderStudent.name, form: renderStudent.form, phone: renderStudent.phone === "--" ? "" : renderStudent.phone }); 
                setShowEditStudentModal(true); 
            }
            
            async function handleSaveStudentEdit(e) {
                e.preventDefault();
                if (!editStudentData.name.trim() || !renderStudent) return;
                try { 
                    await getStudentsRef().doc(renderStudent.docId).update({ name: editStudentData.name.trim(), form: editStudentData.form, phone: editStudentData.phone.trim() || "--" }); 
                    setShowEditStudentModal(false); showToast("資料已更新"); 
                } catch(err) { showToast("更新失敗", "error"); }
            }

            function handleDeleteStudent() {
                if (!renderStudent) return;
                openConfirm({
                    title: "刪除學生紀錄？",
                    message: `確定要刪除學生「${renderStudent.name}」？\n此操作無法復原。`,
                    tone: "danger",
                    confirmText: "確認刪除",
                    cancelText: "保留資料",
                    onConfirm: async () => {
                        try { await getStudentsRef().doc(renderStudent.docId).delete(); setActiveId(null); setDisplayStudent(null); showToast("已刪除學生紀錄"); } 
                        catch(err) { showToast("刪除失敗", "error"); }
                    }
                });
            }

            async function saveCatalogToDB(newCatalog) { 
                try { await getCatalogRef().set({ items: newCatalog }, { merge: true }); showToast("設定已儲存"); } catch(err) { showToast("儲存失敗", "error"); }
            }

            function handleResetDefaultCatalog() {
                openConfirm({
                    title: "載入預設全科書單？",
                    message: "這會清除目前所有自訂書單設定，並重新建立中一至中三預設項目。",
                    tone: "warning",
                    confirmText: "載入預設",
                    cancelText: "取消",
                    onConfirm: async () => {
                        let defaultCat = [];
                        ['1', '2', '3'].forEach(f => {
                            BOOK_TEMPLATES.forEach(subj => {
                                subj.items.forEach((item, idx) => {
                                    defaultCat.push({ id: `def_f${f}_${subj.s}_${idx}_${Date.now()}`, form: f, subject: subj.s, name: item.name, price: f === '3' ? item.f3Price : 0, isPackage: item.pkg });
                                });
                            });
                        });
                        await saveCatalogToDB(defaultCat);
                    }
                });
            }

            function handleSaveCatEdit(id) {
                if (!editCatData.name.trim()) return;
                const updated = normalizedCatalog.map(c => c.id === id ? { ...c, name: editCatData.name.trim(), price: Number(editCatData.price)||0, isPackage: editCatData.isPackage } : c);
                saveCatalogToDB(updated);
                setEditingCatId(null);
            }

            function handleSaveNewCat(subject) {
                if (!newCatData.name.trim()) return;
                const newItem = { id: `cat_${Date.now()}`, form: settingsFilterForm, subject: subject, name: newCatData.name.trim(), price: Number(newCatData.price)||0, isPackage: newCatData.isPackage };
                saveCatalogToDB([...normalizedCatalog, newItem]);
                setAddingCatSubject(null);
                setNewCatData({ name: "", price: "0", isPackage: false });
            }

            function handleAddNewSubject() {
                openPrompt({
                    title: "新增自訂科目",
                    message: "請輸入新科目名稱，例如：電腦科、視藝、普通話。",
                    placeholder: "例如：電腦科",
                    onSubmit: (subj) => { setAddingCatSubject(subj); setNewCatData({ name: "", price: "0", isPackage: false }); }
                });
            }

            function handleDeleteCatalogItem(id) { 
                const target = normalizedCatalog.find(c => c.id === id);
                openConfirm({
                    title: "刪除書單項目？",
                    message: `確定要刪除「${target?.name || "此項目"}」？\n刪除後不會影響已登記到學生紀錄的書籍。`,
                    tone: "danger",
                    confirmText: "確認刪除",
                    cancelText: "取消",
                    onConfirm: () => saveCatalogToDB(normalizedCatalog.filter(c => c.id !== id))
                });
            }

            function initiateAddBook(title, priceStr) {
                if (!renderStudent || !title.trim()) return;
                if (!collectorName.trim()) { showToast("⚠️ 請先輸入經手人代號", "error"); document.getElementById('collector-input')?.focus(); return; }
                const numPrice = Number(priceStr) || 0;
                const isDuplicate = (renderStudent.books || []).some(b => b.title === title && b.status === 'accepted');
                if (isDuplicate) { setPendingAddBook({ title, price: numPrice, step: 'duplicate' }); return; }
                if (numPrice === 0) { setPendingAddBook({ title, price: 0, step: 'zero' }); return; }
                executeAddBook(title, numPrice);
            }

            function confirmPendingAddBook() {
                if (!pendingAddBook) return;
                if (pendingAddBook.step === 'duplicate' && pendingAddBook.price === 0) { setPendingAddBook({ ...pendingAddBook, step: 'zero' }); return; }
                executeAddBook(pendingAddBook.title, pendingAddBook.price);
            }

            async function executeAddBook(title, numPrice) {
                setPendingAddBook(null);
                const newBook = { id: `${Date.now()}_${Math.random().toString(36).substr(2, 5)}`, title: title, basePrice: numPrice, deduction: 0, deductionReason: "", status: 'accepted', collectedBy: collectorName.trim(), createdAt: new Date().toISOString() };
                try { await getStudentsRef().doc(renderStudent.docId).update({ books: [...(renderStudent.books || []), newBook] }); setCustomBookName(""); setCustomBookPrice(""); } 
                catch (err) { showToast("寫入失敗", "error"); }
            }

            function handleQuickAddBook(item) { initiateAddBook(formatBookTitle(item), item.price); }
            function handleKeyDown(e) { if (e.key === 'Enter') initiateAddBook(customBookName, customBookPrice || "0"); }

            async function handleToggleBookStatus(bookId) {
                if (!renderStudent) return;
                const updatedBooks = renderStudent.books.map(b => b.id === bookId ? { ...b, status: b.status === 'accepted' ? 'rejected' : 'accepted', rejectReason: b.status === 'accepted' ? '退回' : '' } : b);
                try { await getStudentsRef().doc(renderStudent.docId).update({ books: updatedBooks }); } catch(err) { showToast("更新失敗", "error"); }
            }

            function handleDeleteBook(bookId) { 
                if (!renderStudent) return; 
                const target = (renderStudent.books || []).find(b => b.id === bookId);
                openConfirm({
                    title: "移除此書紀錄？",
                    message: `確定要從「${renderStudent.name}」的紀錄中移除「${target?.title || "此書"}」？`,
                    tone: "danger",
                    confirmText: "確認移除",
                    cancelText: "取消",
                    onConfirm: async () => {
                        try { await getStudentsRef().doc(renderStudent.docId).update({ books: renderStudent.books.filter(b => b.id !== bookId) }); showToast("已移除此書紀錄"); } 
                        catch(err) { showToast("刪除失敗", "error"); }
                    }
                });
            }
            
            async function handleSaveBookEdits(bookId) {
                if (!renderStudent) return;
                const updatedBooks = renderStudent.books.map(b => b.id === bookId ? { ...b, basePrice: Number(tempBasePrice) || 0, deduction: Number(tempDeduction) || 0, deductionReason: tempDeductReason.trim() } : b);
                try { await getStudentsRef().doc(renderStudent.docId).update({ books: updatedBooks }); setEditingBookId(null); } catch(err) { showToast("儲存失敗", "error"); }
            }

            const generateExportData = () => {
                const sortedForExcel = [...students].sort((a, b) => (a.order || 0) - (b.order || 0));
                let textContent = ""; let csvContent = "\uFEFF班級,姓名,電話號碼,總金額,已收書籍明細,退回書籍\n";
                sortedForExcel.forEach(s => {
                    const books = s.books || [];
                    if (books.length === 0) { textContent += "\t\n"; csvContent += `${s.form},${s.name},${s.phone},0,,\n`; } 
                    else {
                        const acceptedBooks = books.filter(b => b.status === 'accepted');
                        const rejectedBooks = books.filter(b => b.status === 'rejected');
                        const allDetails = books.map(b => {
                            if (b.status === 'accepted') {
                                const deductText = b.deduction > 0 ? `(扣$${b.deduction}:${b.deductionReason})` : '';
                                const collectorText = b.collectedBy ? `[經手:${b.collectedBy}]` : '';
                                return `[收] ${b.title}${deductText}${collectorText}`;
                            } else return `[退] ${b.title}`;
                        }).join(', ');
                        const total = acceptedBooks.reduce((sum, b) => sum + getActualPrice(b), 0);
                        textContent += `${allDetails}\t${total}\n`;
                        const acceptedStr = acceptedBooks.map(b => {
                            const deductText = b.deduction > 0 ? ` [扣$${b.deduction}: ${b.deductionReason}]` : '';
                            const collectorText = b.collectedBy ? ` [經手: ${b.collectedBy}]` : '';
                            return `${b.title}($${getActualPrice(b)})${deductText}${collectorText}`;
                        }).join('; ');
                        const rejectedStr = rejectedBooks.map(b => b.title).join('; ');
                        csvContent += `${s.form},${s.name},${s.phone},${total},"${acceptedStr}","${rejectedStr}"\n`;
                    }
                });
                return { textContent, csvContent };
            };

            function handleDownloadCSV() {
                const { csvContent } = generateExportData();
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `BookRecycling_Export_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            }

                        <div className="space-y-3">
                            {(renderStudent.books || []).map(b => {
                                const isAccepted = b.status === 'accepted';

                                return (
                                    <div key={b.id} className={`cart-row-card cart-item-premium border rounded-2xl transition-all animate-fade-in-up ${isAccepted ? 'border-white bg-white/92' : 'border-red-200 bg-red-50/80 opacity-80'}`}>
                                        <div className="p-3.5">
                                            <div className="cart-main-line">
                                                <div className={`mt-0.5 shrink-0 ${isAccepted ? 'text-green-500' : 'text-red-500'}`}>{isAccepted ? <IconCheck /> : <IconX />}</div>
                                                <div className="flex-1 min-w-0">
                                                    <p className={`cart-title-text text-[13px] md:text-sm font-black ${!isAccepted && 'line-through text-slate-400'}`}>{b.title}</p>
                                                    <div className="cart-meta-line text-[10px] md:text-xs">
                                                        <span className="text-slate-500 font-bold bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">原價: ${basePrice}</span>
                                                        {deduction > 0 && isAccepted && <span className="bg-amber-100 text-amber-800 px-2 py-1 rounded-lg font-bold border border-amber-200">扣 ${deduction}：{b.deductionReason}</span>}
                                                        {b.collectedBy && isAccepted && <span className="text-slate-500 font-bold bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">👤 {b.collectedBy}</span>}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="cart-action-line mt-3">
                                                {isAccepted ? <div className="cart-price-text">${actualPrice}</div> : <div className="text-sm font-black text-red-500">已退回</div>}

                                                    {isAccepted && <button type="button" onClick={() => { if(isEditing){ setEditingBookId(null); } else { setEditingBookId(b.id); setTempBasePrice(basePrice); setTempDeduction(b.deduction || ""); setTempDeductReason(b.deductionReason || ""); } }} className="tap-target p-2 text-slate-500 bg-slate-100 rounded-xl hover:bg-brand-50 hover:text-brand-600 transition-colors btn-spring" title="修改"><IconEdit /></button>}
                                                    <button type="button" onClick={() => handleToggleBookStatus(b.id)} className="tap-target px-3 py-2 text-[10px] font-black text-slate-600 bg-slate-100 rounded-xl border border-slate-200 transition-colors hover:bg-slate-200 btn-spring whitespace-nowrap">{isAccepted ? "退回" : "恢復"}</button>
                                                    <button type="button" onClick={() => handleDeleteBook(b.id)} className="tap-target p-2 text-red-500 bg-slate-100 rounded-xl hover:bg-red-50 transition-colors btn-spring"><IconTrash /></button>
                                                </div>
                                            </div>
                                        </div>
                                        {isEditing && isAccepted && (
                                            <div className="bg-slate-50 border-t border-slate-200 p-3 flex flex-wrap gap-2 items-end shadow-inner-soft animate-fade-in-up">
                                                <div className="w-20"><label className="block text-[10px] text-slate-500 mb-1 font-bold">修改原價</label><input type="number" value={tempBasePrice} onChange={e => setTempBasePrice(e.target.value)} className="w-full px-2 py-1.5 text-xs font-bold border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <div className="w-20"><label className="block text-[10px] text-slate-500 mb-1 font-bold">扣減金額</label><input type="number" value={tempDeduction} onChange={e => setTempDeduction(e.target.value)} className="w-full px-2 py-1.5 text-xs font-bold border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <div className="flex-1 min-w-[140px]"><label className="block text-[10px] text-slate-500 mb-1 font-bold">扣減原因</label><input type="text" value={tempDeductReason} onChange={e => setTempDeductReason(e.target.value)} className="w-full px-2 py-1.5 text-xs font-bold border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <button type="button" onClick={() => handleSaveBookEdits(b.id)} className="px-4 py-2 bg-brand-600 text-white text-xs font-black rounded-xl shadow-sm hover:bg-brand-700 btn-spring">儲存</button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );

            const renderMissingList = () => (
                <div className="flex-1 overflow-y-auto p-4 bg-white/45">
                    {missingBooks.length === 0 ? (
                        <div className="text-center py-10 bg-emerald-50 border border-emerald-200 rounded-2xl shadow-sm animate-fade-in-up"><span className="text-5xl">🎉</span><p className="text-emerald-700 font-black mt-3 text-lg tracking-wide">核心單本已收齊！</p><p className="text-[10px] text-emerald-600 mt-1 font-bold opacity-80">（或已被套餐項目覆蓋）</p></div>

                    </div>
                    {allSubjectsForForm.length > 1 && (<div className="premium-tabbar flex gap-2 p-3 md:p-4 overflow-x-auto hide-scrollbar shrink-0 z-0 relative">{allSubjectsForForm.map(subj => (<button key={subj} type="button" onClick={() => setActiveSubject(subj)} className={`tap-target px-4 py-2 rounded-2xl text-xs md:text-sm font-bold whitespace-nowrap transition-all shadow-sm border ${activeSubject === subj ? 'tab-pill-active scale-105' : 'bg-white/70 text-slate-600 border-slate-200 hover:bg-white btn-spring'}`}>{subj === 'All' ? '全部顯示' : subj}</button>))}</div>)}
                    <div className="flex-1 overflow-y-auto p-4 md:p-5">
                        <div className="flex flex-wrap gap-2.5 content-start">
                            {displayCatalogItems.length === 0 ? <p className="text-xs text-slate-400 w-full text-center py-10 font-bold border-2 border-dashed border-slate-200 rounded-2xl">無相關書單設定</p> : displayCatalogItems.map(item => {

                                return (
                                    <button key={item.id} type="button" onClick={() => handleQuickAddBook(item)} className={`pos-btn hover-up relative px-3.5 py-4 rounded-2xl text-sm font-bold border-2 flex flex-col items-start gap-2 w-[calc(50%-5px)] sm:w-[calc(33.3%-7px)] lg:w-[calc(33.3%-7px)] 2xl:w-[calc(25%-8px)] text-left transition-all ${isAdded ? 'bg-slate-100 border-slate-200 opacity-60' : item.isPackage ? 'bg-gradient-to-br from-slate-950 to-slate-700 text-white border-slate-800 shadow-md' : 'bg-white/90 text-slate-800 border-white hover:border-brand-300 shadow-sm'}`}>

                    <header className={`premium-header px-4 py-3 lg:px-5 lg:py-4 mb-0 lg:mb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shrink-0 ${activeId ? 'hidden lg:flex' : 'flex'}`}>

                    {showAddStudentModal && (<div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 app-modal-backdrop"><div className="bg-white rounded-3xl w-[95%] max-w-sm p-6 shadow-floating animate-modal-pop"><div className="flex justify-between items-center mb-5"><h3 className="text-xl font-black text-slate-900">新增學生名單</h3><button type="button" onClick={() => setShowAddStudentModal(false)} className="tap-target text-slate-400 bg-slate-100 p-1.5 rounded-full hover:bg-slate-200 transition-colors"><IconX /></button></div><form onSubmit={handleCreateStudent} className="space-y-4"><div><label className="block text-sm font-bold text-slate-700 mb-1.5">班級 (Form)</label><select value={newStudent.form} onChange={e => setNewStudent({...newStudent, form: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-brand-100"><option value="1">Form 1</option><option value="2">Form 2</option><option value="3">Form 3</option><option value="4">Form 4</option><option value="5">Form 5</option><option value="6">Form 6</option></select></div><div><label className="block text-sm font-bold text-slate-700 mb-1.5">學生姓名</label><input type="text" required value={newStudent.name} onChange={e => setNewStudent({...newStudent, name: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-brand-100" /></div><div><label className="block text-sm font-bold text-slate-700 mb-1.5">聯絡電話 (選填)</label><input type="tel" value={newStudent.phone} onChange={e => setNewStudent({...newStudent, phone: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-brand-100" /></div><div className="mt-6 flex justify-end gap-3 pt-2"><button type="button" onClick={() => setShowAddStudentModal(false)} className="px-5 py-3 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-slate-50">取消</button><button type="submit" className="px-5 py-3 bg-brand-600 text-white rounded-2xl text-sm font-bold shadow-md hover:bg-brand-700 btn-spring">確認新增</button></div></form></div></div>)}

                    {showEditStudentModal && (<div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 app-modal-backdrop"><div className="bg-white rounded-3xl w-[95%] max-w-sm p-6 shadow-floating animate-modal-pop"><div className="flex justify-between items-center mb-5"><h3 className="text-xl font-black text-slate-900">修改學生資料</h3><button type="button" onClick={() => setShowEditStudentModal(false)} className="tap-target text-slate-400 bg-slate-100 p-1.5 rounded-full hover:bg-slate-200 transition-colors"><IconX /></button></div><form onSubmit={handleSaveStudentEdit} className="space-y-4"><div><label className="block text-sm font-bold text-slate-700 mb-1.5">班級 (Form)</label><select value={editStudentData.form} onChange={e => setEditStudentData({...editStudentData, form: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-brand-100"><option value="1">Form 1</option><option value="2">Form 2</option><option value="3">Form 3</option><option value="4">Form 4</option><option value="5">Form 5</option><option value="6">Form 6</option></select></div><div><label className="block text-sm font-bold text-slate-700 mb-1.5">學生姓名</label><input type="text" required value={editStudentData.name} onChange={e => setEditStudentData({...editStudentData, name: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-brand-100" /></div><div><label className="block text-sm font-bold text-slate-700 mb-1.5">聯絡電話</label><input type="tel" value={editStudentData.phone} onChange={e => setEditStudentData({...editStudentData, phone: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-brand-100" /></div><div className="mt-6 flex justify-end gap-3 pt-2"><button type="button" onClick={() => setShowEditStudentModal(false)} className="px-5 py-3 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-slate-50">取消</button><button type="submit" className="px-5 py-3 bg-brand-600 text-white rounded-2xl text-sm font-bold shadow-md hover:bg-brand-700 btn-spring">儲存修改</button></div></form></div></div>)}

                    {showCollectorStatsModal && (<div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-3 md:p-4 z-50 app-modal-backdrop"><div className="bg-white rounded-3xl w-[95%] max-w-3xl p-5 md:p-8 shadow-floating flex flex-col max-h-[90vh] animate-modal-pop"><div className="flex justify-between items-center mb-6"><h3 className="text-2xl font-black text-slate-900">經手人業績對數</h3><button type="button" onClick={() => setShowCollectorStatsModal(false)} className="tap-target bg-slate-100 p-2 rounded-full hover:bg-slate-200 transition-colors"><IconX /></button></div><div className="overflow-y-auto flex-1 space-y-5 pr-2">{Object.keys(collectorStats).length === 0 ? <p className="text-center py-16 text-sm font-bold text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl">無對數紀錄</p> : Object.entries(collectorStats).map(([cName, cData]) => (<div key={cName} className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm"><div className="bg-slate-50 px-5 py-4 flex justify-between items-center border-b border-slate-200"><span className="font-black text-xl text-slate-900 flex items-center gap-3"><span className="w-10 h-10 rounded-full bg-brand-100 text-brand-700 flex justify-center items-center text-lg shadow-inner-soft border border-brand-200">{cName.charAt(0).toUpperCase()}</span>{cName}</span><div className="text-sm font-bold text-slate-500">共 {cData.count} 項 &nbsp;|&nbsp; <span className="text-brand-600 text-2xl font-black ml-2">${cData.total}</span></div></div><div className="divide-y divide-slate-100 bg-white">{cData.items.map(item => (<div key={item.id} className="px-5 py-3 flex justify-between items-center text-xs md:text-sm hover:bg-slate-50 transition-colors"><div className="text-slate-700 font-bold"><span className="bg-slate-100 border border-slate-200 text-slate-500 px-2 py-0.5 rounded mr-3 text-[10px] shadow-inner-soft">F.{item.studentForm} {item.studentName}</span>{item.bookTitle}</div><div className="font-black text-slate-900">${item.price}</div></div>))}</div></div>))}</div></div></div>)}

                    {showExportModal && (<div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 app-modal-backdrop"><div className="bg-white rounded-3xl w-[95%] max-w-xl p-6 md:p-8 shadow-floating animate-modal-pop"><div className="flex justify-between items-center mb-5"><h3 className="text-xl font-black text-slate-900">匯出 CSV 數據</h3><button type="button" onClick={() => setShowExportModal(false)} className="tap-target bg-slate-100 p-2 rounded-full hover:bg-slate-200 transition-colors"><IconX /></button></div><p className="text-sm font-bold text-slate-500 mb-3">以下為 Excel 原始數據預覽：</p><textarea readOnly value={generateExportData().textContent} onClick={e => e.target.select()} className="w-full h-32 md:h-40 text-xs p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-6 focus:outline-none font-mono shadow-inner-soft" /><div className="flex justify-end gap-3"><button type="button" onClick={() => setShowExportModal(false)} className="px-5 py-2.5 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-slate-50">取消</button><button type="button" onClick={handleDownloadCSV} className="px-5 py-2.5 bg-slate-900 text-white rounded-2xl text-sm font-bold shadow-md flex items-center gap-2 active:scale-95 transition-transform"><IconDownload /> 下載 CSV 檔案</button></div></div></div>)}

                    {showReceiptModal && renderStudent && (<div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-3 md:p-4 z-50 no-print app-modal-backdrop"><div className="bg-white rounded-[24px] w-[95%] max-w-md shadow-floating overflow-hidden flex flex-col max-h-[90vh] animate-modal-pop"><div id="receipt-modal" className="p-6 md:p-8 bg-white text-slate-900 overflow-y-auto"><div className="text-center mb-5 md:mb-6 pb-5 border-b-2 border-dashed border-slate-200"><h2 className="text-xl md:text-2xl font-black mb-1.5 tracking-wide">二手書回收單據</h2><p className="text-[10px] md:text-xs font-bold text-slate-400">Po Kok Secondary School</p></div><div className="mb-5 md:mb-6 text-sm bg-slate-50 p-4 rounded-2xl border border-slate-100"><div className="flex justify-between mb-2"><span className="text-slate-500 font-bold">學生姓名:</span><span className="font-black text-base">{renderStudent.name} <span className="text-xs text-slate-400">(F.{renderStudent.form})</span></span></div><div className="flex justify-between"><span className="text-slate-500 font-bold">聯絡電話:</span><span className="font-bold">{renderStudent.phone || '--'}</span></div></div><div className="overflow-x-auto"><table className="w-full text-left text-xs md:text-sm min-w-[250px] mb-5 md:mb-6"><thead><tr className="border-b-2 border-slate-800"><th className="py-2.5 font-black text-slate-600">項目明細</th><th className="py-2.5 text-right font-black text-slate-600">金額</th></tr></thead><tbody className="divide-y divide-slate-100">{(renderStudent.books || []).map((b, i) => (<tr key={i}><td className="py-3.5 font-bold leading-tight">{b.title}{b.status==='accepted'&&b.deduction>0&&<div className="text-[10px] text-slate-400 mt-1 font-medium bg-slate-50 inline-block px-1.5 py-0.5 rounded border border-slate-100">- {b.deductionReason} (扣${b.deduction})</div>}</td><td className="py-3.5 text-right font-black">{b.status==='accepted'?`$${getActualPrice(b)}`:'$0'}</td></tr>))}</tbody></table></div><div className="flex justify-between items-center pt-4 border-t-2 border-slate-800"><span className="text-sm font-black uppercase tracking-widest text-slate-500">實付總額</span><span className="text-3xl md:text-4xl font-black text-slate-900">${activeStats.total}</span></div><div className="mt-8 text-center"><p className="text-[10px] font-bold text-slate-400">請妥善保存此單據以作核對之用。謝謝！</p></div></div><div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3 shrink-0"><button type="button" onClick={() => setShowReceiptModal(false)} className="px-5 py-2.5 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-slate-100">關閉預覽</button><button type="button" onClick={() => window.print()} className="px-6 py-2.5 bg-slate-900 text-white rounded-2xl text-sm font-bold flex items-center gap-2 shadow-md hover:bg-slate-800 active:scale-95 transition-all"><IconPrinter />正式列印</button></div></div></div>)}

                    <AppConfirmDialog dialog={confirmDialog} onClose={closeConfirm} />
                    <AppPromptDialog dialog={promptDialog} onClose={closePrompt} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
