            const activeStudent = useMemo(() => students.find(s => s.docId === activeId) || null, [students, activeId]);

            const stats = useMemo(() => {
                let totalAccepted = 0, totalAmount = 0, totalRejected = 0;
                students.forEach(s => { (s.books || []).forEach(b => { if (b.status === 'accepted') { totalAccepted++; totalAmount += getActualPrice(b); } else { totalRejected++; } }); });
                return { totalAccepted, totalAmount, totalRejected };
            }, [students, getActualPrice]);

            const activeStats = useMemo(() => {
                if (!activeStudent) return { total: 0, acceptedBooks: 0, acceptedPackages: 0 };
                return (activeStudent.books || []).reduce((acc, b) => {
                    if (b.status === 'accepted') {
                        acc.total += getActualPrice(b);
                        const isPkg = normalizedCatalog.some(c => formatBookTitle(c) === b.title && c.isPackage);
                        if (isPkg) acc.acceptedPackages++; else acc.acceptedBooks++;
                    }
                    return acc;
                }, { total: 0, acceptedBooks: 0, acceptedPackages: 0 });

                if (!activeStudent || !['1','2','3'].includes(activeStudent.form)) return [];

                    const title = formatBookTitle(c);
                    const isBoughtSingle = acceptedTitles.includes(title);
                    const isSubjectCoveredByPackage = acceptedPackageSubjects.includes(c.subject);

            }, [activeStudent, normalizedCatalog]);

                const statsMap = {};
                students.forEach(student => {
                    (student.books || []).forEach(book => {
                        if (book.status === 'accepted') {
                            const cName = book.collectedBy || '未指派';

                            statsMap[cName].total += getActualPrice(book);
                            statsMap[cName].items.push({ studentName: student.name, studentForm: student.form, bookTitle: book.title, price: getActualPrice(book), id: book.id });

                    });
                });
                return statsMap;
            }, [students, getActualPrice]);

            const uniqueCollectors = useMemo(() => Array.from(new Set(students.flatMap(s => (s.books||[]).filter(b => b.status==='accepted' && b.collectedBy).map(b => b.collectedBy)))).sort(), [students]);

            const processedStudents = useMemo(() => {
                let filtered = students.filter(s => s.name.includes(search) || (s.phone && s.phone.includes(search)) || `f.${s.form}`.toLowerCase().includes(search.toLowerCase()));
                if (filterCollector !== "all") filtered = filtered.filter(s => (s.books || []).some(b => b.status === 'accepted' && b.collectedBy === filterCollector));
                return filtered.sort((a, b) => {
                    if (sortBy === 'name') return a.name.localeCompare(b.name, 'zh-HK');
                    if (sortBy === 'amount') {
                        const amtA = (a.books || []).reduce((sum, bk) => bk.status === 'accepted' ? sum + getActualPrice(bk) : sum, 0);
                        const amtB = (b.books || []).reduce((sum, bk) => bk.status === 'accepted' ? sum + getActualPrice(bk) : sum, 0);
                        return amtB - amtA;
                    }
                    if (a.form !== b.form) return a.form - b.form;
                    return (a.order || 0) - (b.order || 0);
                });
            }, [students, search, sortBy, filterCollector, getActualPrice]);

            const currentFormCatalogItems = useMemo(() => normalizedCatalog.filter(c => c.form === activeCatalogForm), [normalizedCatalog, activeCatalogForm]);
            const allSubjectsForForm = useMemo(() => ['All', ...Array.from(new Set(currentFormCatalogItems.map(c => c.subject)))], [currentFormCatalogItems]);
            const displayCatalogItems = useMemo(() => activeSubject === 'All' ? currentFormCatalogItems : currentFormCatalogItems.filter(c => c.subject === activeSubject), [currentFormCatalogItems, activeSubject]);
            const filteredSettingsCatalog = useMemo(() => normalizedCatalog.filter(c => settingsFilterForm === 'all' || c.form === settingsFilterForm), [normalizedCatalog, settingsFilterForm]);

            // 💡 3. Effects
            useEffect(() => { setSafeCollectorName(collectorName); }, [collectorName]);

            useEffect(() => {
                auth.signInAnonymously().catch(err => { console.error("Auth Error:", err); showToast("驗證失敗", "error"); });
                const unsub = auth.onAuthStateChanged(usr => { setUser(usr); setDbConnected(!!usr); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubStudents = getStudentsRef().onSnapshot(snapshot => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setStudents(list);
                    if (list.length > 0 && !activeId && window.innerWidth >= 1024) setActiveId(list[0].docId);
                    setLoading(false);
                }, err => { console.error("Fetch Error:", err); showToast("載入名單失敗", "error"); setLoading(false); });
                
                const unsubCatalog = getCatalogRef().onSnapshot(docSnap => {
                    if (docSnap.exists && docSnap.data().items && docSnap.data().items.length > 0) {
                        setCatalog(docSnap.data().items);
                    } else {
                        let defaultCat = [];
                        ['1', '2', '3'].forEach(f => {
                            BOOK_TEMPLATES.forEach(subj => {
                                subj.items.forEach((item, idx) => {
                                    defaultCat.push({ id: `def_f${f}_${subj.s}_${idx}`, form: f, subject: subj.s, name: item.name, price: f === '3' ? item.f3Price : 0, isPackage: item.pkg });
                                });
                            });
                        });
                        setCatalog(defaultCat);
                        getCatalogRef().set({ items: defaultCat });
                    }
                });
                return () => { unsubStudents(); unsubCatalog(); };
            }, [user, activeId]);

            const handleFormTabClick = (formId) => {
                setActiveCatalogForm(formId);
                setActiveSubject("All");
            };

            useEffect(() => {
                if (activeStudent && ['1','2','3'].includes(activeStudent.form)) {
                    setActiveCatalogForm(activeStudent.form);
                } else if (activeStudent) {
                    setActiveCatalogForm("all");
                }
                setActiveSubject("All");
                setActiveMobileTab("menu"); 
            }, [activeStudent?.docId]);

            // 💡 4. API Handlers
            const handleCreateStudent = async (e) => {
                e.preventDefault();
                if (!newStudent.name.trim()) return;
                const newDocId = `student_${Date.now()}`;
                await getStudentsRef().doc(newDocId).set({ name: newStudent.name.trim(), form: newStudent.form, phone: newStudent.phone.trim() || "--", order: Date.now(), books: [] });
                setActiveId(newDocId); setShowAddStudentModal(false); setNewStudent({ form: "3", name: "", phone: "" }); showToast(`已新增學生: ${newStudent.name}`);
            };

            const openEditStudent = () => { setEditStudentData({ name: activeStudent.name, form: activeStudent.form, phone: activeStudent.phone === "--" ? "" : activeStudent.phone }); setShowEditStudentModal(true); };
            const handleSaveStudentEdit = async (e) => {
                e.preventDefault();
                if (!editStudentData.name.trim()) return;
                try { await getStudentsRef().doc(activeStudent.docId).update({ name: editStudentData.name.trim(), form: editStudentData.form, phone: editStudentData.phone.trim() || "--" }); setShowEditStudentModal(false); showToast("資料已更新"); } 
                catch(e) { showToast("更新失敗", "error"); }
            };
            const handleDeleteStudent = async () => {
                if (window.confirm(`⚠️ 確定要刪除學生「${activeStudent.name}」？\n此操作無法復原！`)) {
                    try { await getStudentsRef().doc(activeStudent.docId).delete(); setActiveId(null); showToast("已刪除"); } catch(e) { showToast("刪除失敗", "error"); }
                }
            };

            const handleResetDefaultCatalog = async () => {
                if (!window.confirm("⚠️ 確定要載入預設的全科書單？這將清除目前所有自訂設定！")) return;
                let defaultCat = [];
                ['1', '2', '3'].forEach(f => {
                    BOOK_TEMPLATES.forEach(subj => {
                        subj.items.forEach((item, idx) => {
                            defaultCat.push({ id: `def_f${f}_${subj.s}_${idx}_${Date.now()}`, form: f, subject: subj.s, name: item.name, price: f === '3' ? item.f3Price : 0, isPackage: item.pkg });
                        });
                    });
                });
                await getCatalogRef().set({ items: defaultCat }); showToast("✅ 已載入預設全科書單！");
            };

            const saveCatalogToDB = async (newCatalog) => { await getCatalogRef().set({ items: newCatalog }, { merge: true }); showToast("設定已同步"); };
            const handleCatalogSubmit = (e) => {
                e.preventDefault();
                if (!newCatalogItem.name.trim()) return;
                if (editingCatalogId) {
                    saveCatalogToDB(normalizedCatalog.map(c => c.id === editingCatalogId ? { ...c, form: newCatalogItem.form, subject: newCatalogItem.subject, name: newCatalogItem.name.trim(), price: Number(newCatalogItem.price) || 0, isPackage: newCatalogItem.isPackage } : c));
                    setEditingCatalogId(null);
                } else {
                    saveCatalogToDB([...normalizedCatalog, { id: `cat_${Date.now()}`, form: newCatalogItem.form, subject: newCatalogItem.subject, name: newCatalogItem.name.trim(), price: Number(newCatalogItem.price) || 0, isPackage: newCatalogItem.isPackage }]);
                }
                setNewCatalogItem({ form: settingsFilterForm === 'all' ? '1' : settingsFilterForm, subject: "中文", name: "", price: "0", isPackage: false });
            };
            const handleEditCatalogClick = (item) => { setNewCatalogItem({ form: item.form, subject: item.subject, name: item.name, price: item.price.toString(), isPackage: item.isPackage || false }); setEditingCatalogId(item.id); };
            const handleCancelCatalogEdit = () => { setEditingCatalogId(null); setNewCatalogItem({ form: settingsFilterForm === 'all' ? '1' : settingsFilterForm, subject: "中文", name: "", price: "0", isPackage: false }); };
            const handleDeleteCatalogItem = (id) => { saveCatalogToDB(normalizedCatalog.filter(c => c.id !== id)); };

            const initiateAddBook = (title, priceStr) => {
                if (!activeStudent || !title.trim()) return;
                if (!collectorName.trim()) { showToast("請先輸入經手人名稱", "error"); document.getElementById('collector-input').focus(); return; }
                const numPrice = Number(priceStr) || 0;
                const isDuplicate = (activeStudent.books || []).some(b => b.title === title && b.status === 'accepted');
                
                if (isDuplicate) { setPendingAddBook({ title, price: numPrice, step: 'duplicate' }); return; }
                if (numPrice === 0) { setPendingAddBook({ title, price: 0, step: 'zero' }); return; }
                executeAddBook(title, numPrice);
            };

            const confirmPendingAddBook = () => {
                if (!pendingAddBook) return;
                if (pendingAddBook.step === 'duplicate' && pendingAddBook.price === 0) {
                    setPendingAddBook({ ...pendingAddBook, step: 'zero' });
                    return;
                }
                executeAddBook(pendingAddBook.title, pendingAddBook.price);
            };

            const executeAddBook = async (title, numPrice) => {
                setPendingAddBook(null);
                const newBook = { id: `${Date.now()}_${Math.random().toString(36).substr(2, 5)}`, title: title, basePrice: numPrice, deduction: 0, deductionReason: "", status: 'accepted', collectedBy: collectorName.trim(), createdAt: new Date().toISOString() };
                try { 
                    await getStudentsRef().doc(activeStudent.docId).update({ books: [...(activeStudent.books || []), newBook] }); 
                    setCustomBookName(""); setCustomBookPrice(""); 
                } catch (err) { showToast("寫入失敗", "error"); }
            };

            const handleQuickAddBook = (item) => initiateAddBook(formatBookTitle(item), item.price);
            const handleKeyDown = (e) => { if (e.key === 'Enter') initiateAddBook(customBookName, customBookPrice || "0"); };

            const handleToggleBookStatus = async (bookId) => {
                if (!activeStudent) return;
                const updatedBooks = activeStudent.books.map(b => b.id === bookId ? { ...b, status: b.status === 'accepted' ? 'rejected' : 'accepted', rejectReason: b.status === 'accepted' ? '退回' : '' } : b);
                await getStudentsRef().doc(activeStudent.docId).update({ books: updatedBooks });
            };

            const handleDeleteBook = async (bookId) => { if (!activeStudent) return; await getStudentsRef().doc(activeStudent.docId).update({ books: activeStudent.books.filter(b => b.id !== bookId) }); };
            
            const handleSaveBookEdits = async (bookId) => {
                if (!activeStudent) return;
                const updatedBooks = activeStudent.books.map(b => { if (b.id === bookId) return { ...b, basePrice: Number(tempBasePrice) || 0, deduction: Number(tempDeduction) || 0, deductionReason: tempDeductReason.trim() }; return b; });
                await getStudentsRef().doc(activeStudent.docId).update({ books: updatedBooks }); setEditingBookId(null);
            };

            const generateExportData = () => {
                const sortedForExcel = [...students].sort((a, b) => (a.order || 0) - (b.order || 0));
                let textContent = ""; let csvContent = "\uFEFF班級,姓名,電話號碼,總金額,已收書籍明細,退回書籍\n";
                sortedForExcel.forEach(s => {
                    const books = s.books || [];
                    if (books.length === 0) { textContent += "\t\n"; csvContent += `${s.form},${s.name},${s.phone},0,,\n`; } 
                    else {
                        const acceptedBooks = books.filter(b => b.status === 'accepted');
                        const rejectedBooks = books.filter(b => b.status === 'rejected');
                        const allDetails = books.map(b => {
                            if (b.status === 'accepted') {
                                const deductText = b.deduction > 0 ? `(扣$${b.deduction}:${b.deductionReason})` : '';
                                const collectorText = b.collectedBy ? `[經手:${b.collectedBy}]` : '';
                                return `[收] ${b.title}${deductText}${collectorText}`;
                            } else return `[退] ${b.title}`;
                        }).join(', ');
                        const total = acceptedBooks.reduce((sum, b) => sum + getActualPrice(b), 0);
                        textContent += `${allDetails}\t${total}\n`;
                        const acceptedStr = acceptedBooks.map(b => {
                            const deductText = b.deduction > 0 ? ` [扣$${b.deduction}: ${b.deductionReason}]` : '';
                            const collectorText = b.collectedBy ? ` [經手: ${b.collectedBy}]` : '';
                            return `${b.title}($${getActualPrice(b)})${deductText}${collectorText}`;
                        }).join('; ');
                        const rejectedStr = rejectedBooks.map(b => b.title).join('; ');
                        csvContent += `${s.form},${s.name},${s.phone},${total},"${acceptedStr}","${rejectedStr}"\n`;
                    }
                });
                return { textContent, csvContent };
            };

            const handleDownloadCSV = () => {
                const { csvContent } = generateExportData();
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `BookRecycling_Export_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            // ===== 💡 5. UI Render Helpers =====
            
            const renderCartList = () => (
                <div className="flex-1 overflow-y-auto p-4 bg-slate-50/30">
                    {(!activeStudent.books || activeStudent.books.length === 0) ? (
                        <div className="text-center py-16 border-2 border-dashed border-slate-200 rounded-2xl bg-white"><p className="text-sm font-bold text-slate-400">目前尚未登記任何項目</p></div>
                    ) : (
                        <div className="space-y-3">
                            {(activeStudent.books || []).map(b => {
                                const isAccepted = b.status === 'accepted';
                                const basePrice = Number(b.basePrice !== undefined ? b.basePrice : b.price || 0);
                                const deduction = Number(b.deduction || 0);
                                const actualPrice = Math.max(0, basePrice - deduction);
                                const isEditing = editingBookId === b.id;

                                return (
                                    <div key={b.id} className={`border rounded-2xl overflow-hidden transition-all ${isAccepted ? 'border-slate-200 bg-white shadow-sm' : 'border-red-200 bg-red-50/80 opacity-80'}`}>
                                        <div className="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                            <div className="flex items-start gap-3 w-full sm:w-auto">
                                                <div className={`mt-0.5 ${isAccepted ? 'text-green-500' : 'text-red-500'}`}>{isAccepted ? <IconCheck /> : <IconX />}</div>
                                                <div className="flex-1">
                                                    <p className={`text-sm md:text-[15px] font-bold leading-snug ${!isAccepted && 'line-through text-slate-400'}`}>{b.title}</p>
                                                    <div className="flex flex-wrap items-center gap-1.5 mt-2 text-[10px] md:text-xs">
                                                        <span className="text-slate-500 font-medium bg-slate-100 px-2 py-0.5 rounded-md border border-slate-200/60">原價: ${basePrice}</span>
                                                        {deduction > 0 && isAccepted && <span className="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-md font-bold border border-amber-200">- ${deduction} ({b.deductionReason})</span>}
                                                        {b.collectedBy && isAccepted && <span className="text-slate-500 font-bold bg-slate-100 px-2 py-0.5 rounded-md border border-slate-200/60">👤 {b.collectedBy}</span>}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-end gap-2 w-full sm:w-auto pt-3 sm:pt-0 border-t sm:border-0 border-slate-100 mt-2 sm:mt-0">
                                                {isAccepted && <div className="text-xl font-black text-slate-900 mr-2">${actualPrice}</div>}
                                                {isAccepted && <button onClick={() => { if(isEditing){ setEditingBookId(null); } else { setEditingBookId(b.id); setTempBasePrice(basePrice); setTempDeduction(b.deduction || ""); setTempDeductReason(b.deductionReason || ""); } }} className="p-2 text-slate-500 bg-slate-100 rounded-xl hover:bg-brand-50 hover:text-brand-600 transition-colors btn-spring"><IconEdit /></button>}
                                                <button onClick={() => handleToggleBookStatus(b.id)} className="px-3 py-2 text-xs font-bold text-slate-600 bg-slate-100 rounded-xl border border-slate-200 transition-colors hover:bg-slate-200 btn-spring">{isAccepted ? "退回" : "恢復"}</button>
                                                <button onClick={() => handleDeleteBook(b.id)} className="p-2 text-slate-500 bg-slate-100 rounded-xl hover:bg-red-50 text-red-500 transition-colors btn-spring"><IconTrash /></button>
                                            </div>
                                        </div>
                                        {isEditing && isAccepted && (
                                            <div className="bg-slate-50 border-t border-slate-200 p-3.5 flex flex-wrap gap-2.5 items-end shadow-inner-soft">
                                                <div className="w-20"><label className="block text-xs text-slate-500 mb-1 font-bold">修改原價</label><input type="number" value={tempBasePrice} onChange={e => setTempBasePrice(e.target.value)} className="w-full px-2.5 py-2 text-sm font-bold border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <div className="w-20"><label className="block text-xs text-slate-500 mb-1 font-bold">扣減金額</label><input type="number" value={tempDeduction} onChange={e => setTempDeduction(e.target.value)} className="w-full px-2.5 py-2 text-sm font-bold border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <div className="flex-1 min-w-[120px]"><label className="block text-xs text-slate-500 mb-1 font-bold">扣減原因 (例: 缺頁)</label><input type="text" value={tempDeductReason} onChange={e => setTempDeductReason(e.target.value)} className="w-full px-2.5 py-2 text-sm font-bold border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <button onClick={() => handleSaveBookEdits(b.id)} className="px-5 py-2 bg-brand-600 text-white text-sm font-bold rounded-lg shadow-sm hover:bg-brand-700 h-[38px] btn-spring">儲存</button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );

            const renderMissingList = () => (
                <div className="flex-1 overflow-y-auto p-4 bg-slate-50/30">
                    {missingBooks.length === 0 ? (
                        <div className="text-center py-16 bg-emerald-50 border border-emerald-200 rounded-2xl shadow-sm">
                            <span className="text-6xl">🎉</span>
                            <p className="text-emerald-700 font-black mt-4 text-xl tracking-wide">核心單本已全部收齊！</p>
                            <p className="text-xs text-emerald-600 mt-2 font-bold opacity-80">（或已被套餐項目完全覆蓋）</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            <p className="text-xs font-bold text-slate-400 mb-4 uppercase tracking-wider pl-1">應收但未交書籍：</p>
                            {missingBooks.map(c => (
                                <div key={c.id} className="flex justify-between items-center bg-white p-3.5 border border-dashed border-slate-300 rounded-2xl shadow-sm hover:border-brand-300 transition-colors">
                                    <div className="flex items-center gap-3">
                                        <span className="w-2 h-2 rounded-full bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.8)]"></span>
                                        <span className="text-sm font-bold text-slate-600">{formatBookTitle(c)}</span>
                                    </div>
                                    <button onClick={() => handleQuickAddBook(c)} className="px-4 py-2 bg-slate-50 hover:bg-brand-50 text-slate-600 hover:text-brand-600 text-xs font-bold rounded-xl border border-slate-200 transition-colors shadow-sm btn-spring">
                                        + 補交
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const renderPOSMenu = () => (
                <div className="flex-1 flex flex-col h-full overflow-hidden bg-slate-50/50 pb-20 md:pb-0 relative">
                    <div className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 md:px-6 pt-4 flex gap-5 overflow-x-auto hide-scrollbar shrink-0 shadow-sm z-10 relative">
                        {['1','2','3','all'].map(f => (
                            <button key={f} onClick={() => handleFormTabClick(f)} className={`text-sm md:text-base font-black whitespace-nowrap pb-3 border-b-4 transition-colors ${activeCatalogForm === f ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-400 hover:text-slate-700'}`}>
                                {f === 'all' ? '通用/其他' : `中${f === '1' ? '一' : f === '2' ? '二' : '三'} (F.${f})`}
                            </button>
                        ))}
                    </div>
                    {allSubjectsForForm.length > 1 && (
                        <div className="flex gap-2.5 p-3 md:p-4 overflow-x-auto hide-scrollbar shrink-0 bg-white/90 backdrop-blur-md border-b border-slate-100 shadow-sm z-0 relative">
                            {allSubjectsForForm.map(subj => (
                                <button key={subj} onClick={() => setActiveSubject(subj)} className={`px-5 py-2 rounded-full text-xs md:text-sm font-bold whitespace-nowrap transition-all shadow-sm border ${activeSubject === subj ? 'bg-slate-900 text-white border-slate-900 scale-105' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100 btn-spring'}`}>
                                    {subj === 'All' ? '全部顯示' : subj}
                                </button>
                            ))}
                        </div>
                    )}
                    <div className="flex-1 overflow-y-auto p-4 md:p-6">
                        <div className="flex flex-wrap gap-3 content-start">
                            {displayCatalogItems.length === 0 ? <p className="text-sm text-slate-400 w-full text-center py-16 font-bold border-2 border-dashed border-slate-200 rounded-2xl bg-white/50">無相關書單設定</p> : displayCatalogItems.map(item => {
                                const title = formatBookTitle(item);
                                const isAdded = (activeStudent.books || []).some(b => b.title === title && b.status === 'accepted');
                                return (
                                    <button 
                                        key={item.id} onClick={() => handleQuickAddBook(item)}
                                        className={`pos-btn relative px-4 py-5 rounded-2xl text-sm font-bold border-2 flex flex-col items-start gap-2.5 w-[calc(50%-6px)] sm:w-[calc(33.3%-8px)] lg:w-[calc(50%-6px)] xl:w-[calc(33.3%-8px)] text-left transition-all ${
                                            isAdded ? 'bg-slate-100 border-slate-200 opacity-50 shadow-inner' : 
                                            item.isPackage ? 'bg-slate-900 text-white border-slate-900 shadow-floating hover:shadow-[0_15px_30px_rgba(0,0,0,0.15)]' : 'bg-white text-slate-800 border-slate-200 hover:border-brand-400 shadow-sm hover:shadow-md'
                                        }`}
                                    >
                                        <span className="w-full truncate leading-relaxed text-[15px]">{item.name}</span>
                                        <div className="flex justify-between items-center w-full mt-auto pt-2">
                                            <span className={`text-[11px] px-2 py-1 rounded-lg font-black tracking-wide ${item.isPackage ? 'bg-slate-700 text-slate-100' : 'bg-slate-100 text-slate-600 border border-slate-200/60'}`}>${item.price}</span>
                                            {item.price === 0 && !isAdded && <span className="text-red-500 bg-red-50 p-1 rounded-full"><IconWarning /></span>}
                                            {isAdded && <span className="text-green-500 bg-green-100 rounded-full p-1"><IconCheck /></span>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    <div className="p-4 md:p-5 bg-white/90 backdrop-blur-xl border-t border-slate-200 shrink-0 shadow-[0_-10px_30px_rgba(0,0,0,0.03)] relative z-10 md:pb-5">
                        <div className="flex gap-3 items-end max-w-3xl mx-auto">
                            <div className="flex-1"><label className="block text-[11px] text-slate-500 mb-1.5 font-bold pl-1">手動輸入書名</label><input type="text" value={customBookName} onChange={e => setCustomBookName(e.target.value)} onKeyDown={handleKeyDown} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold shadow-inner-soft" placeholder="例如: 其他筆記本..."/></div>
                            <div className="w-24"><label className="block text-[11px] text-slate-500 mb-1.5 font-bold pl-1">單價 ($)</label><input type="number" value={customBookPrice} onChange={e => setCustomBookPrice(e.target.value)} onKeyDown={handleKeyDown} className="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-black shadow-inner-soft text-brand-700"/></div>
                            <button onClick={() => initiateAddBook(customBookName, customBookPrice || "0")} className="px-6 py-3 bg-brand-600 text-white rounded-xl text-sm font-black shadow-md hover:bg-brand-700 btn-spring h-[46px] mb-px">加入</button>
                        </div>
                    </div>
                </div>
            );

            // ===== 6. Main Return (包含全平台懸浮佈局) =====
            return (
                <div className="mx-auto w-full max-w-[1800px] h-full flex flex-col font-sans relative">
                    
                    {toast.show && (
                        <div className={`fixed top-6 right-6 z-[80] px-6 py-3.5 rounded-2xl shadow-floating flex items-center gap-3 text-sm font-black text-white transition-opacity duration-300 animate-fade-in-up ${toast.type === 'error' ? 'bg-red-600' : 'bg-slate-900'}`}>
                            {toast.message}
                        </div>
                    )}

                    {/* 💡 頂部 Header (全平台通用，iPad/Desktop 會浮起) */}
                    <header className={`bg-transparent px-4 sm:px-0 pt-4 pb-2 md:pb-4 shrink-0 flex-col sm:flex-row justify-between items-start sm:items-center gap-4 ${activeId ? 'hidden lg:flex' : 'flex'}`}>
