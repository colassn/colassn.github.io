        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("React Component Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-full p-8 text-center bg-slate-50 overflow-y-auto">

            }, []);

            // 💡 2. 衍生存取資料 (使用 displayStudent 確保動畫流暢)
            const activeStudent = useMemo(() => students.find(s => s.docId === activeId) || null, [students, activeId]);

                if (activeStudent) setDisplayStudent(activeStudent);
            }, [activeStudent]);

            const processedStudents = useMemo(() => {
                let filtered = students.filter(s => s.name.includes(search) || (s.phone && s.phone.includes(search)) || `f.${s.form}`.toLowerCase().includes(search.toLowerCase()));
                if (filterCollector !== "all") filtered = filtered.filter(s => (s.books || []).some(b => b.status === 'accepted' && b.collectedBy === filterCollector));
                return filtered.sort((a, b) => {
                    if (sortBy === 'name') return a.name.localeCompare(b.name, 'zh-HK');
                    if (sortBy === 'amount') {
                        const amtA = (a.books || []).reduce((sum, bk) => bk.status === 'accepted' ? sum + getActualPrice(bk) : sum, 0);
                        const amtB = (b.books || []).reduce((sum, bk) => bk.status === 'accepted' ? sum + getActualPrice(bk) : sum, 0);
                        return amtB - amtA;
                    }
                    if (a.form !== b.form) return a.form - b.form;
                    return (a.order || 0) - (b.order || 0);
                });
            }, [students, search, sortBy, filterCollector, getActualPrice]);

            const currentFormCatalogItems = useMemo(() => normalizedCatalog.filter(c => c.form === activeCatalogForm), [normalizedCatalog, activeCatalogForm]);
            const allSubjectsForForm = useMemo(() => ['All', ...Array.from(new Set(currentFormCatalogItems.map(c => c.subject)))], [currentFormCatalogItems]);
            const displayCatalogItems = useMemo(() => activeSubject === 'All' ? currentFormCatalogItems : currentFormCatalogItems.filter(c => c.subject === activeSubject), [currentFormCatalogItems, activeSubject]);
            const filteredSettingsCatalog = useMemo(() => normalizedCatalog.filter(c => settingsFilterForm === 'all' || c.form === settingsFilterForm), [normalizedCatalog, settingsFilterForm]);

            // 💡 3. Effects
            useEffect(() => { setSafeCollectorName(collectorName); }, [collectorName]);

            useEffect(() => {
                auth.signInAnonymously().catch(err => { console.error("Auth Error:", err); showToast("驗證失敗", "error"); });
                const unsub = auth.onAuthStateChanged(usr => { setUser(usr); setDbConnected(!!usr); });
                return () => unsub();
            }, [showToast]);

            useEffect(() => {
                if (!user) return;
                const unsubStudents = getStudentsRef().onSnapshot(snapshot => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setStudents(list);
                    if (list.length > 0 && !activeId && window.innerWidth >= 1024) setActiveId(list[0].docId);
                    setLoading(false);
                }, err => { console.error("Fetch Students Error:", err); showToast("載入名單失敗", "error"); setLoading(false); });
                
                const unsubCatalog = getCatalogRef().onSnapshot(docSnap => {
                    if (docSnap.exists && docSnap.data().items && docSnap.data().items.length > 0) {
                        setCatalog(docSnap.data().items);
                    } else {
                        let defaultCat = [];
                        ['1', '2', '3'].forEach(f => {
                            BOOK_TEMPLATES.forEach(subj => {
                                subj.items.forEach((item, idx) => {
                                    defaultCat.push({ id: `def_f${f}_${subj.s}_${idx}`, form: f, subject: subj.s, name: item.name, price: f === '3' ? item.f3Price : 0, isPackage: item.pkg });
                                });
                            });
                        });
                        setCatalog(defaultCat);
                        getCatalogRef().set({ items: defaultCat });
                    }
                });
                return () => { unsubStudents(); unsubCatalog(); };
            }, [user, activeId, showToast]);

            useEffect(() => {
                if (activeStudent && ['1','2','3'].includes(activeStudent.form)) {
                    setActiveCatalogForm(activeStudent.form);
                } else if (activeStudent) {
                    setActiveCatalogForm("all");
                }
                setActiveSubject("All");
                setActiveMobileTab("menu"); 
            }, [activeStudent?.docId]);

            // 💡 4. Event Handlers
            function handleFormTabClick(formId) {
                setActiveCatalogForm(formId);
                setActiveSubject("All");
            }

            async function handleCreateStudent(e) {
                e.preventDefault();
                if (!newStudent.name.trim()) return;
                const newDocId = `student_${Date.now()}`;
                try {
                    await getStudentsRef().doc(newDocId).set({ name: newStudent.name.trim(), form: newStudent.form, phone: newStudent.phone.trim() || "--", order: Date.now(), books: [] });
                    setActiveId(newDocId); setShowAddStudentModal(false); setNewStudent({ form: "3", name: "", phone: "" }); showToast(`已新增學生: ${newStudent.name}`);
                } catch(err) { showToast("新增失敗", "error"); }
            }

            function openEditStudent() { 
                setEditStudentData({ name: renderStudent.name, form: renderStudent.form, phone: renderStudent.phone === "--" ? "" : renderStudent.phone }); 
                setShowEditStudentModal(true); 
            }
            
            async function handleSaveStudentEdit(e) {
                e.preventDefault();
                if (!editStudentData.name.trim() || !activeStudent) return;
                try { 
                    await getStudentsRef().doc(activeStudent.docId).update({ name: editStudentData.name.trim(), form: editStudentData.form, phone: editStudentData.phone.trim() || "--" }); 
                    setShowEditStudentModal(false); showToast("資料已更新"); 
                } catch(err) { showToast("更新失敗", "error"); }
            }

            async function handleDeleteStudent() {
                if (!activeStudent) return;
                if (window.confirm(`⚠️ 確定要刪除學生「${activeStudent.name}」？\n此操作無法復原！`)) {
                    try { await getStudentsRef().doc(activeStudent.docId).delete(); setActiveId(null); showToast("已刪除"); } catch(err) { showToast("刪除失敗", "error"); }
                }
            }

            async function handleResetDefaultCatalog() {
                if (!window.confirm("⚠️ 確定要載入預設的全科書單？這將清除目前所有自訂設定！")) return;
                let defaultCat = [];
                ['1', '2', '3'].forEach(f => {
                    BOOK_TEMPLATES.forEach(subj => {
                        subj.items.forEach((item, idx) => {
                            defaultCat.push({ id: `def_f${f}_${subj.s}_${idx}_${Date.now()}`, form: f, subject: subj.s, name: item.name, price: f === '3' ? item.f3Price : 0, isPackage: item.pkg });
                        });
                    });
                });
                try { await getCatalogRef().set({ items: defaultCat }); showToast("✅ 已載入預設全科書單！"); } catch(err) { showToast("重置失敗", "error"); }
            }

            async function saveCatalogToDB(newCatalog) { 
                try { await getCatalogRef().set({ items: newCatalog }, { merge: true }); showToast("設定已同步"); } catch(err) { showToast("同步失敗", "error"); }
            }
            
            function handleCatalogSubmit(e) {
                e.preventDefault();
                if (!newCatalogItem.name.trim()) return;
                if (editingCatalogId) {
                    saveCatalogToDB(normalizedCatalog.map(c => c.id === editingCatalogId ? { ...c, form: newCatalogItem.form, subject: newCatalogItem.subject, name: newCatalogItem.name.trim(), price: Number(newCatalogItem.price) || 0, isPackage: newCatalogItem.isPackage } : c));
                    setEditingCatalogId(null);
                } else {
                    saveCatalogToDB([...normalizedCatalog, { id: `cat_${Date.now()}`, form: newCatalogItem.form, subject: newCatalogItem.subject, name: newCatalogItem.name.trim(), price: Number(newCatalogItem.price) || 0, isPackage: newCatalogItem.isPackage }]);
                }
                setNewCatalogItem({ form: settingsFilterForm === 'all' ? '1' : settingsFilterForm, subject: "中文", name: "", price: "0", isPackage: false });
            }

            function handleEditCatalogClick(item) { setNewCatalogItem({ form: item.form, subject: item.subject, name: item.name, price: item.price.toString(), isPackage: item.isPackage || false }); setEditingCatalogId(item.id); }
            function handleCancelCatalogEdit() { setEditingCatalogId(null); setNewCatalogItem({ form: settingsFilterForm === 'all' ? '1' : settingsFilterForm, subject: "中文", name: "", price: "0", isPackage: false }); }
            function handleDeleteCatalogItem(id) { saveCatalogToDB(normalizedCatalog.filter(c => c.id !== id)); }

            function initiateAddBook(title, priceStr) {
                if (!activeStudent || !title.trim()) return;
                if (!collectorName.trim()) { showToast("⚠️ 請先輸入經手人代號", "error"); return; }
                
                const numPrice = Number(priceStr) || 0;
                const isDuplicate = (activeStudent.books || []).some(b => b.title === title && b.status === 'accepted');
                
                if (isDuplicate) { setPendingAddBook({ title, price: numPrice, step: 'duplicate' }); return; }
                if (numPrice === 0) { setPendingAddBook({ title, price: 0, step: 'zero' }); return; }
                executeAddBook(title, numPrice);
            }

            function confirmPendingAddBook() {
                if (!pendingAddBook) return;
                if (pendingAddBook.step === 'duplicate' && pendingAddBook.price === 0) {
                    setPendingAddBook({ ...pendingAddBook, step: 'zero' });
                    return;
                }
                executeAddBook(pendingAddBook.title, pendingAddBook.price);
            }

            async function executeAddBook(title, numPrice) {
                setPendingAddBook(null);
                const newBook = { id: `${Date.now()}_${Math.random().toString(36).substr(2, 5)}`, title: title, basePrice: numPrice, deduction: 0, deductionReason: "", status: 'accepted', collectedBy: collectorName.trim(), createdAt: new Date().toISOString() };
                try { 
                    await getStudentsRef().doc(activeStudent.docId).update({ books: [...(activeStudent.books || []), newBook] }); 
                    setCustomBookName(""); setCustomBookPrice(""); 
                } catch (err) { showToast("寫入失敗", "error"); }
            }

            function handleQuickAddBook(item) { initiateAddBook(formatBookTitle(item), item.price); }
            function handleKeyDown(e) { if (e.key === 'Enter') initiateAddBook(customBookName, customBookPrice || "0"); }

            async function handleToggleBookStatus(bookId) {
                if (!activeStudent) return;
                const updatedBooks = activeStudent.books.map(b => b.id === bookId ? { ...b, status: b.status === 'accepted' ? 'rejected' : 'accepted', rejectReason: b.status === 'accepted' ? '退回' : '' } : b);
                try { await getStudentsRef().doc(activeStudent.docId).update({ books: updatedBooks }); } catch(err) { showToast("狀態更新失敗", "error"); }
            }

            async function handleDeleteBook(bookId) { 
                if (!activeStudent) return; 
                try { await getStudentsRef().doc(activeStudent.docId).update({ books: activeStudent.books.filter(b => b.id !== bookId) }); } catch(err) { showToast("刪除失敗", "error"); }
            }
            
            async function handleSaveBookEdits(bookId) {
                if (!activeStudent) return;
                const updatedBooks = activeStudent.books.map(b => { if (b.id === bookId) return { ...b, basePrice: Number(tempBasePrice) || 0, deduction: Number(tempDeduction) || 0, deductionReason: tempDeductReason.trim() }; return b; });
                try { await getStudentsRef().doc(activeStudent.docId).update({ books: updatedBooks }); setEditingBookId(null); } catch(err) { showToast("儲存失敗", "error"); }
            }

            function generateExportData() {
                const sortedForExcel = [...students].sort((a, b) => (a.order || 0) - (b.order || 0));
                let textContent = ""; let csvContent = "\uFEFF班級,姓名,電話號碼,總金額,已收書籍明細,退回書籍\n";
                sortedForExcel.forEach(s => {
                    const books = s.books || [];
                    if (books.length === 0) { textContent += "\t\n"; csvContent += `${s.form},${s.name},${s.phone},0,,\n`; } 
                    else {
                        const acceptedBooks = books.filter(b => b.status === 'accepted');
                        const rejectedBooks = books.filter(b => b.status === 'rejected');
                        const allDetails = books.map(b => {
                            if (b.status === 'accepted') {
                                const deductText = b.deduction > 0 ? `(扣$${b.deduction}:${b.deductionReason})` : '';
                                const collectorText = b.collectedBy ? `[經手:${b.collectedBy}]` : '';
                                return `[收] ${b.title}${deductText}${collectorText}`;
                            } else return `[退] ${b.title}`;
                        }).join(', ');
                        const total = acceptedBooks.reduce((sum, b) => sum + getActualPrice(b), 0);
                        textContent += `${allDetails}\t${total}\n`;

                        const acceptedStr = acceptedBooks.map(b => {
                            const deductText = b.deduction > 0 ? ` [扣$${b.deduction}: ${b.deductionReason}]` : '';
                            const collectorText = b.collectedBy ? ` [經手: ${b.collectedBy}]` : '';
                            return `${b.title}($${getActualPrice(b)})${deductText}${collectorText}`;
                        }).join('; ');
                        const rejectedStr = rejectedBooks.map(b => b.title).join('; ');
                        csvContent += `${s.form},${s.name},${s.phone},${total},"${acceptedStr}","${rejectedStr}"\n`;
                    }
                });
                return { textContent, csvContent };
            }

            function handleDownloadCSV() {
                const { csvContent } = generateExportData();
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `BookRecycling_Export_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            }

            // ===== 💡 5. UI Render Helpers =====
            
            const renderCartList = () => (
                <div className="flex-1 overflow-y-auto p-3 bg-slate-50">
                    {(!renderStudent || !renderStudent.books || renderStudent.books.length === 0) ? (
                        <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-white shadow-sm"><p className="text-sm font-bold text-slate-400">目前尚未登記</p></div>
                    ) : (
                        <div className="space-y-3">
                            {(renderStudent.books || []).map(b => {
                                const isAccepted = b.status === 'accepted';
                                const basePrice = Number(b.basePrice !== undefined ? b.basePrice : b.price || 0);
                                const deduction = Number(b.deduction || 0);
                                const actualPrice = Math.max(0, basePrice - deduction);
                                const isEditing = editingBookId === b.id;

                                return (
                                    <div key={b.id} className={`border rounded-xl overflow-hidden transition-all shadow-sm ${isAccepted ? 'border-slate-200 bg-white' : 'border-red-200 bg-red-50/80 opacity-80'}`}>
                                        <div className="p-3.5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                            <div className="flex items-start gap-3 w-full sm:w-auto">
                                                <div className={`mt-0.5 ${isAccepted ? 'text-green-500' : 'text-red-500'}`}>{isAccepted ? <IconCheck /> : <IconX />}</div>
                                                <div className="flex-1">
                                                    <p className={`text-[13px] md:text-sm font-bold leading-snug ${!isAccepted && 'line-through text-slate-400'}`}>{b.title}</p>
                                                    <div className="flex flex-wrap items-center gap-1.5 mt-1.5 text-[10px] md:text-xs">
                                                        <span className="text-slate-500 font-medium bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100">原價: ${basePrice}</span>
                                                        {deduction > 0 && isAccepted && <span className="bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-bold border border-amber-200">- ${deduction} ({b.deductionReason})</span>}
                                                        {b.collectedBy && isAccepted && <span className="text-slate-500 font-bold bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100">👤 {b.collectedBy}</span>}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-end gap-1.5 w-full sm:w-auto pt-3 sm:pt-0 border-t sm:border-0 border-slate-100 mt-2 sm:mt-0">
                                                {isAccepted && <div className="text-lg font-black text-slate-900 mr-2">${actualPrice}</div>}
                                                {isAccepted && <button onClick={() => { if(isEditing){ setEditingBookId(null); } else { setEditingBookId(b.id); setTempBasePrice(basePrice); setTempDeduction(b.deduction || ""); setTempDeductReason(b.deductionReason || ""); } }} className="p-2 text-slate-500 bg-slate-100 rounded-lg hover:bg-brand-50 hover:text-brand-600 transition-colors btn-spring" title="修改"><IconEdit /></button>}
                                                <button onClick={() => handleToggleBookStatus(b.id)} className="px-2.5 py-2 text-[10px] font-bold text-slate-600 bg-slate-100 rounded-lg border border-slate-200 transition-colors hover:bg-slate-200 btn-spring">{isAccepted ? "退回" : "恢復"}</button>
                                                <button onClick={() => handleDeleteBook(b.id)} className="p-2 text-slate-500 bg-slate-100 rounded-lg hover:bg-red-50 text-red-500 transition-colors btn-spring"><IconTrash /></button>
                                            </div>
                                        </div>
                                        {isEditing && isAccepted && (
                                            <div className="bg-slate-50 border-t border-slate-200 p-3 flex flex-wrap gap-2 items-end shadow-inner-soft">
                                                <div className="w-16"><label className="block text-[10px] text-slate-500 mb-1 font-bold">修改原價</label><input type="number" value={tempBasePrice} onChange={e => setTempBasePrice(e.target.value)} className="w-full px-2 py-1.5 text-xs font-bold border border-slate-300 rounded shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <div className="w-16"><label className="block text-[10px] text-slate-500 mb-1 font-bold">扣減金額</label><input type="number" value={tempDeduction} onChange={e => setTempDeduction(e.target.value)} className="w-full px-2 py-1.5 text-xs font-bold border border-slate-300 rounded shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <div className="flex-1 min-w-[120px]"><label className="block text-[10px] text-slate-500 mb-1 font-bold">扣減原因 (例: 缺頁)</label><input type="text" value={tempDeductReason} onChange={e => setTempDeductReason(e.target.value)} className="w-full px-2 py-1.5 text-xs font-bold border border-slate-300 rounded shadow-sm focus:ring-2 focus:ring-brand-400" /></div>
                                                <button onClick={() => handleSaveBookEdits(b.id)} className="px-4 py-1.5 bg-brand-600 text-white text-xs font-bold rounded shadow-sm hover:bg-brand-700 h-[30px] btn-spring">儲存</button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );

                <div className="flex-1 overflow-y-auto p-4 bg-slate-50">
                    {missingBooks.length === 0 ? (
                        <div className="text-center py-10 bg-emerald-50 border border-emerald-200 rounded-2xl shadow-sm">
                            <span className="text-5xl">🎉</span>
                            <p className="text-emerald-700 font-black mt-3 text-lg tracking-wide">核心單本已收齊！</p>
                            <p className="text-[10px] text-emerald-600 mt-1 font-bold opacity-80">（或已被套餐項目覆蓋）</p>

            const renderPOSMenu = () => (
                <div className="flex-1 flex flex-col h-full overflow-hidden bg-slate-50">
                    <div className="bg-white border-b border-slate-200 px-3 md:px-5 pt-3 flex gap-4 overflow-x-auto hide-scrollbar shrink-0 shadow-sm z-10 relative">
                        {['1','2','3','all'].map(f => (
                            <button key={f} onClick={() => handleFormTabClick(f)} className={`text-sm md:text-base font-black whitespace-nowrap pb-2.5 border-b-4 transition-colors ${activeCatalogForm === f ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-400 hover:text-slate-700'}`}>

                    </div>
                    {allSubjectsForForm.length > 1 && (
                        <div className="flex gap-2 p-3 md:p-4 overflow-x-auto hide-scrollbar shrink-0 bg-white border-b border-slate-100 shadow-sm z-0 relative">
                            {allSubjectsForForm.map(subj => (
                                <button key={subj} onClick={() => setActiveSubject(subj)} className={`px-4 py-2 rounded-xl text-xs md:text-sm font-bold whitespace-nowrap transition-all shadow-sm border ${activeSubject === subj ? 'bg-slate-900 text-white border-slate-900 scale-105' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100 btn-spring'}`}>

                                        className={`pos-btn hover-up relative px-3.5 py-4 rounded-2xl text-sm font-bold border-2 flex flex-col items-start gap-2 w-[calc(50%-5px)] sm:w-[calc(33.3%-7px)] xl:w-[calc(25%-8px)] text-left transition-all ${

                                    <div><label className="block text-sm font-bold text-slate-700 mb-1.5">學生姓名</label><input type="text" required value={editStudentData.name} onChange={e => setEditStudentData({...editStudentData, name: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-brand-100" /></div>
                                    <div><label className="block text-sm font-bold text-slate-700 mb-1.5">聯絡電話</label><input type="tel" value={editStudentData.phone} onChange={e => setEditStudentData({...editStudentData, phone: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-brand-100" /></div>
                                    <div className="mt-6 flex justify-end gap-3 pt-2"><button type="button" onClick={() => setShowEditStudentModal(false)} className="px-5 py-3 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50">取消</button><button type="submit" className="px-5 py-3 bg-brand-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-brand-700 btn-spring">儲存修改</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-3 md:p-4 z-[70]">
                            <div className="bg-white rounded-[24px] w-[95%] max-w-4xl p-4 md:p-6 shadow-floating flex flex-col max-h-[90vh]">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-5 gap-3">
                                    <div className="flex items-center gap-3">
                                        <h3 className="text-xl font-black text-slate-900">總分類書單設定</h3>
                                        <button onClick={handleResetDefaultCatalog} type="button" className="px-3 py-1.5 bg-brand-50 text-brand-600 border border-brand-200 hover:bg-brand-100 rounded-lg text-xs font-bold transition-colors shadow-sm btn-spring">📥 載入預設全科</button>
                                        {hasZeroPriceWarning && <span className="px-2 py-1.5 bg-red-100 text-red-600 rounded-lg text-xs font-bold flex items-center gap-1.5 shadow-sm"><IconWarning width="14" height="14"/> 尚有未定價項目</span>}
                                    </div>
                                    <button type="button" onClick={() => setShowSettingsModal(false)} className="bg-slate-100 p-2 rounded-full self-end sm:self-auto hover:bg-slate-200 transition-colors"><IconX /></button>
                                </div>
                                
                                <form onSubmit={handleCatalogSubmit} className="flex flex-col sm:flex-row flex-wrap items-start sm:items-end gap-3 md:gap-4 bg-slate-50 p-4 md:p-5 rounded-2xl border border-slate-200 mb-5 shrink-0 shadow-inner-soft">
                                    <div className="flex gap-3 w-full sm:w-auto">
                                        <div className="w-1/2 sm:w-28"><label className="block text-xs font-bold text-slate-600 mb-1.5">年級</label><select value={newCatalogItem.form} onChange={e=>setNewCatalogItem({...newCatalogItem, form: e.target.value})} className="w-full px-3 py-2.5 text-sm bg-white border border-slate-200 rounded-xl font-bold shadow-sm"><option value="1">中一</option><option value="2">中二</option><option value="3">中三</option><option value="all">通用/其他</option></select></div>
                                        <div className="w-1/2 sm:w-32"><label className="block text-xs font-bold text-slate-600 mb-1.5">科目</label><select value={newCatalogItem.subject} onChange={e=>setNewCatalogItem({...newCatalogItem, subject: e.target.value})} className="w-full px-3 py-2.5 text-sm bg-white border border-slate-200 rounded-xl font-bold shadow-sm">{["中文", "英文", "數學", "科學", "公民經濟與社會科", "歷史 / 中史", "地理", "其他科目", "自訂"].map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                                    </div>
                                    <div className="w-full sm:flex-1"><label className="block text-xs font-bold text-slate-600 mb-1.5">項目名稱</label><input type="text" required value={newCatalogItem.name} onChange={e=>setNewCatalogItem({...newCatalogItem, name: e.target.value})} className="w-full px-3 py-2.5 text-sm bg-white border border-slate-200 rounded-xl font-black shadow-sm"/></div>
                                    <div className="flex gap-3 w-full sm:w-auto items-end">
                                        <div className="flex-1 sm:w-28"><label className="block text-xs font-bold text-slate-600 mb-1.5">預設價</label><input type="number" required value={newCatalogItem.price} onChange={e=>setNewCatalogItem({...newCatalogItem, price: e.target.value})} className="w-full px-3 py-2.5 text-sm bg-white border border-slate-200 rounded-xl font-black shadow-sm text-brand-600"/></div>
                                        <div className="flex items-center gap-2 mb-2.5"><input type="checkbox" id="isPkg" checked={newCatalogItem.isPackage} onChange={e=>setNewCatalogItem({...newCatalogItem, isPackage: e.target.checked})} className="rounded border-slate-300 w-4.5 h-4.5 text-brand-600 focus:ring-brand-500" /><label htmlFor="isPkg" className="text-sm font-black text-slate-700 cursor-pointer">套餐款</label></div>
                                    </div>
                                    <div className="w-full sm:w-auto mt-2 sm:mt-0 flex gap-2">
                                        {editingCatalogId ? (
                                            <><button type="submit" className="flex-1 sm:flex-none px-6 py-2.5 bg-brand-600 text-white rounded-xl text-sm font-black shadow-md active:scale-95 h-[42px]">更新</button><button type="button" onClick={handleCancelCatalogEdit} className="flex-1 sm:flex-none px-5 py-2.5 bg-white border border-slate-200 text-slate-600 rounded-xl text-sm font-black h-[42px] hover:bg-slate-50">取消</button></>
                                        ) : (<button type="submit" className="w-full sm:w-auto px-6 py-2.5 bg-slate-900 text-white rounded-xl text-sm font-black h-[42px] shadow-md active:scale-95">新增</button>)}
                                    </div>
                                </form>

                                <div className="flex gap-2 mb-4 overflow-x-auto hide-scrollbar shrink-0 border-b border-slate-200 pb-3">
                                    {['all', '1', '2', '3'].map(f => (
                                        <button key={f} type="button" onClick={() => setSettingsFilterForm(f)} className={`px-5 py-2 text-sm font-black rounded-full border transition-all whitespace-nowrap shadow-sm ${settingsFilterForm === f ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>{f === 'all' ? '顯示全部' : `只限 F.${f}`}</button>
                                    ))}
                                </div>

                                <div className="flex-1 overflow-y-auto border border-slate-200 rounded-2xl shadow-inner bg-slate-50/50">
                                    <table className="w-full text-left text-xs md:text-sm min-w-[600px] border-collapse">
                                        <thead className="bg-white border-b border-slate-200 text-slate-400 sticky top-0 z-10 shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
                                            <tr><th className="px-5 py-4 font-black w-20">年級</th><th className="px-5 py-4 font-black w-32">科目</th><th className="px-5 py-4 font-black">項目名稱</th><th className="px-5 py-4 font-black w-24">預設價</th><th className="px-5 py-4 font-black w-20">款式</th><th className="px-5 py-4 font-black text-right w-28">操作</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-200 bg-white">
                                            {filteredSettingsCatalog.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-5 py-3.5"><span className="bg-slate-100 text-slate-500 px-2.5 py-1 rounded font-black text-[10px] border border-slate-200 shadow-inner-soft">{item.form === 'all' ? '通用' : `F.${item.form}`}</span></td>
                                                    <td className="px-5 py-3.5 text-slate-500 font-bold text-xs">{item.subject}</td>
                                                    <td className="px-5 py-3.5 font-black text-slate-900 text-[13px] md:text-sm">{item.name}</td>
                                                    <td className="px-5 py-3.5 font-black"><span className={`px-2.5 py-1 rounded-md border ${item.price === 0 ? 'text-red-600 bg-red-50 border-red-200 shadow-sm' : 'text-brand-700 bg-brand-50 border-brand-100'}`}>${item.price}</span></td>
                                                    <td className="px-5 py-3.5">{item.isPackage ? <span className="bg-slate-800 text-white text-[10px] px-2.5 py-1 rounded font-bold shadow-sm">套餐</span> : <span className="bg-white border border-slate-200 text-slate-500 text-[10px] px-2.5 py-1 rounded font-bold">單本</span>}</td>
                                                    <td className="px-5 py-3.5 text-right flex justify-end gap-1.5">
                                                        <button type="button" onClick={()=>handleEditCatalogClick(item)} className="text-slate-500 hover:text-brand-600 bg-slate-100 hover:bg-brand-50 p-2 rounded-lg transition-colors"><IconEdit width="16" height="16"/></button>
                                                        <button type="button" onClick={()=>handleDeleteCatalogItem(item.id)} className="text-slate-500 hover:text-red-600 bg-slate-100 hover:bg-red-50 p-2 rounded-lg transition-colors"><IconTrash width="16" height="16"/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {filteredSettingsCatalog.length === 0 && <tr><td colSpan="6" className="text-center py-16 text-slate-400 font-bold bg-slate-50/50">此範圍沒有任何設定</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCollectorStatsModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-3 md:p-4 z-[70]">
                            <div className="bg-white rounded-3xl w-[95%] max-w-3xl p-5 md:p-8 shadow-floating flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center mb-6"><h3 className="text-2xl font-black text-slate-900">經手人業績對數</h3><button type="button" onClick={() => setShowCollectorStatsModal(false)} className="bg-slate-100 p-2 rounded-full hover:bg-slate-200 transition-colors"><IconX /></button></div>
                                <div className="overflow-y-auto flex-1 space-y-5 pr-2">
                                    {Object.keys(collectorStats).length === 0 ? <p className="text-center py-16 text-sm font-bold text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl">無對數紀錄</p> : Object.entries(collectorStats).map(([cName, cData]) => (
                                        <div key={cName} className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                            <div className="bg-slate-50 px-5 py-4 flex justify-between items-center border-b border-slate-200">
                                                <span className="font-black text-xl text-slate-900 flex items-center gap-3"><span className="w-10 h-10 rounded-full bg-brand-100 text-brand-700 flex justify-center items-center text-lg shadow-inner-soft border border-brand-200">{cName.charAt(0).toUpperCase()}</span>{cName}</span>
                                                <div className="text-sm font-bold text-slate-500">共 {cData.count} 項 &nbsp;|&nbsp; <span className="text-brand-600 text-2xl font-black ml-2">${cData.total}</span></div>
                                            </div>
                                            <div className="divide-y divide-slate-100 bg-white">
                                                {cData.items.map(item => (
                                                    <div key={item.id} className="px-5 py-3 flex justify-between items-center text-xs md:text-sm hover:bg-slate-50 transition-colors">
                                                        <div className="text-slate-700 font-bold"><span className="bg-slate-100 border border-slate-200 text-slate-500 px-2 py-0.5 rounded mr-3 text-[10px] shadow-inner-soft">F.{item.studentForm} {item.studentName}</span>{item.bookTitle}</div>
                                                        <div className="font-black text-slate-900">${item.price}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showExportModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-[70]">
                            <div className="bg-white rounded-3xl w-[95%] max-w-xl p-6 md:p-8 shadow-floating">
                                <div className="flex justify-between items-center mb-5"><h3 className="text-xl font-black text-slate-900">匯出 CSV 數據</h3><button type="button" onClick={() => setShowExportModal(false)} className="bg-slate-100 p-2 rounded-full hover:bg-slate-200 transition-colors"><IconX /></button></div>
                                <p className="text-sm font-bold text-slate-500 mb-3">以下為 Excel 原始數據預覽：</p>
                                <textarea readOnly value={generateExportData().textContent} onClick={e => e.target.select()} className="w-full h-32 md:h-40 text-xs p-4 bg-slate-50 border border-slate-200 rounded-xl mb-6 focus:outline-none font-mono shadow-inner-soft" />
                                <div className="flex justify-end gap-3"><button type="button" onClick={() => setShowExportModal(false)} className="px-5 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50">取消</button><button type="button" onClick={handleDownloadCSV} className="px-5 py-2.5 bg-slate-900 text-white rounded-xl text-sm font-bold shadow-md flex items-center gap-2 active:scale-95 transition-transform"><IconDownload /> 下載 CSV 檔案</button></div>
                            </div>
                        </div>
                    )}

                    {showReceiptModal && renderStudent && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-3 md:p-4 z-[70] no-print">
                            <div className="bg-white rounded-[24px] w-[95%] max-w-md shadow-floating overflow-hidden flex flex-col max-h-[90vh]">
                                <div id="receipt-modal" className="p-6 md:p-8 bg-white text-slate-900 overflow-y-auto">
                                    <div className="text-center mb-5 md:mb-6 pb-5 border-b-2 border-dashed border-slate-200">
                                        <h2 className="text-xl md:text-2xl font-black mb-1.5 tracking-wide">二手書回收單據</h2>
                                        <p className="text-[10px] md:text-xs font-bold text-slate-400">Po Kok Secondary School</p>
                                    </div>
                                    <div className="mb-5 md:mb-6 text-sm bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <div className="flex justify-between mb-2"><span className="text-slate-500 font-bold">學生姓名:</span><span className="font-black text-base">{renderStudent.name} <span className="text-xs text-slate-400">(F.{renderStudent.form})</span></span></div>
                                        <div className="flex justify-between"><span className="text-slate-500 font-bold">聯絡電話:</span><span className="font-bold">{renderStudent.phone || '--'}</span></div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs md:text-sm min-w-[250px] mb-5 md:mb-6">
                                            <thead><tr className="border-b-2 border-slate-800"><th className="py-2.5 font-black text-slate-600">項目明細</th><th className="py-2.5 text-right font-black text-slate-600">金額</th></tr></thead>
                                            <tbody className="divide-y divide-slate-100">{(renderStudent.books || []).map((b, i) => (<tr key={i}><td className="py-3.5 font-bold leading-tight">{b.title}{b.status==='accepted'&&b.deduction>0&&<div className="text-[10px] text-slate-400 mt-1 font-medium bg-slate-50 inline-block px-1.5 py-0.5 rounded border border-slate-100">- {b.deductionReason} (扣${b.deduction})</div>}</td><td className="py-3.5 text-right font-black">{b.status==='accepted'?`$${getActualPrice(b)}`:'$0'}</td></tr>))}</tbody>
                                        </table>
                                    </div>
                                    <div className="flex justify-between items-center pt-4 border-t-2 border-slate-800">
                                        <span className="text-sm font-black uppercase tracking-widest text-slate-500">實付總額</span>
                                        <span className="text-3xl md:text-4xl font-black text-slate-900">${activeStats.total}</span>
                                    </div>
                                    <div className="mt-8 text-center"><p className="text-[10px] font-bold text-slate-400">請妥善保存此單據以作核對之用。謝謝！</p></div>
                                </div>
                                <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3 shrink-0"><button type="button" onClick={() => setShowReceiptModal(false)} className="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-100">關閉預覽</button><button type="button" onClick={() => window.print()} className="px-6 py-2.5 bg-slate-900 text-white rounded-xl text-sm font-bold flex items-center gap-2 shadow-md hover:bg-slate-800 active:scale-95 transition-all"><IconPrinter />正式列印</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
