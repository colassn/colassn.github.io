        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;

        const IconCart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
        const IconClipboardList = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>;

        const getSafeCollectorName = () => { try { return localStorage.getItem("collectorName") || ""; } catch (e) { return ""; } };
        const setSafeCollectorName = (name) => { try { localStorage.setItem("collectorName", name); } catch (e) {} };
        const formatBookTitle = (item) => item.form !== 'all' ? `F.${item.form} ${item.subject} ${item.name}` : item.name;

        function App() {
            const [user, setUser] = useState(null);
            const [dbConnected, setDbConnected] = useState(false);
            const [students, setStudents] = useState([]);
            const [catalog, setCatalog] = useState([]); 
            const [loading, setLoading] = useState(true);
            
            const [collectorName, setCollectorName] = useState(getSafeCollectorName);
            const [filterCollector, setFilterCollector] = useState("all");

            const [search, setSearch] = useState("");
            const [sortBy, setSortBy] = useState("form");
            const [activeId, setActiveId] = useState(null);
            
            const [activeMobileTab, setActiveMobileTab] = useState("menu");
            const [activeCatalogForm, setActiveCatalogForm] = useState("3"); // 預設顯示中三
            const [activeSubject, setActiveSubject] = useState("All");
            
            const [customBookName, setCustomBookName] = useState("");
            const [customBookPrice, setCustomBookPrice] = useState("");
            
            const [editingBookId, setEditingBookId] = useState(null);
            const [tempBasePrice, setTempBasePrice] = useState("");
            const [tempDeduction, setTempDeduction] = useState("");
            const [tempDeductReason, setTempDeductReason] = useState("");

            // Modals
            const [showAddStudentModal, setShowAddStudentModal] = useState(false);
            const [showEditStudentModal, setShowEditStudentModal] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showExportModal, setShowExportModal] = useState(false);
            const [showReceiptModal, setShowReceiptModal] = useState(false);
            const [showCollectorStatsModal, setShowCollectorStatsModal] = useState(false);
            
            const [pendingAddBook, setPendingAddBook] = useState(null); 

            const [newStudent, setNewStudent] = useState({ form: "3", name: "", phone: "" });
            const [editStudentData, setEditStudentData] = useState({ form: "3", name: "", phone: "" });
            const [settingsFilterForm, setSettingsFilterForm] = useState("3");
            const [newCatalogItem, setNewCatalogItem] = useState({ form: "3", subject: "中文", name: "", price: "0", isPackage: false });
            const [editingCatalogId, setEditingCatalogId] = useState(null); 

            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const showToast = (message, type = "success") => { setToast({ show: true, message, type }); setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3500); };

            useEffect(() => { setSafeCollectorName(collectorName); }, [collectorName]);

            useEffect(() => {
                auth.signInAnonymously().catch(err => { console.error(err); showToast("驗證失敗", "error"); });
                const unsub = auth.onAuthStateChanged(usr => { setUser(usr); setDbConnected(!!usr); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubStudents = getStudentsRef().onSnapshot(snapshot => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setStudents(list);
                    if (list.length > 0 && !activeId && window.innerWidth >= 768) setActiveId(list[0].docId);
                    setLoading(false);
                }, err => { console.error(err); showToast("載入名單失敗", "error"); setLoading(false); });
                
                const unsubCatalog = getCatalogRef().onSnapshot(docSnap => {
                    if (docSnap.exists && docSnap.data().items && docSnap.data().items.length > 0) {
                        setCatalog(docSnap.data().items);
                    } else {
                        let defaultCat = [];
                        ['1', '2', '3'].forEach(f => {
                            BOOK_TEMPLATES.forEach(subj => {
                                subj.items.forEach((item, idx) => {
                                    defaultCat.push({ id: `def_f${f}_${subj.s}_${idx}`, form: f, subject: subj.s, name: item.name, price: f === '3' ? item.f3Price : 0, isPackage: item.pkg });
                                });
                            });
                        });
                        setCatalog(defaultCat);
                        getCatalogRef().set({ items: defaultCat });
                    }
                });
                return () => { unsubStudents(); unsubCatalog(); };
            }, [user, activeId]);

            const handleFormTabClick = (formId) => {
                setActiveCatalogForm(formId);
                setActiveSubject("All");
            };

            useEffect(() => {
                if (activeStudent && ['1','2','3'].includes(activeStudent.form)) {
                    setActiveCatalogForm(activeStudent.form);
                } else if (activeStudent) {
                    setActiveCatalogForm("all");
                }
                setActiveSubject("All");
                setActiveMobileTab("menu"); 
            }, [activeStudent?.docId]);

            const normalizedCatalog = useMemo(() => catalog.map(c => ({ id: c.id, form: c.form || 'all', subject: c.subject || '自訂', name: c.name || c.title || '未命名', price: Number(c.price) || 0, isPackage: c.isPackage || false })), [catalog]);
            const getActualPrice = (book) => Math.max(0, Number(book.basePrice !== undefined ? book.basePrice : book.price || 0) - Number(book.deduction || 0));

            const stats = useMemo(() => {
                let totalAccepted = 0, totalAmount = 0, totalRejected = 0;
                students.forEach(s => { (s.books || []).forEach(b => { if (b.status === 'accepted') { totalAccepted++; totalAmount += getActualPrice(b); } else { totalRejected++; } }); });
                return { totalAccepted, totalAmount, totalRejected };
            }, [students]);

            const activeStats = useMemo(() => {
                if (!activeStudent) return { total: 0, acceptedBooks: 0, acceptedPackages: 0 };
                return (activeStudent.books || []).reduce((acc, b) => {
                    if (b.status === 'accepted') {
                        acc.total += getActualPrice(b);
                        const isPkg = normalizedCatalog.some(c => formatBookTitle(c) === b.title && c.isPackage);
                        if (isPkg) acc.acceptedPackages++; else acc.acceptedBooks++;
                    }
                    return acc;
                }, { total: 0, acceptedBooks: 0, acceptedPackages: 0 });
            }, [activeStudent, normalizedCatalog]);

            const missingBooks = useMemo(() => {
                if (!activeStudent || !['1','2','3'].includes(activeStudent.form)) return [];
                const expectedSingleBooks = normalizedCatalog.filter(c => c.form === activeStudent.form && !c.isPackage);
                const acceptedTitles = (activeStudent.books || []).filter(b => b.status === 'accepted').map(b => b.title);
                const acceptedPackageSubjects = normalizedCatalog.filter(c => c.isPackage && acceptedTitles.includes(formatBookTitle(c))).map(c => c.subject);
                return expectedSingleBooks.filter(c => {
                    const title = formatBookTitle(c);
                    const isBoughtSingle = acceptedTitles.includes(title);
                    const isSubjectCoveredByPackage = acceptedPackageSubjects.includes(c.subject);
                    return !isBoughtSingle && !isSubjectCoveredByPackage;
                });
            }, [activeStudent, normalizedCatalog]);

            const collectorStats = useMemo(() => {
                const statsMap = {};
                students.forEach(student => {
                    (student.books || []).forEach(book => {
                        if (book.status === 'accepted') {
                            const cName = book.collectedBy || '未指派';
                            if (!statsMap[cName]) statsMap[cName] = { count: 0, total: 0, items: [] };
                            statsMap[cName].count += 1; statsMap[cName].total += getActualPrice(book);
                            statsMap[cName].items.push({ studentName: student.name, studentForm: student.form, bookTitle: book.title, price: getActualPrice(book), id: book.id });
                        }
                    });
                });
                return statsMap;
            }, [students]);

            const uniqueCollectors = useMemo(() => Array.from(new Set(students.flatMap(s => (s.books||[]).filter(b => b.status==='accepted' && b.collectedBy).map(b => b.collectedBy)))).sort(), [students]);
            const hasZeroPriceWarning = useMemo(() => normalizedCatalog.some(c => c.price === 0), [normalizedCatalog]);

            const processedStudents = useMemo(() => {
                let filtered = students.filter(s => s.name.includes(search) || (s.phone && s.phone.includes(search)) || `f.${s.form}`.toLowerCase().includes(search.toLowerCase()));
                if (filterCollector !== "all") filtered = filtered.filter(s => (s.books || []).some(b => b.status === 'accepted' && b.collectedBy === filterCollector));
                return filtered.sort((a, b) => {
                    if (sortBy === 'name') return a.name.localeCompare(b.name, 'zh-HK');
                    if (sortBy === 'amount') {
                        const amtA = (a.books || []).reduce((sum, bk) => bk.status === 'accepted' ? sum + getActualPrice(bk) : sum, 0);
                        const amtB = (b.books || []).reduce((sum, bk) => bk.status === 'accepted' ? sum + getActualPrice(bk) : sum, 0);
                        return amtB - amtA;
                    }
                    if (a.form !== b.form) return a.form - b.form;
                    return (a.order || 0) - (b.order || 0);
                });
            }, [students, search, sortBy, filterCollector]);

            // ---- CRUD 操作 ----
            const handleCreateStudent = async (e) => {
                e.preventDefault();
                if (!newStudent.name.trim()) return;
                const newDocId = `student_${Date.now()}`;
                await getStudentsRef().doc(newDocId).set({ name: newStudent.name.trim(), form: newStudent.form, phone: newStudent.phone.trim() || "--", order: Date.now(), books: [] });
                setActiveId(newDocId); setShowAddStudentModal(false); setNewStudent({ form: "3", name: "", phone: "" }); showToast(`已新增學生: ${newStudent.name}`);
            };

            const openEditStudent = () => { setEditStudentData({ name: activeStudent.name, form: activeStudent.form, phone: activeStudent.phone === "--" ? "" : activeStudent.phone }); setShowEditStudentModal(true); };
            const handleSaveStudentEdit = async (e) => {
                e.preventDefault();
                if (!editStudentData.name.trim()) return;
                try { await getStudentsRef().doc(activeStudent.docId).update({ name: editStudentData.name.trim(), form: editStudentData.form, phone: editStudentData.phone.trim() || "--" }); setShowEditStudentModal(false); showToast("學生資料已更新"); } 
                catch(e) { showToast("更新失敗", "error"); }
            };
            const handleDeleteStudent = async () => {
                if (window.confirm(`⚠️ 確定要刪除學生「${activeStudent.name}」？\n此操作無法復原！`)) {
                    try { await getStudentsRef().doc(activeStudent.docId).delete(); setActiveId(null); showToast("已刪除"); } catch(e) { showToast("刪除失敗", "error"); }
                }
            };

            // 💡 一鍵還原全套書目
            const handleResetDefaultCatalog = async () => {
                if (!window.confirm("⚠️ 確定要載入預設的全科書單？這將清除目前所有自訂設定！")) return;
                let defaultCat = [];
                ['1', '2', '3'].forEach(f => {
                    BOOK_TEMPLATES.forEach(subj => {
                        subj.items.forEach((item, idx) => {
                            defaultCat.push({ id: `def_f${f}_${subj.s}_${idx}_${Date.now()}`, form: f, subject: subj.s, name: item.name, price: f === '3' ? item.f3Price : 0, isPackage: item.pkg });
                        });
                    });
                });
                await getCatalogRef().set({ items: defaultCat }); showToast("✅ 已載入預設全科書單！");
            };

            const saveCatalogToDB = async (newCatalog) => { await getCatalogRef().set({ items: newCatalog }, { merge: true }); showToast("設定已同步"); };
            const handleCatalogSubmit = (e) => {
                e.preventDefault();
                if (!newCatalogItem.name.trim()) return;
                if (editingCatalogId) {
                    saveCatalogToDB(normalizedCatalog.map(c => c.id === editingCatalogId ? { ...c, form: newCatalogItem.form, subject: newCatalogItem.subject, name: newCatalogItem.name.trim(), price: Number(newCatalogItem.price) || 0, isPackage: newCatalogItem.isPackage } : c));
                    setEditingCatalogId(null);
                } else {
                    saveCatalogToDB([...normalizedCatalog, { id: `cat_${Date.now()}`, form: newCatalogItem.form, subject: newCatalogItem.subject, name: newCatalogItem.name.trim(), price: Number(newCatalogItem.price) || 0, isPackage: newCatalogItem.isPackage }]);
                }
                setNewCatalogItem({ form: settingsFilterForm === 'all' ? '1' : settingsFilterForm, subject: "中文", name: "", price: "0", isPackage: false });
            };
            const handleEditCatalogClick = (item) => { setNewCatalogItem({ form: item.form, subject: item.subject, name: item.name, price: item.price.toString(), isPackage: item.isPackage || false }); setEditingCatalogId(item.id); };
            const handleCancelCatalogEdit = () => { setEditingCatalogId(null); setNewCatalogItem({ form: settingsFilterForm === 'all' ? '1' : settingsFilterForm, subject: "中文", name: "", price: "0", isPackage: false }); };
            const handleDeleteCatalogItem = (id) => { saveCatalogToDB(normalizedCatalog.filter(c => c.id !== id)); };

            const initiateAddBook = (title, priceStr) => {
                if (!activeStudent || !title.trim()) return;
                if (!collectorName.trim()) { showToast("請先輸入經手人名稱", "error"); document.getElementById('collector-input').focus(); return; }
                const numPrice = Number(priceStr) || 0;
                const isDuplicate = (activeStudent.books || []).some(b => b.title === title && b.status === 'accepted');
                
                if (isDuplicate) { setPendingAddBook({ title, price: numPrice, step: 'duplicate' }); return; }
                if (numPrice === 0) { setPendingAddBook({ title, price: 0, step: 'zero' }); return; }
                executeAddBook(title, numPrice);
            };

            const confirmPendingAddBook = () => {
                if (!pendingAddBook) return;
                if (pendingAddBook.step === 'duplicate' && pendingAddBook.price === 0) {
                    setPendingAddBook({ ...pendingAddBook, step: 'zero' });
                    return;
                }
                executeAddBook(pendingAddBook.title, pendingAddBook.price);
            };

            const executeAddBook = async (title, numPrice) => {
                setPendingAddBook(null);
                const newBook = { id: `${Date.now()}_${Math.random().toString(36).substr(2, 5)}`, title: title, basePrice: numPrice, deduction: 0, deductionReason: "", status: 'accepted', collectedBy: collectorName.trim(), createdAt: new Date().toISOString() };
                try { 
                    await getStudentsRef().doc(activeStudent.docId).update({ books: [...(activeStudent.books || []), newBook] }); 
                    setCustomBookName(""); setCustomBookPrice(""); 
                } catch (err) { showToast("寫入失敗", "error"); }
            };

            const handleQuickAddBook = (item) => initiateAddBook(formatBookTitle(item), item.price);
            const handleKeyDown = (e) => { if (e.key === 'Enter') initiateAddBook(customBookName, customBookPrice || "0"); };

            const handleToggleBookStatus = async (bookId) => {
                if (!activeStudent) return;
                const updatedBooks = activeStudent.books.map(b => b.id === bookId ? { ...b, status: b.status === 'accepted' ? 'rejected' : 'accepted', rejectReason: b.status === 'accepted' ? '退回' : '' } : b);
                await getStudentsRef().doc(activeStudent.docId).update({ books: updatedBooks });
            };

            const handleDeleteBook = async (bookId) => { if (!activeStudent) return; await getStudentsRef().doc(activeStudent.docId).update({ books: activeStudent.books.filter(b => b.id !== bookId) }); };
            
            const handleSaveBookEdits = async (bookId) => {
                if (!activeStudent) return;
                const updatedBooks = activeStudent.books.map(b => { if (b.id === bookId) return { ...b, basePrice: Number(tempBasePrice) || 0, deduction: Number(tempDeduction) || 0, deductionReason: tempDeductReason.trim() }; return b; });
                await getStudentsRef().doc(activeStudent.docId).update({ books: updatedBooks }); setEditingBookId(null);
            };

            const generateExportData = () => {
                const sortedForExcel = [...students].sort((a, b) => (a.order || 0) - (b.order || 0));
                let textContent = ""; let csvContent = "\uFEFF班級,姓名,電話號碼,總金額,已收書籍明細,退回書籍\n";
                sortedForExcel.forEach(s => {
                    const books = s.books || [];
                    if (books.length === 0) { textContent += "\t\n"; csvContent += `${s.form},${s.name},${s.phone},0,,\n`; } 
                    else {
                        const acceptedBooks = books.filter(b => b.status === 'accepted');
                        const rejectedBooks = books.filter(b => b.status === 'rejected');
                        const allDetails = books.map(b => {
                            if (b.status === 'accepted') {
                                const deductText = b.deduction > 0 ? `(扣$${b.deduction}:${b.deductionReason})` : '';
                                const collectorText = b.collectedBy ? `[經手:${b.collectedBy}]` : '';
                                return `[收] ${b.title}${deductText}${collectorText}`;
                            } else return `[退] ${b.title}`;
                        }).join(', ');
                        const total = acceptedBooks.reduce((sum, b) => sum + getActualPrice(b), 0);
                        textContent += `${allDetails}\t${total}\n`;

                        const acceptedStr = acceptedBooks.map(b => {
                            const deductText = b.deduction > 0 ? ` [扣$${b.deduction}: ${b.deductionReason}]` : '';
                            const collectorText = b.collectedBy ? ` [經手: ${b.collectedBy}]` : '';
                            return `${b.title}($${getActualPrice(b)})${deductText}${collectorText}`;
                        }).join('; ');
                        const rejectedStr = rejectedBooks.map(b => b.title).join('; ');
                        csvContent += `${s.form},${s.name},${s.phone},${total},"${acceptedStr}","${rejectedStr}"\n`;
                    }
                });
                return { textContent, csvContent };
            };

            const handleDownloadCSV = () => {
                const { csvContent } = generateExportData();
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `BookRecycling_Export_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const currentFormCatalogItems = useMemo(() => normalizedCatalog.filter(c => c.form === activeCatalogForm), [normalizedCatalog, activeCatalogForm]);
            const allSubjectsForForm = useMemo(() => ['All', ...Array.from(new Set(currentFormCatalogItems.map(c => c.subject)))], [currentFormCatalogItems]);
            const displayCatalogItems = useMemo(() => activeSubject === 'All' ? currentFormCatalogItems : currentFormCatalogItems.filter(c => c.subject === activeSubject), [currentFormCatalogItems, activeSubject]);
            const filteredSettingsCatalog = useMemo(() => normalizedCatalog.filter(c => settingsFilterForm === 'all' || c.form === settingsFilterForm), [normalizedCatalog, settingsFilterForm]);

            // ===== Render Helpers =====

            const renderCartList = () => (
                <div class="flex-1 overflow-y-auto p-3 bg-white">
                    {(!activeStudent.books || activeStudent.books.length === 0) ? (
                        <div class="text-center py-10 border-2 border-dashed border-slate-200 rounded-xl"><p class="text-sm text-slate-400">購物車是空的</p></div>
                    ) : (
                        <div class="space-y-2">
                            {(activeStudent.books || []).map(b => {
                                const isAccepted = b.status === 'accepted';
                                const basePrice = Number(b.basePrice !== undefined ? b.basePrice : b.price || 0);
                                const deduction = Number(b.deduction || 0);
                                const actualPrice = Math.max(0, basePrice - deduction);
                                const isEditing = editingBookId === b.id;

                                return (
                                    <div key={b.id} class={`border rounded-xl overflow-hidden transition-colors ${isAccepted ? 'border-slate-200 bg-white' : 'border-red-200 bg-red-50'}`}>
                                        <div class="p-3 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                                            <div class="flex items-start gap-2">
                                                <div class={`mt-0.5 ${isAccepted ? 'text-green-500' : 'text-red-500'}`}>{isAccepted ? <IconCheck /> : <IconX />}</div>
                                                <div>
                                                    <p class={`text-sm font-bold ${!isAccepted && 'line-through text-slate-400'}`}>{b.title}</p>
                                                    <div class="flex flex-wrap items-center gap-1.5 mt-1 text-[10px]">
                                                        <span class="text-slate-500">原價: ${basePrice}</span>
                                                        {deduction > 0 && isAccepted && <span class="bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-medium">- ${deduction} ({b.deductionReason})</span>}
                                                        {b.collectedBy && isAccepted && <span class="text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100">👤 {b.collectedBy}</span>}
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="flex flex-wrap items-center justify-end gap-1.5 w-full sm:w-auto mt-2 sm:mt-0 border-t sm:border-0 pt-2 sm:pt-0 border-slate-100">
                                                {isAccepted && <div class="text-base font-bold text-slate-900 mr-2">${actualPrice}</div>}
                                                {isAccepted && <button onClick={() => { if(isEditing){ setEditingBookId(null); } else { setEditingBookId(b.id); setTempBasePrice(basePrice); setTempDeduction(b.deduction || ""); setTempDeductReason(b.deductionReason || ""); } }} class="p-1 text-slate-500 bg-slate-100 rounded hover:bg-brand-50" title="修改"><IconEdit /></button>}
                                                <button onClick={() => handleToggleBookStatus(b.id)} class="px-2 py-1 text-[10px] font-medium text-slate-600 bg-slate-100 rounded border border-slate-200">{isAccepted ? "退回" : "恢復"}</button>
                                                <button onClick={() => handleDeleteBook(b.id)} class="p-1 text-slate-500 bg-slate-100 rounded hover:bg-red-50 text-red-500"><IconTrash /></button>
                                            </div>
                                        </div>
                                        {isEditing && isAccepted && (
                                            <div class="bg-slate-50 border-t border-slate-200 p-2 flex flex-wrap gap-2 items-end">
                                                <div class="w-16"><label class="block text-[10px] text-slate-500 mb-0.5">原價</label><input type="number" value={tempBasePrice} onChange={e => setTempBasePrice(e.target.value)} class="w-full px-1.5 py-1 text-xs border border-slate-300 rounded" /></div>
                                                <div class="w-16"><label class="block text-[10px] text-slate-500 mb-0.5">扣減</label><input type="number" value={tempDeduction} onChange={e => setTempDeduction(e.target.value)} class="w-full px-1.5 py-1 text-xs border border-slate-300 rounded" /></div>
                                                <div class="flex-1 min-w-[100px]"><label class="block text-[10px] text-slate-500 mb-0.5">扣減原因</label><input type="text" value={tempDeductReason} onChange={e => setTempDeductReason(e.target.value)} class="w-full px-1.5 py-1 text-xs border border-slate-300 rounded" /></div>
                                                <button onClick={() => handleSaveBookEdits(b.id)} class="px-3 py-1 bg-brand-600 text-white text-xs font-medium rounded">儲存</button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );

            const renderMissingList = () => (
                <div class="flex-1 overflow-y-auto p-4 bg-slate-50/50">
                    {missingBooks.length === 0 ? (
                        <div class="text-center py-12 bg-green-50 border border-green-200 rounded-xl">
                            <span class="text-4xl">🎉</span>
                            <p class="text-green-700 font-bold mt-2">此年級核心單本已全部收齊！</p>
                            <p class="text-xs text-green-600 mt-1">（或已被套餐完全覆蓋）</p>
                        </div>
                    ) : (
                        <div class="space-y-2">
                            <p class="text-xs text-slate-500 mb-3">以下書籍同學未交（已自動隱藏套餐包含之項目）：</p>
                            {missingBooks.map(c => (
                                <div key={c.id} class="flex justify-between items-center bg-white p-3 border border-dashed border-slate-300 rounded-lg">
                                    <div class="flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-slate-300"></span>
                                        <span class="text-sm font-medium text-slate-500">{formatBookTitle(c)}</span>
                                    </div>
                                    <button onClick={() => handleQuickAddBook(c)} class="px-3 py-1 bg-slate-100 hover:bg-brand-50 text-slate-600 hover:text-brand-600 text-xs font-bold rounded border border-slate-200 transition-colors">
                                        + 補交
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const renderPOSMenu = () => (
                <div class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50/50 pb-16 md:pb-0">
                    <div class="bg-white border-b border-slate-200 px-4 pt-3 flex gap-4 overflow-x-auto hide-scrollbar shrink-0">
                        {['1','2','3','all'].map(f => (
                            <button key={f} onClick={() => handleFormTabClick(f)} class={`text-sm font-bold whitespace-nowrap pb-2 border-b-2 transition-colors ${activeCatalogForm === f ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-400 hover:text-slate-700'}`}>
                                {f === 'all' ? '通用/其他' : `中${f === '1' ? '一' : f === '2' ? '二' : '三'}`}
                            </button>
                        ))}
                    </div>
                    {allSubjectsForForm.length > 1 && (
                        <div class="flex gap-2 p-3 overflow-x-auto hide-scrollbar shrink-0 bg-white border-b border-slate-100">
                            {allSubjectsForForm.map(subj => (
                                <button key={subj} onClick={() => setActiveSubject(subj)} class={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border ${activeSubject === subj ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100 shadow-sm'}`}>
                                    {subj === 'All' ? '全部顯示' : subj}
                                </button>
                            ))}
                        </div>
                    )}
                    <div class="flex-1 overflow-y-auto p-4">
                        <div class="flex flex-wrap gap-2 content-start">
                            {displayCatalogItems.length === 0 ? <p class="text-xs text-slate-400 w-full text-center">無書單資料</p> : displayCatalogItems.map(item => {
                                const title = formatBookTitle(item);
                                const isAdded = (activeStudent.books || []).some(b => b.title === title && b.status === 'accepted');
                                return (
                                    <button 
                                        key={item.id} onClick={() => handleQuickAddBook(item)}
                                        class={`pos-btn relative px-3 py-2.5 rounded-xl text-sm font-bold border flex flex-col items-start gap-1 shadow-sm w-[calc(50%-4px)] sm:w-[calc(33.3%-6px)] xl:w-[calc(25%-6px)] text-left ${
                                            isAdded ? 'bg-slate-50 border-slate-200 opacity-60' : 
                                            item.isPackage ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-800 border-slate-200 hover:border-brand-400'
                                        }`}
                                    >
                                        <span class="w-full truncate">{item.name}</span>
                                        <div class="flex justify-between items-center w-full">
                                            <span class={`text-[11px] px-1.5 py-0.5 rounded ${item.isPackage ? 'bg-slate-700 text-slate-200' : 'bg-slate-100 text-slate-500'}`}>${item.price}</span>
                                            {item.price === 0 && !isAdded && <span class="text-red-500" title="未定價警告"><IconWarning /></span>}
                                            {isAdded && <span class="text-green-500"><IconCheck /></span>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    <div class="p-3 bg-white border-t border-slate-200 shrink-0">
                        <div class="flex gap-2 items-end">
                            <div class="flex-1"><input type="text" value={customBookName} onChange={e => setCustomBookName(e.target.value)} onKeyDown={handleKeyDown} class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" placeholder="自訂書名"/></div>
                            <div class="w-20"><input type="number" value={customBookPrice} onChange={e => setCustomBookPrice(e.target.value)} onKeyDown={handleKeyDown} class="w-full px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" placeholder="單價"/></div>
                            <button onClick={() => initiateAddBook(customBookName, customBookPrice || "0")} class="px-4 py-2 bg-brand-600 text-white rounded-lg text-sm font-bold shadow-sm h-[38px]">加入</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div class="mx-auto w-full h-full flex flex-col font-sans relative bg-slate-100 md:bg-transparent">
                    
                    {toast.show && (
                        <div class={`fixed top-4 right-4 z-[60] px-4 py-3 rounded-xl shadow-floating flex items-center gap-2 text-sm font-bold text-white transition-opacity duration-300 ${toast.type === 'error' ? 'bg-red-600' : 'bg-slate-900'}`}>
                            {toast.message}
                        </div>
                    )}

                    <header class={`bg-white md:bg-transparent px-4 py-3 md:p-0 md:pb-4 mb-0 md:mb-4 border-b border-slate-200 md:border-b-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 shrink-0 ${activeId ? 'hidden md:flex' : 'flex'}`}>
                        <div>
                            <h1 class="text-xl md:text-2xl font-black tracking-tight text-slate-900">收書 POS 系統</h1>
                            <div class="flex items-center gap-2 mt-0.5 text-xs text-slate-500 font-medium">
                                <span class={`block w-2 h-2 rounded-full ${dbConnected ? 'bg-green-500' : 'bg-amber-500'}`}></span>
                                {dbConnected ? "連線正常" : "斷線"} <span class="text-slate-300">|</span> Po Kok Sec. School
                            </div>
                        </div>
                        <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                            <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 focus-within:border-brand-500 flex-1 sm:flex-none">
                                <span class="text-slate-400 mr-2"><IconUser /></span>
                                <input id="collector-input" type="text" placeholder="經手人代號" value={collectorName} onChange={(e) => setCollectorName(e.target.value)} class="bg-transparent border-none text-sm focus:outline-none w-full sm:w-24 font-bold text-brand-700"/>
                            </div>
                            <button onClick={() => setShowSettingsModal(true)} class="relative px-3 py-2 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-xl text-sm font-bold shadow-sm flex items-center gap-1.5">
                                <IconSettings /> 設定
                                {hasZeroPriceWarning && <span class="absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>}
                            </button>
                            <button onClick={() => setShowCollectorStatsModal(true)} class="px-3 py-2 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-xl text-sm font-bold shadow-sm"><IconChart /></button>
                            <button onClick={() => setShowExportModal(true)} class="px-3 py-2 bg-slate-900 text-white hover:bg-slate-800 rounded-xl text-sm font-bold shadow-sm flex items-center gap-1"><IconDownload /> 匯出</button>
                        </div>
                    </header>

                    <div class="flex-1 flex flex-col md:flex-row gap-4 lg:gap-6 min-h-0 overflow-hidden relative">
                        
                        {/* 左側 Sidebar */}
                        <div class={`w-full md:w-80 lg:w-[340px] flex flex-col gap-3 shrink-0 h-full ${activeId ? 'hidden md:flex' : 'flex'}`}>
                            <div class="bg-brand-600 text-white rounded-2xl p-4 shadow-floating">
                                <div class="flex justify-between items-end">
                                    <div><p class="text-brand-100 text-xs font-bold mb-1">今日總派錢</p><p class="text-3xl font-black leading-none">${stats.totalAmount}</p></div>
                                    <div class="text-right"><p class="text-brand-100 text-[10px] font-bold mb-1">成功件數</p><p class="text-xl font-bold">{stats.totalAccepted}</p></div>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <div class="relative flex-1">
                                    <span class="absolute left-3 top-2.5 text-slate-400"><IconSearch /></span>

                                </div>

                                    {Object.keys(collectorStats).length === 0 ? <p class="text-center py-12 text-sm font-bold text-slate-400 border-2 border-dashed border-slate-200 rounded-xl">無紀錄</p> : Object.entries(collectorStats).map(([cName, cData]) => (
                                        <div key={cName} class="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                            <div class="bg-slate-50 px-4 py-3 flex justify-between items-center border-b border-slate-200"><span class="font-black text-lg text-slate-900 flex items-center gap-2"><span class="w-8 h-8 rounded-full bg-brand-100 text-brand-700 flex justify-center items-center text-sm">{cName.charAt(0).toUpperCase()}</span>{cName}</span><div class="text-sm font-bold text-slate-500">共 {cData.count} 項 | <span class="text-slate-900 text-xl font-black">${cData.total}</span></div></div>
                                            <div class="divide-y divide-slate-100 bg-white">
                                                {cData.items.map(item => (
                                                    <div key={item.id} class="px-4 py-2.5 flex justify-between items-center text-xs md:text-sm"><div class="text-slate-600 font-bold"><span class="bg-slate-100 border border-slate-200 text-slate-500 px-1.5 py-0.5 rounded mr-2 text-[10px]">F.{item.studentForm} {item.studentName}</span>{item.bookTitle}</div><div class="font-black text-slate-900">${item.price}</div></div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showExportModal && (
                        <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div class="bg-white rounded-2xl w-[95%] max-w-xl p-6 shadow-floating"><div class="flex justify-between items-center mb-5"><h3 class="text-xl font-black">匯出數據</h3><button onClick={() => setShowExportModal(false)} class="bg-slate-100 p-1.5 rounded-full"><IconX /></button></div><textarea readOnly value={generateExportData().textContent} onClick={e => e.target.select()} class="w-full h-32 text-xs p-4 bg-slate-50 border border-slate-200 rounded-xl mb-5 focus:outline-none font-mono" /><div class="flex justify-end gap-3"><button onClick={() => setShowExportModal(false)} class="px-5 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-600">取消</button><button onClick={handleDownloadCSV} class="px-5 py-2.5 bg-slate-900 text-white rounded-xl text-sm font-bold shadow-sm">下載 CSV</button></div></div>
                        </div>
                    )}

                    {showReceiptModal && activeStudent && (
                        <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-3 md:p-4 z-50 no-print">
                            <div class="bg-white rounded-2xl w-[95%] max-w-md shadow-floating overflow-hidden flex flex-col max-h-[90vh]">
                                <div id="receipt-modal" class="p-5 md:p-8 bg-white text-slate-900 overflow-y-auto"><div class="text-center mb-4 md:mb-6 pb-4 md:pb-6 border-b border-slate-200"><h2 class="text-xl md:text-2xl font-black mb-1">二手書回收單據</h2><p class="text-[10px] md:text-xs font-bold text-slate-400">Po Kok Secondary School</p></div><div class="mb-5 md:mb-6 text-sm"><div class="flex justify-between mb-1.5"><span class="text-slate-500 font-bold">學生:</span><span class="font-black text-lg">{activeStudent.name} <span class="text-sm text-slate-400">(F.{activeStudent.form})</span></span></div><div class="flex justify-between"><span class="text-slate-500 font-bold">電話:</span><span class="font-bold">{activeStudent.phone || '--'}</span></div></div><div class="overflow-x-auto"><table class="w-full text-left text-xs md:text-sm min-w-[250px] mb-5 md:mb-6"><thead><tr class="border-b-2 border-slate-800"><th class="py-2.5 font-bold">項目</th><th class="py-2.5 text-right font-bold">金額</th></tr></thead><tbody class="divide-y divide-slate-100">{(activeStudent.books || []).map((b, i) => (<tr key={i}><td class="py-3 font-bold">{b.title}{b.status==='accepted'&&b.deduction>0&&<div class="text-[10px] text-slate-400 mt-1 font-medium">- {b.deductionReason} (扣${b.deduction})</div>}</td><td class="py-3 text-right font-black">{b.status==='accepted'?`$${getActualPrice(b)}`:'$0'}</td></tr>))}</tbody></table></div><div class="flex justify-between items-center pt-4 border-t-2 border-slate-800"><span class="text-sm font-bold uppercase tracking-widest text-slate-500">實付總額</span><span class="text-2xl md:text-3xl font-black text-slate-900">${activeStats.total}</span></div></div><div class="p-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3 shrink-0"><button onClick={() => setShowReceiptModal(false)} class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600">關閉</button><button onClick={() => window.print()} class="px-5 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm"><IconPrinter />列印</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
