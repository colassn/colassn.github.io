    <style>
        /* ── BASE ─────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        /* ── GLASSMORPHISM ───────────────────────────────────────────── */
        .glass-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.72);
            box-shadow:
                0 2px 18px -4px rgba(15,23,42,0.07),
                0 1px 3px rgba(15,23,42,0.03),
                inset 0 1px 0 rgba(255,255,255,0.9);
        }
        .dark .glass-card {
            background: rgba(8,14,28,0.82);
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow:
                0 8px 32px -4px rgba(0,0,0,0.5),
                0 1px 4px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.04);
        }

        /* ── KEYFRAMES ───────────────────────────────────────────────── */
        @keyframes spin       { to { transform: rotate(360deg); } }
        @keyframes blob       { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(28px,-46px) scale(1.08)} 66%{transform:translate(-18px,22px) scale(0.94)} }
        @keyframes marquee    { 0%{transform:translateX(100vw)} 100%{transform:translateX(-100%)} }
        @keyframes popInError { 0%{transform:translate(-50%,-50%) scale(0.82);opacity:0} 55%{transform:translate(-50%,-50%) scale(1.04)} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }
        @keyframes logoFloat  { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-10px) rotate(2deg)} }
        @keyframes popIn      { 0%{opacity:0;transform:scale(0.86) translateY(14px)} 65%{transform:scale(1.02) translateY(-2px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
        @keyframes slideUpFade{ from{opacity:0;transform:translateY(22px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes fadeScale  { from{opacity:0;transform:scale(0.94)} to{opacity:1;transform:scale(1)} }
        @keyframes shimmer    { 0%{transform:translateX(-130%)} 100%{transform:translateX(130%)} }
        @keyframes navIn      { from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes checkBounce{ 0%{transform:scale(0) rotate(-20deg)} 55%{transform:scale(1.3) rotate(5deg)} 80%{transform:scale(0.92)} 100%{transform:scale(1) rotate(0)} }
        @keyframes submitPop  { 0%{transform:scale(0) rotate(-15deg);opacity:0} 60%{transform:scale(1.25) rotate(3deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
        @keyframes particleDrift { 0%,100%{transform:translate(0,0);opacity:0.1} 33%{transform:translate(10px,-14px);opacity:0.2} 66%{transform:translate(-7px,9px);opacity:0.07} }
        @keyframes ringRotate { to { transform: rotate(360deg); } }
        @keyframes pulseGlow  { 0%,100%{box-shadow:0 0 8px 2px rgba(99,102,241,0.2)} 50%{box-shadow:0 0 22px 6px rgba(99,102,241,0.42)} }

        @keyframes stripeMove { from{background-position:0 0} to{background-position:40px 0} }
        @keyframes authFeature{ from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
        @keyframes cardPeek   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ── ANIMATION HELPERS ───────────────────────────────────────── */
        .animate-blob         { animation: blob 9s ease-in-out infinite; }
        .animation-delay-2000 { animation-delay: 2s; }

        /* ── LOADING SCREEN ──────────────────────────────────────────── */
        #loading-screen {
            position: fixed; inset: 0; z-index: 9999;
            background:
                radial-gradient(ellipse 70% 60% at 20% 15%, #e0e7ff, transparent),

            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: opacity 0.65s cubic-bezier(0.4,0,0.2,1);
        }
        .dark #loading-screen {
            background:
                radial-gradient(ellipse 70% 60% at 20% 15%, rgba(79,70,229,0.22), transparent),
                radial-gradient(ellipse 60% 55% at 82% 88%, rgba(124,58,237,0.13), transparent),
                #020617;
        }
        .loader-logo-wrap  { position: relative; margin-bottom: 22px; display: flex; align-items: center; justify-content: center; }
        .loader-logo       { width: 66px; height: 66px; border-radius: 22px; position: relative; z-index: 1; background: linear-gradient(135deg, #4f46e5, #7c3aed 55%, #a78bfa); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 10px rgba(79,70,229,0.07), 0 12px 44px rgba(79,70,229,0.38); animation: logoFloat 2.8s ease-in-out infinite; }
        .loader-logo svg   { width: 32px; height: 32px; color: white; }
        .loader-ring       { position: absolute; inset: -8px; border-radius: 30px; z-index: 0; border: 2px solid transparent; background: linear-gradient(white,white) padding-box, conic-gradient(from 0deg, #6366f1 0%, #a78bfa 50%, #6366f1 100%) border-box; animation: ringRotate 2.5s linear infinite; }
        .dark .loader-ring { background: linear-gradient(#020617,#020617) padding-box, conic-gradient(from 0deg, #6366f1 0%, #a78bfa 50%, #6366f1 100%) border-box; }
        .loader-text       { font-size: 1.05rem; font-weight: 800; color: #1e293b; margin-bottom: 3px; letter-spacing: -0.01em; }
        .dark .loader-text { color: #e2e8f0; }
        .loader-sub        { font-size: 0.68rem; color: #94a3b8; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 28px; }
        .spinner           { width: 28px; height: 28px; border: 2.5px solid rgba(99,102,241,0.12); border-top: 2.5px solid #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .hidden-loader     { opacity: 0; pointer-events: none; }

        /* ── AUTH PAGE ───────────────────────────────────────────────── */
        .auth-dot-grid {
            background-image: radial-gradient(circle, rgba(139,92,246,0.28) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 35%, transparent 88%);
            -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 35%, transparent 88%);
        }
        .auth-particle     { animation: particleDrift var(--dur,7s) ease-in-out infinite; animation-delay: var(--delay,0s); }
        .auth-feat         { animation: authFeature 0.5s cubic-bezier(0.16,1,0.3,1) both; }
        .auth-feat:nth-child(1) { animation-delay: 0.08s; }
        .auth-feat:nth-child(2) { animation-delay: 0.16s; }
        .auth-feat:nth-child(3) { animation-delay: 0.24s; }

        /* ── NOISE TEXTURE ──────────────────────────────────────────── */
        .noise-bg::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            border-radius: inherit; z-index: 3; mix-blend-mode: overlay; opacity: 0.55;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        }

        /* ── SHIMMER ─────────────────────────────────────────────────── */
        .shimmer           { position: relative; overflow: hidden; }
        .shimmer::after    { content: ''; position: absolute; inset: 0; background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.52) 50%, transparent 70%); animation: shimmer 3.2s ease-in-out infinite; }
        .dark .shimmer::after { background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%); }

        /* ── CARD HOVER LIFT ────────────────────────────────────────── */
        .card-lift { transition: transform 0.28s cubic-bezier(0.34,1.1,0.64,1), box-shadow 0.28s ease; }
        .card-lift:hover { transform: translateY(-3px) scale(1.005); }
        .card-lift:active { transform: scale(0.98); }

        /* ── TASK CARD ACCENT BAR ───────────────────────────────────── */
        .task-overdue  { border-left: 3.5px solid #ef4444; }
        .task-today    { border-left: 3.5px solid #f97316; }
        .task-soon     { border-left: 3.5px solid #eab308; }
        .task-safe     { border-left: 3.5px solid #22c55e; }
        .task-done     { border-left: 3.5px solid rgba(203,213,225,0.5); }

        /* ── SUBMITTED INDICATOR ────────────────────────────────────── */
        .submitted-pop { animation: submitPop 0.36s cubic-bezier(0.34,1.56,0.64,1) forwards; }

        /* ── BG DOT GRID ────────────────────────────────────────────── */
        .bg-dot-grid { background-image: radial-gradient(circle, rgba(99,102,241,0.055) 1.5px, transparent 1.5px); background-size: 34px 34px; }
        .dark .bg-dot-grid { background-image: radial-gradient(circle, rgba(99,102,241,0.07) 1px, transparent 1px); }

        /* ── ACCESSIBILITY MODES ────────────────────────────────────── */
        .reduce-motion-mode *, .reduce-motion-mode *::before, .reduce-motion-mode *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
        .large-text-mode     { font-size: 1.04rem; }
        .clean-glass-mode    .glass-card { background: rgba(255,255,255,0.94); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .dark .clean-glass-mode .glass-card { background: rgba(6,10,20,0.96); }
        .settings-page-stable { animation: none !important; will-change: auto; transform: translateZ(0); }
        .settings-page-stable * { backface-visibility: hidden; }
        .settings-page-stable .settings-live-indicator { transition: none !important; }


        /* ── v1.9.03 CENTERED ISLAND + VISIBLE ACTIONS PATCH ─────────────────────────────
           本次更新只做顯示方式、排版層級、響應式與流暢度優化；不刪除任何功能邏輯。
           覆蓋路徑建議：/rchw/index.html；測試版建議先放 backup/v1.9.06-golden-interface-rebuild.html。
        */
        :root {
            --eh-accent-rgb: 79 70 229;
            --eh-accent-2-rgb: 59 130 246;
            --eh-surface-rgb: 255 255 255;
            --eh-page-max: 1180px;
            --eh-readable-max: 860px;
            --eh-safe-bottom: env(safe-area-inset-bottom, 0px);
            --eh-safe-top: env(safe-area-inset-top, 0px);
        }
        html[data-theme-color="indigo"] { --eh-accent-rgb: 79 70 229; --eh-accent-2-rgb: 37 99 235; }
        html[data-theme-color="rose"]    { --eh-accent-rgb: 225 29 72; --eh-accent-2-rgb: 236 72 153; }
        html[data-theme-color="emerald"] { --eh-accent-rgb: 5 150 105; --eh-accent-2-rgb: 20 184 166; }
        html[data-theme-color="amber"]   { --eh-accent-rgb: 245 158 11; --eh-accent-2-rgb: 249 115 22; }
        html[data-theme-color="violet"]  { --eh-accent-rgb: 124 58 237; --eh-accent-2-rgb: 147 51 234; }
        html[data-theme-color="sky"]     { --eh-accent-rgb: 14 165 233; --eh-accent-2-rgb: 59 130 246; }
        html[data-theme-color="zinc"]    { --eh-accent-rgb: 63 63 70; --eh-accent-2-rgb: 51 65 85; }

        html { scroll-behavior: smooth; background: #f8fafc; }
        html.dark { background: #050b16; }
        body { min-height: 100dvh; overflow-x: hidden; text-rendering: optimizeLegibility; }
        button, input, textarea { touch-action: manipulation; }
        input, textarea { font-size: 16px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .eh-shell {
            min-height: 100dvh;
            padding-left: max(1rem, env(safe-area-inset-left, 0px));
            padding-right: max(1rem, env(safe-area-inset-right, 0px));
            padding-bottom: calc(8.5rem + var(--eh-safe-bottom));
            background:

                radial-gradient(circle at 88% 18%, rgb(var(--eh-accent-2-rgb) / 0.10), transparent 30rem),
                linear-gradient(180deg, rgba(248,250,252,0.98) 0%, rgba(241,245,249,0.96) 100%);
        }
        .dark .eh-shell {
            background:
                radial-gradient(circle at 18% 8%, rgb(var(--eh-accent-rgb) / 0.17), transparent 34rem),
                radial-gradient(circle at 88% 18%, rgb(var(--eh-accent-2-rgb) / 0.10), transparent 30rem),
                linear-gradient(180deg, #050b16 0%, #07111f 100%);
        }
        .eh-content { width: min(var(--eh-page-max), calc(100vw - 2rem)); margin-inline: auto; }
        .eh-page-panel { width: 100%; margin-inline: auto; }

            width: min(var(--eh-readable-max), calc(100vw - 2rem));
            min-height: 4.15rem;
            box-shadow: 0 18px 60px -34px rgba(15,23,42,0.55), inset 0 1px 0 rgba(255,255,255,0.75);
        }
        .dark .eh-topbar { box-shadow: 0 18px 60px -34px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05); }

        .glass-card,

        .eh-page-panel .dark\:bg-slate-900 { background-clip: padding-box; }
        .eh-page-panel .glass-card,
        .eh-page-panel section,
        .eh-page-panel form,

        .dark .eh-page-panel .rounded-\[2rem\],

        .eh-nav {
            width: min(720px, calc(100vw - 1.25rem));

            box-shadow:
                0 24px 80px -28px rgba(15,23,42,0.55),
                0 10px 26px -18px rgb(var(--eh-accent-rgb) / 0.45),
                inset 0 1px 0 rgba(255,255,255,0.84);
        }
        .dark .eh-nav {
            box-shadow:
                0 26px 90px -28px rgba(0,0,0,0.92),

        .settings-page-stable { width: min(var(--eh-readable-max), 100%); margin-inline: auto; }

        const formatCountdown = (ms) => { 
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600); 
            const minutes = Math.floor((totalSeconds % 3600) / 60); 
            const seconds = totalSeconds % 60;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`; 
        };

        const formatTimeStr = (date) => { 
            try { return (date instanceof Date && !isNaN(date.getTime())) ? date.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' }) : '--:--'; } 
            catch(e) { return '--:--'; }
        };

        const formatRelativeTime = (lastSeen) => {
            if (!lastSeen || typeof lastSeen.toDate !== 'function') return '無紀錄';
            const date = lastSeen.toDate(); const now = new Date(); const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000); const diffMin = Math.floor(diffSec / 60); const diffHour = Math.floor(diffMin / 60); const diffDay = Math.floor(diffHour / 24);
            if (diffSec < 60) return '剛剛';
            if (diffMin < 60) return `${diffMin} 分鐘前`;
            if (diffHour < 24) return `${diffHour} 小時前`;
            if (diffDay < 30) return `${diffDay} 天前`;
            return date.toLocaleDateString('zh-HK');
        };

        const formatDueDate = (dateStr) => {
            if (!dateStr) return '';
            try {
                const d = (typeof dateStr === 'string' && typeof dateStr.toDate !== 'function') ? new Date(dateStr) : dateStr.toDate();
                if (isNaN(d.getTime())) return String(dateStr); 
                const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} (星期${weekDays[d.getDay()]})`;
            } catch (e) { return String(dateStr); }
        };

        const generateFullSchedule = (config, now, dayOverride = null) => {
            if (!config || !Array.isArray(config.timeSlots)) return [];
            const day = dayOverride !== null ? dayOverride : now.getDay();
            if (day === 0 || day === 6) return [];
            const daySubjects = config.schedule?.[day] || [];
            let lessonIndex = 0; const baseDate = new Date(now); baseDate.setHours(0,0,0,0);
            return config.timeSlots.map(slot => {
                const parts = (slot.startTime || "00:00").split(':');
                const start = new Date(baseDate); start.setHours(parseInt(parts[0]) || 0, parseInt(parts[1]) || 0, 0, 0);
                const end = new Date(start.getTime() + (parseInt(slot.duration) || 35) * 60000);
                let subject = slot.label || '';
                if (slot.type === 'lesson') { subject = daySubjects[lessonIndex] || '---'; lessonIndex++; }
                return { ...slot, start, end, subjectName: subject };
            });
        };

        const inferSubjectFromTimetable = (config, now = new Date()) => {
            try {
                const schedule = generateFullSchedule(config, now);
                if (!schedule.length) return '';
                const nowMs = now.getTime();
                const lessonSlots = schedule.filter(slot => slot.type === 'lesson' && slot.subjectName && slot.subjectName !== '---');
                const currentLesson = lessonSlots.find(slot => nowMs >= slot.start.getTime() && nowMs < slot.end.getTime());
                if (currentLesson) return currentLesson.subjectName;

                const justEndedLessons = lessonSlots
                    .filter(slot => nowMs >= slot.end.getTime() && nowMs - slot.end.getTime() <= 30 * 60 * 1000)
                    .sort((a, b) => (nowMs - a.end.getTime()) - (nowMs - b.end.getTime()));
                if (justEndedLessons.length) return justEndedLessons[0].subjectName;

                const nearestPastLesson = lessonSlots
                    .filter(slot => nowMs >= slot.end.getTime())
                    .sort((a, b) => b.end.getTime() - a.end.getTime())[0];
                return nearestPastLesson?.subjectName || '';
            } catch (e) {
                console.warn("Subject prediction failed:", e);

            }

        function CurrentLessonWidget({ config, t, onClick, globalNow }) {
            const now = globalNow || new Date(); const day = now.getDay();

                    </div>
                    <Icon name="chevron-right" className="w-5 h-5 text-slate-300" />
                </button>
            );
            
            const schedule = generateFullSchedule(config, now);
            const currentMs = now.getTime(); let currentSlot = null, nextSlot = null, status = 'ended';

            for (let i = 0; i < schedule.length; i++) {
                const s = schedule[i];
                if (currentMs >= s.start.getTime() && currentMs < s.end.getTime()) { currentSlot = s; status = s.type === 'lesson' ? 'current' : 'break'; nextSlot = schedule[i+1]; break; }
                if (currentMs < s.start.getTime()) { nextSlot = s; status = 'not-started'; break; }
            }
            if (!currentSlot && !nextSlot) status = 'ended';
            const diff = currentSlot ? (currentSlot.end.getTime() - currentMs) : (nextSlot ? (nextSlot.start.getTime() - currentMs) : 0);
            const percent = currentSlot ? Math.max(0, Math.min(100, 100 - (diff / (currentSlot.end - currentSlot.start)) * 100)) : 0;
            const statusText = status === 'current' ? '正在上課' : status === 'break' ? '小息時間' : status === 'not-started' ? '準備上課' : '已放學';
            const mainText = status === 'ended' ? '今日課堂已完成' : (currentSlot ? currentSlot.subjectName : (nextSlot?.subjectName || '準備開始'));
            const subText = status === 'ended' ? '可以專心處理功課同溫習' : status === 'current' ? `距離下課剩餘 ${formatCountdown(diff)}` : `距離開始 ${formatCountdown(diff)}`;

            return (

                            <div className="min-w-0">
                                <div className="flex items-center gap-2 text-[11px] font-black text-slate-400 uppercase tracking-widest"><span className={`w-2 h-2 rounded-full ${status === 'current' ? 'bg-emerald-500 animate-pulse' : status === 'break' ? 'bg-orange-500' : 'bg-slate-300'}`}></span>{statusText}</div>
                                <div className="font-black text-lg sm:text-xl text-slate-850 dark:text-white truncate tracking-tight">{mainText}</div>
                                <div className="text-xs font-bold text-slate-400 truncate">{subText}</div>
                            </div>

                        <div className="flex items-center gap-2 sm:justify-end shrink-0">
                            {status !== 'ended' && <div className="px-3 py-2 rounded-2xl bg-slate-100/80 dark:bg-slate-800/80 border border-slate-200/70 dark:border-slate-700/70"><div className="text-[9px] font-black text-slate-400 uppercase">下一節</div><div className="text-sm font-black text-slate-700 dark:text-slate-200 max-w-[7rem] truncate">{nextSlot ? nextSlot.subjectName : '放學'}</div></div>}

        function JoinClassModal({ isOpen, onClose, systemClasses, joinedClasses, onJoin, triggerConfirm, t }) {

            const [floatingError, setFloatingError] = useState('');
            if (!isOpen) return null;
            const showError = (msg) => { setFloatingError(msg); setTimeout(() => setFloatingError(''), 3000); };
            const handleJoin = async (e) => {
                e.preventDefault();

                const targetClass = systemClasses.find(c => c.code === upperCode);
                if (!targetClass) return showError('無效的班級代碼！請確認後再試。');
                if (joinedClasses.includes(upperCode)) return showError('你已經加入過這個班級了！');
                triggerConfirm(`確定要加入【${targetClass.name}】嗎？`, async () => {
                    setLoading(true); 
                    try { await onJoin(upperCode, targetClass.name); setCode(''); } 
                    catch (err) { showError('加入失敗，請重試'); } 
                    setLoading(false);
                });
            };
            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4">

        function DatePickerModal({ isOpen, value, onSelect, onClose, title = '選擇日期' }) {
            const parseInitial = () => {
                const d = value ? new Date(value) : new Date();
                return isNaN(d.getTime()) ? new Date() : d;
            };
            const [viewDate, setViewDate] = useState(parseInitial());
            useEffect(() => { if (isOpen) setViewDate(parseInitial()); }, [isOpen, value]);
            if (!isOpen) return null;
            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            const first = new Date(y, m, 1);
            const start = new Date(first);
            start.setDate(first.getDate() - first.getDay());
            const selected = value ? new Date(value) : null;
            const days = Array.from({ length: 42 }, (_, i) => {
                const d = new Date(start);
                d.setDate(start.getDate() + i);
                return d;
            });
            const toKey = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const todayKey = toKey(new Date());
            const selectedKey = selected && !isNaN(selected.getTime()) ? toKey(selected) : '';
            return (
                <div className="fixed inset-0 z-[190] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative z-10 w-full max-w-sm rounded-[2rem] bg-white/95 dark:bg-slate-900/95 border border-white/60 dark:border-slate-700 shadow-2xl p-5 modal-animate">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h3 className="text-lg font-black text-slate-800 dark:text-white">{title}</h3>
                                <p className="text-xs font-bold text-slate-400">網站自製日期面板</p>
                            </div>
                            <button type="button" onClick={onClose} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-slate-900 dark:hover:text-white"><Icon name="x" className="w-4 h-4" /></button>
                        </div>
                        <div className="flex items-center justify-between mb-3 rounded-2xl bg-slate-50 dark:bg-slate-800/70 p-2">
                            <button type="button" onClick={() => setViewDate(new Date(y, m - 1, 1))} className="p-2 rounded-xl hover:bg-white dark:hover:bg-slate-700 text-slate-500"><Icon name="chevron-left" className="w-4 h-4" /></button>
                            <div className="font-black text-slate-700 dark:text-slate-100">{y} 年 {m + 1} 月</div>
                            <button type="button" onClick={() => setViewDate(new Date(y, m + 1, 1))} className="p-2 rounded-xl hover:bg-white dark:hover:bg-slate-700 text-slate-500"><Icon name="chevron-right" className="w-4 h-4" /></button>
                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center text-[11px] font-black text-slate-400 mb-2">
                            {['日','一','二','三','四','五','六'].map(d => <div key={d} className="py-1">{d}</div>)}
                        </div>
                        <div className="grid grid-cols-7 gap-1">
                            {days.map(d => {
                                const key = toKey(d);
                                const inMonth = d.getMonth() === m;
                                const isSel = key === selectedKey;
                                const isToday = key === todayKey;
                                return (
                                    <button key={key} type="button" onClick={() => { onSelect(key); onClose(); }} className={`aspect-square rounded-xl text-sm font-black transition-all ${isSel ? 'bg-indigo-600 text-white shadow-lg scale-105' : isToday ? 'bg-orange-50 text-orange-600 border border-orange-200' : inMonth ? 'bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-indigo-50 hover:text-indigo-600' : 'text-slate-300 dark:text-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>{d.getDate()}</button>
                                );
                            })}
                        </div>
                        <div className="grid grid-cols-3 gap-2 mt-4">
                            {[0,1,7].map(offset => {
                                const d = new Date(); d.setDate(d.getDate() + offset);
                                return <button key={offset} type="button" onClick={() => { onSelect(toKey(d)); onClose(); }} className="py-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-black hover:bg-indigo-50 hover:text-indigo-600">{offset === 0 ? '今日' : offset === 1 ? '聽日' : '一星期後'}</button>;
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function TimePickerModal({ isOpen, value, onSelect, onClose, title = '選擇時間' }) {
            const [hour, setHour] = useState(value ? value.split(':')[0] : '08');
            const [minute, setMinute] = useState(value ? value.split(':')[1] : '00');

                                    {minutes.map(m => <button key={m} type="button" onClick={() => setMinute(m)} className={`py-2 rounded-xl text-sm font-black transition-all ${minute === m ? 'bg-indigo-600 text-white shadow' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-indigo-50 hover:text-indigo-600'}`}>{m}</button>)}
                                </div>
                            </div>
                        </div>
                        <button type="button" onClick={confirm} className="w-full mt-5 py-3 rounded-2xl bg-indigo-600 text-white font-black hover:bg-indigo-700 active:scale-95 transition-all">套用時間</button>
                    </div>
                </div>
            );
        }

                        <div className="flex justify-between items-center mb-4"> 
                            <h3 className="text-xl font-bold text-slate-800 dark:text-white">修改紀錄</h3> 
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors"><Icon name="x" className="w-5 h-5 text-slate-500 dark:text-slate-400" /></button>

            return (

        function SubjectManagerModal({ isOpen, onClose, currentSubjects, onSave, triggerConfirm, triggerAlert }) {
            const [newSubjectName, setNewSubjectName] = useState('');
            const [newSubjectColor, setNewSubjectColor] = useState(COLOR_PALETTE[0].value);
            const [tempSubjects, setTempSubjects] = useState([]);

            useEffect(() => { if (isOpen) setTempSubjects(currentSubjects); }, [isOpen, currentSubjects]);
            if (!isOpen) return null;

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newSubjectName.trim()) return;
                if (tempSubjects.some(s => s.name === newSubjectName.trim())) { triggerAlert ? triggerAlert("科目名稱重複", "error") : console.warn("科目名稱重複"); return; }
                setTempSubjects([...tempSubjects, { name: newSubjectName.trim(), color: newSubjectColor }]);
                setNewSubjectName('');
            };
            const handleDelete = (name) => { triggerConfirm(`確定要刪除「${name}」嗎？`, () => setTempSubjects(tempSubjects.filter(s => s.name !== name))); };
            const moveSubject = (index, direction) => {
                const newSubjects = [...tempSubjects];
                if (direction === 'up' && index > 0) { [newSubjects[index], newSubjects[index - 1]] = [newSubjects[index - 1], newSubjects[index]]; } 
                else if (direction === 'down' && index < newSubjects.length - 1) { [newSubjects[index], newSubjects[index + 1]] = [newSubjects[index + 1], newSubjects[index]]; }
                setTempSubjects(newSubjects);
            };
            const handleAISort = () => {
                const priority = ['中文', '英文', '數學', '常識', '通識', '公社', '物理', '化學', '生物'];
                const sorted = [...tempSubjects].sort((a, b) => {
                    const idxA = priority.indexOf(a.name); const idxB = priority.indexOf(b.name);
                    if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                    if (idxA !== -1) return -1;
                    if (idxB !== -1) return 1;
                    return a.name.localeCompare(b.name);
                });
                setTempSubjects(sorted);
            };

            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="modal-animate glass-card bg-white/95 dark:bg-slate-800/95 rounded-3xl shadow-2xl w-full max-w-xl p-6 relative z-10 flex flex-col max-h-[85vh]">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-xl font-bold text-slate-800 dark:text-white">科目設定</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors"><Icon name="x" className="w-5 h-5 text-slate-500" /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-1">
                            <div className="flex justify-between items-center mb-3">
                                <span className="text-xs font-bold text-slate-500">科目列表</span>
                                <button onClick={handleAISort} className="text-xs font-bold bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-3 py-1.5 rounded-lg shadow-md active:scale-95 flex items-center gap-1"><Icon name="sparkles" className="w-3 h-3" /> AI 智能排序</button>
                            </div>
                            <form onSubmit={handleAdd} className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-100 dark:border-slate-700 mb-4">
                                <label className="block text-xs font-bold text-slate-500 mb-2">新增科目</label>
                                <div className="flex gap-2 mb-2"><input type="text" value={newSubjectName} onChange={e => setNewSubjectName(e.target.value)} className="flex-1 px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="科目名稱 (例如: 數學)" required /></div>
                                <div className="grid grid-cols-5 gap-2 max-h-32 overflow-y-auto pr-1 pb-1">
                                    {COLOR_PALETTE.map((c, i) => (<button key={i} type="button" onClick={() => setNewSubjectColor(c.value)} className={`h-8 rounded-lg border-2 ${c.value} ${newSubjectColor === c.value ? 'ring-2 ring-offset-1 ring-slate-400 border-transparent' : 'border-transparent opacity-60 hover:opacity-100'}`} />))}
                                </div>
                                <button type="submit" className="w-full mt-3 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700">新增</button>
                            </form>
                            <div className="space-y-2">
                                {tempSubjects.map((sub, index) => (
                                    <div key={sub.name + index} className="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm group">
                                        <span className={`px-2 py-1 rounded text-xs font-bold border ${sub.color}`}>{sub.name}</span>

        function Timetable({ currentDay, config, onDayChange, subjects, globalNow }) { 
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const now = globalNow || new Date();
            const scheduleData = generateFullSchedule(config, now, currentDay);
            
            return ( 
                <div className="space-y-4"> 
                    <div className="flex glass-card bg-white/70 dark:bg-slate-800/70 rounded-xl p-1 shadow-sm overflow-x-auto">
                        {[1, 2, 3, 4, 5].map(day => (
                            <button key={day} onClick={() => onDayChange(day)} className={`flex-1 py-2 px-3 rounded-lg text-sm font-bold whitespace-nowrap transition-all ${currentDay === day ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'}`}>星期{weekDays[day]}</button>
                        ))}
                    </div> 
                    <div className="glass-card bg-white/80 dark:bg-slate-800/80 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 sm:p-6">
                        {scheduleData.length > 0 ? scheduleData.map((slot, idx) => { 
                            const nowTime = now.getTime(); const startTime = slot.start.getTime(); const endTime = slot.end.getTime();
                            let status = 'future'; let diff = 0;
                            if (nowTime > endTime) { status = 'past'; } else if (nowTime >= startTime && nowTime <= endTime) { status = 'current'; diff = endTime - nowTime; }
                            
                            return (
                                <div key={idx} className={`relative pl-6 pb-6 last:pb-0 border-l-2 ${status === 'current' ? 'border-purple-500' : (status === 'past' ? 'border-slate-200 dark:border-slate-700' : 'border-green-300 dark:border-green-800')}`}>
                                    <div className={`absolute -left-[9px] top-0 w-4 h-4 rounded-full border-2 ${status === 'current' ? 'bg-purple-500 border-purple-100 animate-pulse scale-110' : (status === 'past' ? 'bg-slate-200 dark:bg-slate-700 border-slate-100 dark:border-slate-600' : 'bg-white dark:bg-slate-900 border-green-400')}`}></div>
                                    <div className={`rounded-xl p-3 sm:p-4 transition-all ${status === 'current' ? 'bg-purple-50 dark:bg-purple-900/20 shadow-md border border-purple-100 dark:border-purple-800 transform scale-[1.02]' : (status === 'past' ? 'opacity-60 grayscale' : 'bg-green-50/50 dark:bg-green-900/10 border border-green-100 dark:border-green-900/30')}`}>
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className={`text-xs font-mono mb-1 ${status === 'current' ? 'text-purple-600 dark:text-purple-400 font-bold' : 'text-slate-400'}`}>{formatTimeStr(slot.start)} - {formatTimeStr(slot.end)}</div>
                                                <div className={`text-base sm:text-lg font-bold ${slot.type === 'lesson' ? 'text-slate-800 dark:text-white' : 'text-slate-500 italic'} ${status === 'current' ? 'text-purple-900 dark:text-purple-300' : ''}`}>{slot.subjectName}</div>
                                            </div>
                                            {status === 'current' && (<div className="text-right"><span className="inline-block text-[10px] bg-purple-600 text-white px-2 py-0.5 rounded-full font-bold mb-1 animate-pulse">進行中</span><div className="text-xs font-mono font-bold text-purple-600 dark:text-purple-400">剩 {formatCountdown(diff)}</div></div>)}
                                            {status === 'past' && <Icon name="check-circle" className="w-5 h-5 text-slate-300 dark:text-slate-600" />}
                                        </div>
                                    </div>
                                </div>
                            ); 
                        }) : (<div className="text-center py-10 text-slate-400 font-medium">是日休息或未設定課程</div>)}

            const [estimatedTimeInput, setEstimatedTimeInput] = useState(systemConfig?.estimatedTime || '約 10 分鐘');

            const { collection, getDocs, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, setDoc, getDoc, writeBatch, limit, startAfter, where } = window.firebaseServices || {};
            const allowedEmails = systemConfig?.allowedEmails || [];
            const blacklistedEmails = systemConfig?.blacklistedEmails || [];

            const USERS_PAGE_SIZE = 20;

            const fetchUsersPage = async (reset = false) => {
                if (!db || !collection || !getDocs || usersLoading) return;
                setUsersLoading(true);
                try {
                    const usersRef = collection(db, "users_public");
                    const baseQuery = reset || !usersLastDoc
                        ? query(usersRef, orderBy("lastSeen", "desc"), limit(USERS_PAGE_SIZE))
                        : query(usersRef, orderBy("lastSeen", "desc"), startAfter(usersLastDoc), limit(USERS_PAGE_SIZE));
                    const snapshot = await getDocs(baseQuery);
                    const pageUsers = snapshot.docs.map(d => ({ uid: d.id, ...d.data() }));
                    setUsers(prev => {
                        if (reset) return pageUsers;
                        const existing = new Set(prev.map(u => u.uid));
                        return [...prev, ...pageUsers.filter(u => !existing.has(u.uid))];
                    });
                    setUsersLastDoc(snapshot.docs[snapshot.docs.length - 1] || null);
                    setUsersHasMore(snapshot.docs.length === USERS_PAGE_SIZE);
                    setUsersLoadedOnce(true);
                } catch (err) {
                    console.warn("Admin users pagination err:", err);
                    triggerAlert("載入用戶失敗：" + err.message, "error");

                    setUsersLoading(false);
                }

            const handleCreateClass = async (e) => {

                        setNewClassName(''); triggerAlert(`成功建立班級：${name} (代碼: ${code})`);

                });

            const handleDeepDeleteClass = async (classObj) => {
                triggerConfirm(`⚠️ 警告：確定要刪除班級 ${classObj.name}？\n\n此操作將會：\n1. 刪除班級代碼\n2. 刪除該班級所有廣播功課\n3. 將所有學生踢出該班級`, async () => {
                    try {
                        const batch = writeBatch(db);
                        const tasksQ = query(collection(db, "public_assignments"), where("targetClass", "==", classObj.code));
                        const tasksSnap = await getDocs(tasksQ);
                        tasksSnap.forEach(d => batch.delete(d.ref));

                        const usersQ = query(collection(db, "users_public"), where("joinedClasses", "array-contains", classObj.code));
                        const usersSnap = await getDocs(usersQ);
                        usersSnap.forEach(d => batch.update(d.ref, { joinedClasses: arrayRemove(classObj.code) }));

                        const classesRef = doc(db, 'system_settings', 'classes');
                        const classesSnap = await getDoc(classesRef);
                        if (classesSnap.exists()) {
                            const currentList = classesSnap.data().list || [];
                            const newList = currentList.filter(c => c.code !== classObj.code);
                            batch.update(classesRef, { list: newList });

                        await batch.commit();
                        triggerAlert("班級已徹底刪除及清理");
                        if (viewingClass === classObj.code) setViewingClass(null);
                    } catch (e) { triggerAlert("刪除過程發生錯誤：" + e.message, "error"); }
                });
            };

            const handleKickUserFromClass = async (userObj, classCode) => {
                triggerConfirm(`確定要將 ${userObj.displayName || userObj.email} 踢出此班級嗎？`, async () => {
                    try { await updateDoc(doc(db, "users_public", userObj.uid), { joinedClasses: arrayRemove(classCode) }); triggerAlert("已踢出班級"); } 
                    catch (e) { triggerAlert("移除失敗: " + e.message, "error"); }
                });
            };

            const getTargetUsersForPublicTask = async (task) => {
                if (!db || !collection || !getDocs || !query) return [];
                const targetClass = task?.targetClass || '全校';
                const usersRef = collection(db, "users_public");
                const targetQuery = targetClass === '全校'
                    ? query(usersRef)
                    : query(usersRef, where("joinedClasses", "array-contains", targetClass));
                const snapshot = await getDocs(targetQuery);
                const allTargetUsers = snapshot.docs.map(d => ({ uid: d.id, ...d.data() }));
                return allTargetUsers.filter(u => {
                    if (!u?.uid) return false;
                    if (u.email === ADMIN_EMAIL) return false;
                    if (blacklistedEmails.includes(u.email)) return false;
                    return true;
                });
            };

            const buildPublicInsertPayload = (task) => ({
                type: task.type || 'homework',
                subject: task.subject || '其他',
                description: task.description || '',
                dueDate: task.dueDate || '',
                completed: false,
                createdAt: new Date().toISOString(),
                publicRefId: task.id,
                senderName: task.senderName || '管理員',
                targetClass: task.targetClass || '全校',
                autoSynced: true,
                syncedByAdmin: true,
                syncedAt: new Date().toISOString(),
                forceExpired: false,
                isHidden: false
            });

            const buildPublicUpdatePayload = (task) => ({
                type: task.type || 'homework',
                subject: task.subject || '其他',
                description: task.description || '',
                dueDate: task.dueDate || '',
                publicRefId: task.id,
                senderName: task.senderName || '管理員',
                targetClass: task.targetClass || '全校',
                syncedByAdmin: true,
                syncedAt: new Date().toISOString(),
                forceExpired: false,
                isHidden: false
            });

            const updateTaskStatsFromTargetUsers = async (task, targetUsers) => {
                let synced = 0;
                let completed = 0;
                const pendingList = [];
                const syncedList = [];
                const completedList = [];
                for (const u of targetUsers) {
                    const q = query(collection(db, "users", u.uid, "items"), where("publicRefId", "==", task.id));
                    const snap = await getDocs(q);
                    const display = u.displayName || u.email || u.uid;
                    if (!snap.empty) {
                        synced++;
                        syncedList.push(display);
                        const hasCompleted = snap.docs.some(d => d.data()?.completed === true && d.data()?.isHidden !== true);
                        if (hasCompleted) {
                            completed++;
                            completedList.push(display);
                        }
                    } else {
                        pendingList.push(display);
                    }
                }
                setTaskStats(prev => ({
                    ...prev,
                    [task.id]: {
                        total: targetUsers.length,
                        synced,
                        completed,
                        pendingList,
                        syncedList,
                        completedList,
                        syncRate: targetUsers.length ? Math.round((synced / targetUsers.length) * 100) : 0,
                        completedRate: targetUsers.length ? Math.round((completed / targetUsers.length) * 100) : 0,
                        scannedAt: new Date().toISOString()
                    }
                }));
                return { total: targetUsers.length, synced, completed, pendingList, syncedList, completedList };
            };

            const pushPublicTaskToTargets = async (task, options = {}) => {
                const { refreshStats = true } = options;
                if (!task?.id) return { total: 0, created: 0, updated: 0, skipped: 0 };
                if (task.forceExpired) throw new Error('這份廣播功課已撤回，不能再派發。');
                const targetUsers = await getTargetUsersForPublicTask(task);
                let created = 0;
                let updated = 0;
                let skipped = 0;
                let batch = writeBatch(db);
                let pendingWrites = 0;

                const commitBatch = async () => {
                    if (pendingWrites <= 0) return;
                    await batch.commit();
                    batch = writeBatch(db);
                    pendingWrites = 0;
                };

                for (const u of targetUsers) {
                    const duplicateQ = query(collection(db, "users", u.uid, "items"), where("publicRefId", "==", task.id));
                    const duplicateSnap = await getDocs(duplicateQ);
                    if (duplicateSnap.empty) {
                        batch.set(doc(db, "users", u.uid, "items", `public_${task.id}`), buildPublicInsertPayload(task), { merge: true });
                        created++;
                        pendingWrites++;
                    } else {
                        duplicateSnap.docs.forEach(existingDoc => {
                            batch.update(existingDoc.ref, buildPublicUpdatePayload(task));
                            pendingWrites++;
                        });
                        updated++;
                    }
                    if (pendingWrites >= 420) await commitBatch();
                }
                await commitBatch();
                if (refreshStats) await updateTaskStatsFromTargetUsers(task, targetUsers);
                return { total: targetUsers.length, created, updated, skipped };
            };

            const handlePushPublicTaskNow = (task) => {
                const cls = systemClasses.find(c => c.code === task.targetClass);
                const targetName = task.targetClass === '全校' || !task.targetClass ? '全校' : (cls?.name || task.targetClass);
                triggerConfirm(`確定要重新派發「${task.subject || '功課'}」到 ${targetName} 所有學生個人手冊嗎？`, async () => {
                    setIsPushingPublic(true);
                    try {
                        const report = await pushPublicTaskToTargets(task);
                        setPushReport({ type: 'single', taskId: task.id, subject: task.subject || '功課', ...report, pushedAt: new Date().toISOString() });
                        triggerAlert(`派發完成：新增 ${report.created} 人，修復/更新 ${report.updated} 人。`);
                    } catch (e) {
                        triggerAlert('派發失敗：' + e.message, 'error');
                    } finally {
                        setIsPushingPublic(false);
                    }
                });
            };

            const handlePushAllPublicTasksNow = () => {
                const activeTasks = publicTasks.filter(task => !task.forceExpired);
                if (!activeTasks.length) { triggerAlert('目前沒有可推送的廣播功課', 'error'); return; }
                triggerConfirm(`確定重新派發 ${activeTasks.length} 份廣播功課到各自目標學生嗎？系統會自動修復未到位紀錄。`, async () => {
                    setIsPushingPublic(true);
                    try {
                        const summary = { totalTasks: activeTasks.length, totalTargets: 0, created: 0, updated: 0, skipped: 0 };
                        for (const task of activeTasks) {
                            const report = await pushPublicTaskToTargets(task, { refreshStats: false });
                            summary.totalTargets += report.total;
                            summary.created += report.created;
                            summary.updated += report.updated;
                            summary.skipped += report.skipped;
                        }
                        setPushReport({ type: 'all', ...summary, pushedAt: new Date().toISOString() });
                        triggerAlert(`重新派發完成：新增 ${summary.created} 項，修復/更新 ${summary.updated} 項。`);
                    } catch (e) {
                        triggerAlert('重新派發失敗：' + e.message, 'error');
                    } finally {
                        setIsPushingPublic(false);
                    }
                });
            };

            const fetchTaskProgress = async (task) => {

                } catch (e) { triggerAlert("讀取派發狀態失敗: " + e.message, "error"); }
                setIsFetchingStats(false);
            };

            const fetchAllTaskProgress = async () => {
                if (!publicTasks.length) return triggerAlert("目前沒有廣播任務可掃描", "error");
                for (const task of publicTasks) {

            const handleDeleteUser = async (targetUser) => {
                triggerConfirm(`⚠️ 危險操作！確定要刪除用戶 ${targetUser.displayName} 的所有資料？此操作無法復原！`, async () => {

                        const batch = writeBatch(db);

                        itemsSnap.forEach(d => batch.delete(d.ref));

                        if (selectedUser?.uid === targetUser.uid) setSelectedUser(null);

                });

            const handleUpdateUserName = async () => {

                    try { await updateDoc(doc(db, "users_public", selectedUser.uid), { displayName: newName.trim() }); triggerAlert("用戶名稱已更新"); }

            const handleAdminUpdateItem = async (itemId, updatedData) => {

                    } catch(e) { triggerAlert("刪除失敗", "error"); }

            };

            const handleDeletePublicTask = (taskOrId) => {
                const task = typeof taskOrId === 'object' ? taskOrId : publicTasks.find(t => t.id === taskOrId);
                const taskId = task?.id || taskOrId;
                triggerConfirm("確定要撤回這份廣播功課嗎？這會同時從所有目標學生的清單中移除。", async () => {

                        let batch = writeBatch(db);
                        let pendingWrites = 0;
                        const commitBatch = async () => {
                            if (pendingWrites <= 0) return;
                            await batch.commit();
                            batch = writeBatch(db);
                            pendingWrites = 0;
                        };
                        batch.delete(doc(db, "public_assignments", taskId));
                        pendingWrites++;
                        for (const u of targetUsers) {
                            const dupQ = query(collection(db, "users", u.uid, "items"), where("publicRefId", "==", taskId));
                            const snap = await getDocs(dupQ);
                            snap.forEach(d => {
                                batch.delete(d.ref);
                                pendingWrites++;
                            });
                            if (pendingWrites >= 420) await commitBatch();
                        }
                        await commitBatch();
                        triggerAlert("廣播功課已撤回，並已清理所有目標學生紀錄");
                    } catch (e) { triggerAlert("撤回失敗: " + e.message, "error"); }

            const handleScanExpired = async () => {
                triggerConfirm("確定要掃描全校未清理過期功課嗎？", async () => {
                    setIsScanning(true);
                    const today = new Date(); today.setHours(0,0,0,0);
                    const report = [];
                    try {
                        for (const u of users) {
                            const q = query(collection(db, "users", u.uid, "items"));
                            const snap = await getDocs(q);
                            const userItems = snap.docs.map(d => d.data());
                            const expired = userItems.filter(item => {
                                if (item.completed) return false; 
                                const due = new Date(item.dueDate); due.setHours(0,0,0,0);
                                return due < today; 
                            });
                            if (expired.length > 0) report.push({ user: u, expiredCount: expired.length, items: expired });
                        }
                        setExpiredReport(report.sort((a,b) => b.expiredCount - a.expiredCount));
                        if (report.length === 0) triggerAlert("太棒了！所有學生都沒有未清理的過期功課。");
                    } catch(e) { triggerAlert("掃描失敗: " + e.message, "error"); }
                    setIsScanning(false);
                });
            };
            
            const getUserStatus = (lastSeen) => {
                if (!lastSeen || typeof lastSeen.toDate !== 'function') return 'offline';
                const diff = new Date() - lastSeen.toDate();
                if (diff < 2 * 60 * 1000) return 'online';
                if (diff < 10 * 60 * 1000) return 'idle';
                return 'offline';
            };

            const activeTodayCount = users.filter(u => u.lastSeen && typeof u.lastSeen.toDate === 'function' && (new Date() - u.lastSeen.toDate()) < 24 * 60 * 60 * 1000).length;
            const onlineNowCount = users.filter(u => u.lastSeen && typeof u.lastSeen.toDate === 'function' && (new Date() - u.lastSeen.toDate()) < 10 * 60 * 1000).length;
            const recent7DayTaskCount = publicTasks.filter(t => t.createdAt && typeof t.createdAt.toDate === 'function' && (new Date() - t.createdAt.toDate()) < 7 * 24 * 60 * 60 * 1000).length;
            const classMemberTotal = systemClasses.reduce((sum, c) => sum + users.filter(u => (u.joinedClasses || []).includes(c.code)).length, 0);
            const selectedUserStats = selectedUser ? {
                total: userHomeworks.length,
                unfinished: userHomeworks.filter(h => !h.completed && !h.isHidden).length,
                synced: userHomeworks.filter(h => h.publicRefId).length,
                expired: userHomeworks.filter(h => {
                    if (h.completed || h.isHidden) return false;
                    const today = new Date(); today.setHours(0,0,0,0);
                    const due = new Date(h.dueDate); due.setHours(0,0,0,0);
                    return due instanceof Date && !isNaN(due.getTime()) && due < today;
                }).length,
                classes: (selectedUser.joinedClasses || []).length
            } : { total: 0, unfinished: 0, synced: 0, expired: 0, classes: 0 };
            const filteredUsers = users.filter(u => (u.displayName || '').toLowerCase().includes(searchQuery.toLowerCase()) || (u.email || '').toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="glass-card bg-white/95 dark:bg-slate-900/95 rounded-[2.5rem] shadow-lg border border-slate-100 dark:border-slate-800 overflow-hidden flex flex-col md:flex-row min-h-[700px] relative z-20 mt-4">
                    <div className="w-full md:w-64 bg-slate-900 dark:bg-[#151515] text-slate-300 p-6 flex flex-col gap-2 shrink-0 border-r border-slate-800">

                            <h2 className="text-xl font-black tracking-wide">超級管理中心</h2>
                        </div>
                        <div className="flex flex-row md:flex-col gap-2 overflow-x-auto scrollbar-hide pb-2 md:pb-0">
                            {[ { id: 'overview', icon: 'layout-dashboard', label: '專業總覽' }, { id: 'users', icon: 'users', label: '用戶數據管理' }, { id: 'classes', icon: 'school', label: '班級代碼管理' }, { id: 'tasks', icon: 'bell', label: '廣播任務中心' }, { id: 'syncMonitor', icon: 'activity', label: '派發狀態' }, { id: 'settings', icon: 'settings', label: '核心系統設定' } ].map(tab => (
                                <button key={tab.id} onClick={() => { setActiveTab(tab.id); setSelectedUser(null); setViewingClass(null); }} className={`flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm transition-all whitespace-nowrap md:whitespace-normal ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <Icon name={tab.icon} className={`w-5 h-5 ${activeTab === tab.id ? 'text-indigo-200' : 'text-slate-500'}`} /> {tab.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 p-6 md:p-8 overflow-y-auto bg-slate-50/50 dark:bg-slate-900/50 text-slate-800 relative">
                        {editingAdminItem && ( <EditModal item={editingAdminItem} onClose={() => setEditingAdminItem(null)} onSave={handleAdminUpdateItem} triggerAlert={triggerAlert} triggerConfirm={triggerConfirm} subjects={subjects} /> )}

                        {activeTab === 'overview' && (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="flex flex-col sm:flex-row sm:items-end justify-between gap-3 mb-2">
                                    <div>
                                        <h3 className="text-2xl font-black dark:text-white">專業系統總覽</h3>
                                        <p className="text-sm text-slate-500 mt-1">快速查看用戶活躍、廣播任務、班級營運與安全狀態。</p>

                                    <div className="min-w-0">
                                        <div className="flex items-center gap-2 font-black text-slate-800 dark:text-white"><Icon name="bell-ring" className="w-5 h-5 text-orange-500" /> 通知中心</div>
                                        <div className="text-[11px] font-bold text-slate-400 mt-0.5">直接顯示最新功課、時間表更改與清理提醒</div>
                                    </div>
                                    <div className="flex items-center gap-2 shrink-0">
                                        {userNotifications.length > 0 && (
                                            <button type="button" onClick={() => markNotificationsRead(userNotifications.map(n => n.id))} className="px-3 py-2 rounded-xl bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-300 text-[11px] font-black border border-indigo-100 dark:border-indigo-800">全部已讀</button>
                                        )}
                                        <button type="button" onClick={() => setIsNotificationCenterOpen(false)} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors"><Icon name="x" className="w-4 h-4" /></button>
                                    </div>
                                </div>

                                <div className="overflow-y-auto p-4 space-y-3 min-h-[220px] max-h-[70vh] scrollbar-hide">
                                    {userNotifications.length === 0 ? (
                                        <div className="h-[220px] flex flex-col items-center justify-center text-center text-slate-400">
                                            <div className="w-16 h-16 rounded-3xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-3"><Icon name="bell-off" className="w-7 h-7" /></div>
                                            <div className="font-black text-sm">暫時未有通知</div>
                                            <div className="text-xs mt-1">有新公告或廣播功課時會出現在這裡</div>
                                        </div>
                                    ) : userNotifications.map(note => {
                                        const accentMap = {
                                            amber: 'bg-amber-50 dark:bg-amber-900/20 border-amber-100 dark:border-amber-800 text-amber-600 dark:text-amber-300',
                                            orange: 'bg-orange-50 dark:bg-orange-900/20 border-orange-100 dark:border-orange-800 text-orange-600 dark:text-orange-300',
                                            emerald: 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-100 dark:border-emerald-800 text-emerald-600 dark:text-emerald-300',
                                            rose: 'bg-rose-50 dark:bg-rose-900/20 border-rose-100 dark:border-rose-800 text-rose-600 dark:text-rose-300',
                                            sky: 'bg-sky-50 dark:bg-sky-900/20 border-sky-100 dark:border-sky-800 text-sky-600 dark:text-sky-300',
                                            slate: 'bg-slate-50 dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-500 dark:text-slate-300'
                                        };
                                        const accentClass = accentMap[note.accent] || accentMap.slate;
                                        return (
                                            <button key={note.id} type="button" onClick={() => handleOpenUserNotification(note)} className={`w-full text-left rounded-3xl border p-4 transition-all hover:-translate-y-0.5 hover:shadow-md ${note.unread ? accentClass : 'bg-white/70 dark:bg-slate-800/70 border-slate-100 dark:border-slate-700 text-slate-500 dark:text-slate-300'}`}>
                                                <div className="flex items-start gap-3">
                                                    <div className={`w-11 h-11 rounded-2xl flex items-center justify-center shrink-0 ${note.unread ? 'bg-white/80 dark:bg-slate-950/40' : 'bg-slate-100 dark:bg-slate-900/60'}`}>
                                                        <Icon name={note.icon} className="w-5 h-5" />
                                                    </div>
                                                    <div className="min-w-0 flex-1">
                                                        <div className="flex items-center justify-between gap-2">
                                                            <div className="font-black text-sm text-slate-800 dark:text-white truncate">{note.title}</div>
                                                            {note.unread && <span className="w-2.5 h-2.5 rounded-full bg-red-500 shrink-0 shadow-sm"></span>}
                                                        </div>
                                                        <div className="text-xs font-bold mt-1 line-clamp-2 break-words">{note.message}</div>
                                                        <div className="mt-2 flex items-center justify-between gap-2 text-[10px] font-black opacity-70">
                                                            <span className="truncate">{note.meta || note.time || '剛剛'}</span>
                                                            {note.action === 'class' && <span className="shrink-0 flex items-center gap-1">查看功課 <Icon name="arrow-right" className="w-3 h-3" /></span>}
                                                            {note.action === 'timetable' && <span className="shrink-0 flex items-center gap-1">查看時間表 <Icon name="arrow-right" className="w-3 h-3" /></span>}
                                                            {note.action === 'cleanup' && <span className="shrink-0 flex items-center gap-1">返回主頁 <Icon name="arrow-right" className="w-3 h-3" /></span>}
                                                            {note.action === 'release' && <span className="shrink-0 flex items-center gap-1">查看更新 <Icon name="arrow-right" className="w-3 h-3" /></span>}
                                                        </div>
                                                    </div>
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {notification.isOpen && (
                        <div className="fixed inset-0 z-[250] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={closeNotification}></div>
                            <div className="dialog-animate glass-card bg-white/95 dark:bg-slate-800/95 rounded-3xl shadow-2xl w-full max-w-sm p-6 relative z-10 text-center border border-white/50">
                                <div className="w-16 h-16 bg-amber-100 dark:bg-amber-900/30 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-circle" className="w-8 h-8" /></div>
                                <h3 className="text-xl font-bold text-slate-800 dark:text-white mb-2">請確認</h3>
                                <p className="text-slate-500 dark:text-slate-400 mb-6 text-sm">{notification.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={closeNotification} className="flex-1 py-3 rounded-xl font-bold bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 transition-colors">取消</button>
                                    <button onClick={handleNotificationConfirm} className="flex-1 py-3 rounded-xl font-bold bg-red-500 hover:bg-red-600 text-white transition-colors shadow-lg active:scale-95">確定</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (e) {
            console.error('Root render failed:', e);
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.innerHTML = "<div style='max-width:420px;padding:22px;text-align:center'><div style='font-size:42px;margin-bottom:10px'>⚠️</div><h2 style='font-size:1.2rem;font-weight:800;margin-bottom:8px;color:#ef4444'>主畫面啟動失敗</h2><p style='font-size:13px;color:#64748b;line-height:1.6'>請先使用上一個穩定版，或截圖 Console 錯誤。</p></div>";
            }
        }
    </script>
<!-- VERSION_CHECK: v1.9.06-golden-interface-rebuild | based-on-v1.9.03 | full-display-upgrade | original-functions-preserved | database-logic-unchanged -->
